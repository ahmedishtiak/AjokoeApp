<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#06101F" />
<title>Ajokoe — Finnish Driving Theory Trainer</title>

  #boot .s{margin-top:8px;font-size:13px;letter-spacing:.2em;text-transform:uppercase}

  #err{display:none;max-width:520px;margin:12px auto 0;padding:12px 14px;background:#3a1320;border:1px solid #FF5B6E;border-radius:10px;color:#ffd;font-size:13px;text-align:left;white-space:pre-wrap}
</style>
</head>
