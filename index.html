oidaan kuljettaa ilman turvalaitetta, jos taksissa ei ole siihen soveltuvaa välineistöä.","Aikuinen voi pitää lasta sylissään, mikäli auto on liikenteessä alle 10 minuuttia.","Lapsi on sijoitettava hänen pituudelle ja painolle soveltuvaan turvalaitteeseen."],"o_en":["If the trip is short and within the city, a restraint isn't necessary","The child may be carried without a restraint if the taxi has no suitable equipment","An adult may hold the child if the car is in traffic under 10 minutes","The child must be placed in a restraint suited to their height and weight"],"a":3},{"t":"Erityisryhmät","q_fi":"Olet hakemassa perhettä kesäleiriltä Naantalista. Huomaat, että perheeseen kuuluu 2.5 vuotias lapsi, josta ei ole erikseen ilmoitettu. Sinulla ei ole autossa mukana turvalaitetta lapselle. Miten toimit tilanteessa?","q_en":"You're collecting a family and notice an unannounced 2.5-year-old; you have no child restraint in the car. How do you act?","o_fi":["Kieltäydyn kuljettamasta lasta ilman asianmukaista turvalaitetta ja hankin asiakkaalle sopivan auton.","Kuljetan lapsen, jos matka on lyhyt ja nopeus pysyy alhaisena.","Suoritan kuljetuksen, jos huoltaja ottaa vastuun turvallisuudesta.","Ilmoitan tilanteesta työnantajalle, mutta jatkan kuljetusta normaalisti."],"o_en":["I refuse to carry the child without a proper restraint and arrange a suitable car for them","I carry the child if the trip is short and the speed stays low","I do the trip if the guardian takes responsibility for safety","I report it to the employer but continue the trip normally"],"a":0},{"t":"Erityisryhmät","q_fi":"Olet hakeutumassa kuljettamaan koulun ja varhaiskasvatuksen kuljetuksia. Sinulle kerrotaan, että työ lasten kanssa edellyttää rikosrekisteriotteen esittämistä. Kuka vastaa rikosrekisteriotteen hankkimisesta tällöin?","q_en":"Work with children requires showing a criminal-record extract. Who is responsible for obtaining it?","o_fi":["Tilaajaorganisaatio (esim. kunta) on aina vastuussa rikosrekisteriotteen tarkistamisesta kuljettajan puolesta.","Rikosrekisteriotetta ei tarvita, jos kuljetukset tehdään satunnaisesti eikä päivittäin.","Asiakkaan huoltaja toimittaa otteen taksiyritykselle ennen ensimmäistä matkaa","Kuljettaja itse on velvollinen hankkimaan rikosrekisteriotteen ennen työn aloittamista."],"o_en":["The ordering organisation (e.g. the municipality) is always responsible for checking it on the driver's behalf","An extract isn't needed if the trips are occasional rather than daily","The customer's guardian delivers the extract to the taxi firm before the first trip","The driver is responsible for obtaining the criminal-record extract before starting the work"],"a":3},{"t":"Erityisryhmät","q_fi":"22-vuotiasta liikuntavammaista asiakasta haettaessa huomaat hänellä olevan mukanaan avustaja. Miten toimit tilanteessa?","q_en":"Collecting a 22-year-old disabled customer, you notice they have an assistant. How do you act?","o_fi":["Keskustelen avustajan kanssa, koska hän hoitaa asiat asiakkaan puolesta.","Odotan autossa, kunnes he ovat valmiita – turha puuttua ilman pyyntöä.","Otat vain asiakkaan kyytiin ja kehotat avustajaa tilaamaan toisen taksin.","Kysyt asiakkaalta, miten voit auttaa, ja varmistat, että myös avustaja mahtuu turvallisesti kyytiin."],"o_en":["I talk with the assistant, since they handle things for the customer","I wait in the car until they're ready — no need to intervene without a request","I take only the customer and tell the assistant to order another taxi","I ask the customer how I can help and ensure the assistant also fits safely"],"a":3},{"t":"Erityisryhmät","q_fi":"Olet saanut ajettavaksesi koulukuljetuksen, jossa viet useita alakouluikäisiä lapsia aamulla kouluun ja iltapäivällä takaisin koteihinsa. Lapset ovat levottomia, ja heidän kanssaan vaaditaan malttia ja tarkkaavaisuutta. Mikä seuraavista kuuluu kuljettajan keskeisiin vastuisiin tällaisessa kuljetuksessa?","q_en":"On a school transport with several restless primary children, which is among the driver's key responsibilities?","o_fi":["Varmistan, että jokaisella lapsella on turvavyö asianmukaisesti kiinnitetty ja toimin esimerkkinä liikenneturvallisuudessa.","Annan lasten itse päättää, missä pysähdytään, jotta matka tuntuu mukavammalta.","Kuljetan oppilaat reittiä, jonka he itse toivovat, vaikka se poikkeaisi sovitusta aikataulusta.","Huolehdin ensisijaisesti aikataulun pitämisestä, vaikka se vaatisi liikennesääntöjen joustavaa tulkintaa."],"o_en":["I ensure every child's belt is properly fastened and act as an example in traffic safety","I let the children decide where to stop, to make the trip nicer","I drive the route the children request even if it deviates from the agreed schedule","I prioritise keeping the schedule even if it needs a flexible reading of traffic rules"],"a":0},{"t":"Erityisryhmät","q_fi":"Olet ajovuorossa isossa invataksissa, jossa ei tällä hetkellä ole pyörätuoliasiakkaita. Olet käyttänyt pyörätuolin kiinnityshihnoja edellisessä kuljetuksessa ja olet säilyttänyt niitä nyt irrallaan lattialla istuimien alla. Mikä on oikea tapa käsitellä pyörätuolin kiinnitystarvikkeita tyhjien kuljetusten aikana ja miksi se on tärkeää?","q_en":"You've used wheelchair straps and now store them loose on the floor under the seats. What's the correct way to handle them during empty trips, and why?","o_fi":["Kiinnittimet voi pitää lattialla, jos niitä ei juuri nyt tarvita. Ne eivät ole varsinaisia irtotavaroita, joten niiden säilytyspaikalla ei ole väliä.","Kiinnittimiä ei saa kuljettaa samassa tilassa asiakkaiden kanssa lainkaan, vaan ne on säilytettävä erillisessä lukitussa lokerossa auton ulkopuolella.","Kiinnityshihnat tulee säilyttää ajon aikana turvallisesti kiinnitettyinä tai omassa säilytyspaikassaan, jotta ne eivät aiheuta vaaraa äkkijarrutustilanteessa.","Kiinnittimille ei ole erityisiä säilytysvaatimuksia, mutta suositellaan, että ne kerätään syrjään siisteyden ja asiakastyytyväisyyden vuoksi."],"o_en":["They can stay on the floor if not needed now; their storage place doesn't matter","They may not be carried in the same space as customers at all and must be kept in a separate locked compartment outside the car","The straps should be stored securely fastened or in their own place, so they don't cause danger in a sudden stop","There are no special storage requirements, but collecting them aside is recommended for tidiness and customer satisfaction"],"a":2},{"t":"Erityisryhmät","q_fi":"Olet lähdössä suorittamaan päiväkotiryhmän aamukuljetusta. Autossa on käytössä alkolukko, kuten lakisääteisesti vaaditaan koululaisten ja varhaiskasvatusikäisten kuljetuksissa. Mihin alkolukko on säädetty reagoimaan näissä kuljetuksissa?","q_en":"What is the alcohol interlock set to react to in these transports?","o_fi":["Jos uloshengitysilmassa on 0,10 mg alkoholia per litra tai enemmän, ajoneuvo ei käynnisty.","Alkolukko reagoi vasta 0,30 mg/l pitoisuuksiin, eli se sallii pienen määrän alkoholia.","Alkolukko ei ole pakollinen, jos kuljetus tehdään yksityisellä tiellä.","Kuljettaja voi ohittaa alkolukon, jos on kiireellinen koulukuljetus."],"o_en":["If the exhaled air has 0.10 mg of alcohol per litre or more, the vehicle won't start","It reacts only at 0.30 mg/l, i.e. it allows a small amount of alcohol","The interlock isn't mandatory if the transport is on a private road","The driver may bypass the interlock for an urgent school transport"],"a":0},{"t":"Erityisryhmät","q_fi":"Miten taksinkuljettajan tulee toimia auttaessaan pyörätuoliasiakasta siirtymisessä henkilöauton etuistuimelle?","q_en":"How should the driver act when helping a wheelchair customer transfer to the front seat?","o_fi":["Kuljettajan tulee aina nostaa asiakas pyörätuolista ja kantaa hänet autoon ilman asiakkaan ohjeistusta, jotta aikaa ei kulu liikaa.","Kuljettajan on toimittava asiakkaan ohjeiden mukaisesti ja avustettava siirtymisessä siten, että asiakas tuntee olonsa turvalliseksi ja arvostetuksi.","Kuljettajan ei tarvitse tarjota apua, ellei asiakas sitä erikseen vaadi.","Kuljettajan ensisijainen tehtävä on huolehtia aikataulusta, joten pyörätuoliasiakas ohjataan käyttämään toista kyytiä, jos siirtyminen kestää liian kauan."],"o_en":["The driver should always lift the customer out of the wheelchair and carry them in without instruction, to save time","The driver acts on the customer's instructions and assists the transfer so the customer feels safe and respected","The driver needn't offer help unless the customer specifically demands it","The driver's main task is the schedule, so a wheelchair customer is directed to another ride if the transfer takes too long"],"a":1},{"t":"Turvallisuus","q_fi":"Olet ajamassa alueella, jossa on tapahtunut onnettomuus ja liikennettä ohjataan tilapäisesti. Saat eri toimijoilta keskenään ristiriitaisia ohjeita. Keneltä tuleva ohje sitoo sinua ensisijaisesti?","q_en":"At an accident scene you get conflicting instructions from different parties. Whose instruction binds you primarily?","o_fi":["Valitsen sen ohjeen, joka vähiten häiritsee muuta liikennettä ja sujuvoittaa etenemistä.","Luotan omaan arvioosi, sillä viranomaisten käskyistä ei saa mitään selkoa.","Seuraan lähimmän pelastuslaitoksen henkilön viittoja, koska pelastustyöt ovat käynnissä.","Toimin poliisin käsimerkkien tai käskyjen mukaan, koska ne ohittavat muut ohjauskeinot."],"o_en":["I pick the instruction that least disturbs other traffic and eases progress","I rely on my own judgement, since the authorities' orders make no sense","I follow the nearest rescue worker's gestures, since rescue work is underway","I act on the police's hand signals or orders, since they override other means of direction"],"a":3},{"t":"Turvallisuus","q_fi":"Mikä/kuka seuraavista on vastuussa taksissa tapahtuvan asiakaspalvelun laadusta?","q_en":"Who is responsible for the quality of customer service that happens in the taxi?","o_fi":["Taksinkuljettaja, koska hänen täytyy täyttää hyvän asiakaspalvelun vaatimukset.","Aluehallintovirasto, koska viranomainen vastaa palvelun laadusta valvomalla toimintaa.","Taksiyrittäjä, koska hän on kouluttanut tarvittaessa kuljettajat","Tilausvälityskeskus, koska asiakas käyttää heidän palveluaan, vastuu asiakaskokemuksesta kuuluu heille."],"o_en":["The driver, because they must meet the requirements of good customer service","The Regional State Administrative Agency, since an authority is responsible by supervising","The taxi entrepreneur, since they trained the drivers when needed","The dispatch centre, since the customer uses their service, so the experience is on them"],"a":0},{"t":"Turvallisuus","q_fi":"Taksinkuljettaja Kari noutaa äidin ja vauvan neuvolasta. Äidillä on mukanaan selkä menosuuntaan asennettava turvaistuin. Hän kysyy Karilta, mihin istuin olisi parasta asentaa turvallisuuden kannalta. Miten vastaat?","q_en":"A mother has a rear-facing child seat and asks where it's best to install it for safety. How do you answer?","o_fi":["Peräkonttiin, koska siellä lapsi on parhaiten turvassa nokkakolaria ajatellen.","Etupenkille, koska kuljettaja voi silloin parhaiten valvoa lasta ja se on paras paikka peräänajotilanteita ajatellen.","Takapenkille, mieluiten auton keskipaikalle, koska se on törmäyksissä turvallisin paikka.","Takapenkille, koska on laitonta asettaa selkä menosuuntaan asennettava turvaistuin etupenkille."],"o_en":["In the boot, since the child is best protected there in a frontal crash","In the front, so the driver can watch the child and it's best for rear-end crashes","In the back, preferably the middle seat, since it's the safest place in a collision","In the back, because it's illegal to put a rear-facing seat in the front"],"a":2},{"t":"Turvallisuus","q_fi":"8-vuotias Inka nousee taksiisi koulun pihasta. Hän kertoo heti, ettei aio käyttää turvavyötä, koska \"se painaa ikävästi vatsaa\" ja isä kuulemma sanoi, ettei vyön käyttö ole niin tarkkaa. Kuinka toimit?","q_en":"Inka (8) says she won't use the belt because 'it presses on my tummy' and her dad said belts aren't that strict. How do you act?","o_fi":["Lähden ajamaan ja ajattelen, että lyhyt matka ilman vyötä tuskin haittaa.","Päätän olla puuttumatta asiaan, koska lapsen oma kokemus ratkaisee, eikä kuljettajan tarvitse alkaa \"kasvattajaksi\".","Varmistan, että Inka kiinnittää turvavyön asianmukaisesti ja kerron ystävällisesti, että turvavyön käyttö on aina pakollista lapselle, huoltajan mielipiteestä riippumatta.","Kehotan Inkaa laittamaan turvavyön päälle, mutta en kuitenkaan tarkasta päälle laittamista koska se on laitonta."],"o_en":["I set off thinking a short trip without a belt can hardly hurt","I decide not to intervene, since the child's own experience decides and the driver needn't be an 'educator'","I make sure Inka fastens the belt properly and kindly explain that belt use is always mandatory for a child, regardless of the guardian's opinion","I tell Inka to put the belt on but don't check that she did, since checking is illegal"],"a":2},{"t":"Turvallisuus","q_fi":"Eräänä iltapäivänä ajat taksiasi Helsingin keskustassa, kun kyydissä oleva asiakas pyytää sinua pysähtymään suoraan raitiovaunupysäkille, jossa on selkeästi pysähtymiskielto. Mitä teet?","q_en":"A customer asks you to stop right at a tram stop where stopping is clearly prohibited. What do you do?","o_fi":["Pysähdyn asiakkaan pyynnöstä pysäkille, koska asiakashan maksaa kyydin.","Kerron ystävällisesti asiakkaalle, että pysähtyminen on liikennemerkin mukaan kiellettyä, ja etsin heti lähimmän laillisen pysähdyspaikan.","Jätän asiakkaan kyydistä missä tahansa, koska taksinkuljettajilla on erityisoikeuksia asiakkaiden jättämispaikkojen suhteen.","Kiihdytän eteenpäin välittämättä asiakkaan pyynnöstä, koska minulla on kiire."],"o_en":["I stop at the stop as asked, since the customer is paying","I kindly tell the customer that stopping there is prohibited by the sign and immediately find the nearest legal spot","I drop the customer anywhere, since taxi drivers have special rights about drop-off spots","I accelerate on, ignoring the request, because I'm in a hurry"],"a":1},{"t":"Turvallisuus","q_fi":"Mikä seuraavista väittämistä pitää paikkansa?","q_en":"Which statement is correct?","o_fi":["Alkoholi vaikuttaa kuljettajan ajokykyyn, vaikka vaikutukset eivät aina tunnu selvästi.","Jos promilleraja ei ylity, kuljettaja voi itse arvioida ajokuntonsa luotettavasti.","Kuljettaja voi nauttia hieman alkoholia, jos ei ole suoraan lähdössä ajamaan.","Pieni määrä alkoholia ei vaikuta taksinkuljettajan vastuullisuuteen työssä."],"o_en":["Alcohol affects a driver's ability even when the effects aren't always clearly felt","If the blood-alcohol limit isn't exceeded, the driver can reliably judge their own fitness","The driver may have a little alcohol if not about to drive right away","A small amount of alcohol doesn't affect a driver's responsibility at work"],"a":0},{"t":"Turvallisuus","q_fi":"Aamuvuorosi alkaa varhain, ja työnantajasi on ilmoittanut sinulle rekisterinumeron mukaan, mikä auto on käytössäsi. Saapuessasi autolle huomaat, että yksi etuvaloista ei toimi, ja renkaiden kulutuspinnat ovat heikot. Kuka on vastuussa siitä, että auto täyttää tieliikennekelpoisuuden vaatimukset ennen ajoon lähtöä?","q_en":"Arriving at your assigned car, you find a front light out and worn tyres. Who is responsible for the car meeting roadworthiness requirements before driving?","o_fi":["Kuljettaja, koska hän on vastuussa siitä, että ajoneuvo on ajokunnossa ennen liikenteeseen lähtöä.","Asiakas, jos hän on tilannut kyydin ennakkoon.","Työnantaja, mutta vastuu korostuu vasta viranomaisen puututtua tilanteeseen.","Työnantaja, sillä hän omistaa auton ja hoitaa huollot."],"o_en":["The driver, since they're responsible that the vehicle is roadworthy before entering traffic","The customer, if they pre-ordered the ride","The employer, but responsibility arises only once an authority intervenes","The employer, since they own the car and handle servicing"],"a":0},{"t":"Turvallisuus","q_fi":"16-vuotias Elias menee päivittäin jalkapallotreeneihin taksilla. Vastaako kuljettaja vai Elias itse siitä, pitääkö hän turvavyötä päällään?","q_en":"16-year-old Elias goes daily to football by taxi. Is the driver or Elias responsible for whether he wears the belt?","o_fi":["Matkustaja itse, koska hän on lain mukaan velvollinen käyttämään turvavyötä.","Taksiliikenteen harjoittaja, koska matkustusturvallisuus kuuluu heidän vastuulleen.","Henkilö, joka varasi kyydin, koska hän toimii nuoren edustajana matkaa varten.","Kuljettaja, koska alaikäisen turvallisuus on aina hänen vastuullaan ajon aikana."],"o_en":["The passenger himself, since by law he is obliged to wear the belt","The taxi operator, since travel safety is their responsibility","The person who booked the ride, since they act as the youth's representative","The driver, since a minor's safety is always their responsibility during the trip"],"a":0},{"t":"Turvallisuus","q_fi":"Kenellä on vastuu 15 vuotta täyttäneen asiakkaan turvavyön käytöstä?","q_en":"Who is responsible for a customer aged 15 or over wearing the belt?","o_fi":["Vastuu on matkustajan huoltajalla, jos tämä on alle 18-vuotias.","Vastuu on aina kuljettajalla, matkustajan iästä riippumatta.","Vastuuta ei ole määritelty, kyse on vain suosituksesta.","Asiakkaalla."],"o_en":["The passenger's guardian, if they are under 18","Always the driver, regardless of the passenger's age","Responsibility isn't defined; it's only a recommendation","The customer"],"a":3},{"t":"Turvallisuus","q_fi":"Taksinkuljettajan työssä on noudatettava tiukkoja laatuvaatimuksia. Liikenteen palveluista annetun lain mukaan, keihin nämä laatuvaatimukset yleisimmin kohdistuvat?","q_en":"Under the Act on Transport Services, to whom do the quality requirements most commonly apply?","o_fi":["Ainoastaan ennakkotilauksia ajaviin kuljettajiin.","Kaikkiin taksinkuljettajiin, jotka tarjoavat taksipalvelua.","Ainoastaan suuriin taksiyrityksiin ja niiden kuljettajiin.","Vain tiettyihin kuljettajiin, kuten koulukuljetusten ajajiin."],"o_en":["Only drivers handling pre-orders","All taxi drivers who provide taxi service","Only large taxi firms and their drivers","Only certain drivers, such as those doing school transport"],"a":1},{"t":"Turvallisuus","q_fi":"Taksin ratissa työskentelevän kuljettajan turvallisuus on ensisijaisen tärkeää. Mikä seuraavista tekijöistä lisää eniten riskiä vakavaan loukkaantumiseen liikenneonnettomuudessa?","q_en":"Which factor most increases the risk of serious injury in a traffic accident?","o_fi":["Nopeusrajoitusten joustava tulkinta ruuhkassa.","Asiakkaan kanssa kommunikointi, koska se häiritsee ajotehtävää.","Asiakkaan määräämän pysähdyspaikan noudattamatta jättäminen.","Turvavyön pois jättäminen ajon aikana."],"o_en":["A flexible reading of speed limits in traffic","Communicating with the customer, since it distracts from driving","Not following the customer's chosen stopping place","Not wearing the seat belt while driving"],"a":3},{"t":"Turvallisuus","q_fi":"Missä seuraavista tilanteista tapahtuu onnettomuuksia eniten?","q_en":"In which situation do most accidents happen?","o_fi":["Moottoritielle liittymisessä.","Vilkkaasti liikennöidyn taajama-alueen ulkopuolella ajaessa.","Pysäköitäessä parkkipaikoilla.","Moottoritiellä ajaessa vakionopeudensäädin päällä."],"o_en":["Merging onto the motorway","Driving outside a busy built-up area","Parking in car parks","Driving on the motorway with cruise control on"],"a":0},{"t":"Turvallisuus","q_fi":"Seuraavassa on neljä väittämää, jotka liittyvät taksinkuljettajan vastuisiin ja matkustajien turvallisuuteen. Mikä seuraavista pitää paikkansa?","q_en":"Four statements about a driver's responsibilities and passenger safety. Which is correct?","o_fi":["Alkolukko on kuljettajalle pakollinen kaikissa ajoissa.","Taksinkuljettaja saa puhua kännykkään ajon aikana ilman handsfree-laitetta, jos asiakas ei ole kyydissä.","Yli 15-vuotias asiakas saa valita itse, käyttääkö turvavyötä vai ei.","Alle 135 cm pitkä lapsi on aina sijoitettava turvalaitteeseen taksimatkalla."],"o_en":["The alcohol interlock is mandatory for the driver on all trips","A driver may use a phone without handsfree while driving if no customer is aboard","A customer over 15 may choose whether to use the belt or not","A child under 135 cm must always be placed in a restraint on a taxi trip"],"a":3},{"t":"Turvallisuus","q_fi":"Modernit taksiautot ovat varustettu ajonvakautusjärjestelmillä, luistonestoilla ja muilla ajonhallintalaitteilla. Ne tukevat kuljettajaa erityisesti liukkailla keleillä. Mikä seuraavista väitteistä pitää paikkansa?","q_en":"Modern taxis have stability control, traction control and other aids that support the driver, especially on slippery roads. Which statement is correct?","o_fi":["Talvirenkaat ja järjestelmät yhdessä takaavat, että ajoneuvo pysyy hallinnassa jopa äkillisissä väistöissä liukkaalla.","Elektroniset järjestelmät parantavat ajoturvallisuutta, mutta eivät poista liukkauden vaikutusta. Kuljettajan on itse arvioitava tilanteeseen sopiva ajonopeus.","Jos ajoneuvossa on ajonvakautus, ei liukkaus vaikuta ajettavuuteen merkittävästi.","Ajonhallintajärjestelmät reagoivat aina nopeammin kuin kuljettaja, joten liukkaalla niihin voi täysin luottaa."],"o_en":["Winter tyres and the systems together guarantee the vehicle stays in control even in sudden swerves on ice","Electronic systems improve safety but don't remove the effect of slipperiness; the driver must judge a suitable speed","If the vehicle has stability control, slipperiness doesn't significantly affect handling","Control systems always react faster than the driver, so on ice you can fully rely on them"],"a":1},{"t":"Turvallisuus","q_fi":"Taksinkuljettaja Jari on ajovuorossa klo 07–17. Aamulla ennen ensimmäistä asiakasta hän tarkistaa auton kunnon ja siistii matkustamon. Iltapäivällä Jari pitää tunnin tauon, jonka aikana hän jää autoon odottamaan mahdollisia tilauksia. Mikä seuraavista väittämistä EI pidä paikkaansa hänen työajastaan?","q_en":"Jari drives 07:00–17:00, checks and cleans the car in the morning, and in the afternoon takes a one-hour break staying in the car waiting for orders. Which statement does NOT hold about his working time?","o_fi":["Ajoneuvon valmisteluun käytetty aika kuuluu työaikaan.","Tunnin taukoa, jonka aikana kuljettaja odottaa uusia tilauksia, ei lasketa työaikaan.","Taksinkuljettajan työaikaa säädellään lailla, ja ylitöitä ei voi tehdä vapaasti ilman rajoituksia.","Työaikaa on kaikki se aika, jolloin kuljettaja on työnantajan käytettävissä, vaikka ei aktiivisesti ajaisi asiakasta."],"o_en":["Time spent preparing the vehicle counts as working time","The one-hour break spent waiting for new orders is not counted as working time","A taxi driver's working time is regulated by law, and overtime can't be done freely without limits","Working time is all the time the driver is at the employer's disposal, even when not actively carrying a customer"],"a":1},{"t":"Turvallisuus","q_fi":"Mikä on ennakoivan ajotavan tärkein tavoite?","q_en":"What is the main goal of anticipatory driving?","o_fi":["Pitää nopeus tasaisena ja välttää kokonaan jarruttamista ruuhkassa.","Välttää onnettomuudet.","Oppia ajamaan siten liikenteessä, että kuluttaa mahdollisimman vähän polttoainetta.","Välttää vaaratilanteet."],"o_en":["To keep speed steady and avoid braking entirely in traffic","To avoid accidents","To learn to drive using as little fuel as possible","To avoid hazardous situations"],"a":3},{"t":"Turvallisuus","q_fi":"Taksillesi tulee tilaus lauantaiaamuna osoitteeseen Meritie 42. Tilauksen tiedoista näkyy, että kyytiin on tulossa kaksi aikuista. Saapuessasi paikalle huomaat, että yksi matkustajista pitää sylissään noin 2-vuotiasta lasta, eikä heillä ole mukana turvaistuinta tai istuinkoroketta. Miten toimit tilanteessa?","q_en":"On a Saturday-morning order for two adults, you find one holding a roughly 2-year-old and they have no child seat or booster. How do you act?","o_fi":["Kieltäydyn kuljettamasta asiakkaita, koska alle 3-vuotias lapsi ei saa matkustaa taksissa ilman asianmukaista turvalaitetta. Tilaan heille turvalaitteella varustetun taksin.","Voin ottaa matkustajat kyytiin, koska alle 3-vuotias saa poikkeustapauksessa matkustaa ilman turvalaitetta taksissa, jos sellaista ei ole saatavilla.","Suostun ajamaan matkan, jos vanhempi lupaa pitää lapsen sylissä koko ajon ajan.","Otan lapsen kyytiin, mutta sanon että hänen täytyy istua etupenkillä turvavyö päällään."],"o_en":["I refuse to carry them, since a child under 3 may not travel in a taxi without a proper restraint. I order them a taxi with a restraint","I can take them, since a child under 3 may exceptionally travel without a restraint in a taxi if none is available","I agree to drive if the parent promises to hold the child the whole way","I take the child but say they must sit in the front with a belt on"],"a":0},{"t":"Turvallisuus","q_fi":"Asiakkaasi haluaa jäädä kyydistä pois keskellä ruuhkaista katua, jossa ei ole turvallista pysähtyä. Miten toimit tilanteessa oikein?","q_en":"Your customer wants to get out in the middle of a busy street where it's unsafe to stop. How do you act correctly?","o_fi":["Vilautan hätävilkut päälle ja pysähdyn liikennevirtaan, koska takseille sallitaan poikkeuksia.","Noudatan asiakkaan toivetta ja pysäytän tien reunaan, vaikka se olisi liikenteelle vaarallinen paikka.","Kerron asiakkaalle, että en voi pysähtyä juuri siihen, mutta etsin lähimmän turvallisen pysähtymispaikan hänen poistumistaan varten.","Ehdotan asiakkaalle, että pysäytän suojatielle, koska jalankulkualueita saa käyttää taksiasiakkaiden kyytiin- ja poisjättöön."],"o_en":["I flash the hazards and stop in the traffic flow, since taxis are allowed exceptions","I follow the wish and stop at the edge even if it's a dangerous spot","I tell the customer I can't stop right there, but find the nearest safe stopping place for them to exit","I suggest stopping on a pedestrian crossing, since taxis may use pedestrian areas for pick-up and drop-off"],"a":2},{"t":"Turvallisuus","q_fi":"Leena aloittaa työvuoronsa klo 4.30 ja ajaa aamuisin aikaisia kyytejä työpaikoille. Leena työvuoro jatkuu iltapäivän puolelle asti. Milloin hänen on pidettävä ensimmäinen taukonsa työvuoron aikana?","q_en":"Leena starts at 04:30 and drives into the afternoon. When must she take her first break?","o_fi":["Viimeistään klo 10.00, koska yhtämittainen työaika saa kestää korkeintaan 5,5 tuntia.","Viimeistään klo 9.00, koska yhtämittainen työaika saa kestää korkeintaan 4,5 tuntia.","Kun asiakas pyytää pysähtymään.","Vain työnantajan määräyksestä, tai vaihtoehtoisesti työvuoron jälkeen."],"o_en":["By 10:00 at the latest, since continuous working time may last at most 5.5 hours","By 09:00 at the latest, since continuous working time may last at most 4.5 hours","When a customer asks to stop","Only on the employer's order, or after the shift"],"a":0},{"t":"Turvallisuus","q_fi":"Taksinkuljettajana sinun tulee huolehtia sekä omasta että asiakkaidesi turvallisuudesta. Onko sallittua työskennellä ilman taukoja tai lepoaikoja yhtäjaksoisesti jopa 15 tuntia?","q_en":"Is it allowed to work without breaks or rest continuously for up to 15 hours?","o_fi":["Ei, työaikalainsäädännön mukaan palkansaajan työaika on rajattu turvallisuuden vuoksi.","Kyllä, jos kuljettaja itse tuntee olonsa virkeäksi.","Kyllä, mikäli työnantaja sallii sen.","Kyllä, jos kyseessä on kiireinen työvuoro."],"o_en":["No, working-hours law limits an employee's working time for safety","Yes, if the driver feels alert","Yes, if the employer permits it","Yes, if it's a busy shift"],"a":0},{"t":"Turvallisuus","q_fi":"Mikä seuraavista neljästä väittämästä voi olla syynä taksinkuljettajan ajoluvan peruuttamiselle?","q_en":"Which of the following can be a reason for revoking the taxi driver permit?","o_fi":["Kuljettaja ei osaa keskustella asiakkaittensa kanssa sujuvasti suomeksi.","Ku er's style?","o_fi":["Käyttää vilkkua vain vaihtaessa kaistaa.","Ohittaa hidastelleen auton aina ilman harkintaa.","Sopeuttaa nopeutensa liikenne‑olosuhteisiin etukäteen.","Jarruttaa vasta, kun jalankulkija on suojatiellä."],"o_en":["Uses the indicator only when changing lanes","Always overtakes a slow car without thought","Adjusts speed to traffic conditions in advance","Brakes only once a pedestrian is on the crossing"],"a":2},{"t":"Kertaus","q_fi":"Miten tunnistat näkövammaisen asiakkaan?","q_en":"How do you recognise a visually impaired customer?","o_fi":["Hänellä on yleensä valkoinen keppi tai opaskoira.","Hän katsoo tarkasti, missä kävelee.","Hänellä on aina kuulokoje.","Hän nostaa käden ylös aina liikennevaloissa."],"o_en":["They usually have a white cane or guide dog","They look carefully at where they walk","They always have a hearing aid","They always raise a hand at traffic lights"],"a":0},{"t":"Kertaus","q_fi":"Milloin taksiajoneuvossa on pakollista olla alkolukko?","q_en":"When is an alcohol interlock mandatory in a taxi vehicle?","o_fi":["Silloin, kun ajetaan kunnan tilaamia koulu- ja päiväkotikuljetuksia.","Vain jos asiakas niin pyytää.","Jos ajoneuvolla ajetaan yli 8 tuntia vuorokaudessa.","Vain viikonloppuöinä tai juhlapyhinä."],"o_en":["When driving municipally ordered school and day-care transport","Only if the customer asks","If the vehicle is driven over 8 hours a day","Only on weekend nights or public holidays"],"a":0},{"t":"Kertaus","q_fi":"Mikä on Kela‑kyytien vuotuinen omavastuun maksukatto?","q_en":"What is the annual deductible cap for Kela trips?","o_fi":["400 €","300 €","200 €","150 €"],"o_en":["€400","€300","€200","€150"],"a":1},{"t":"Kertaus","q_fi":"Asiakas menee tajuttomaksi kyydin aikana. Mikä on kuljettajan oikea toimi?","q_en":"A customer becomes unconscious during the ride. What is the driver's correct action?","o_fi":["Pysähtyä, mutta odottaa ohjeita tilausvälityksestä.","Aloittaa elvytys.","Soittaa hätänumeroon ja aloittaa ensi
