ssenger gets their own belt that attaches to the vehicle, not to the wheelchair."},{t:"li",f:"Pelkkä jarrutus ei riitä; hihnoja ei saa kiinnittää löysästi; yksi tai kaksi hihnaa ei riitä.",e:"Braking alone is not enough; straps must not be loose; one or two straps are not enough."},{t:"li",f:"Vastuu kiinnityksestä on aina kuljettajalla, vaikka avustaja auttaisi. Hihnat säilytetään niille tarkoitetuissa paikoissa, etteivät ne aiheuta vammoja törmäyksessä.",e:"Responsibility for securing always lies with the driver, even if an assistant helps. Straps are stored in their proper places so they cause no injury in a crash."}]},{hf:"Lasten turvalaitteet",he:"Child restraints",it:[{t:"li",f:"Alle 3-vuotiaalla on oltava asianmukainen turvalaite; jos sitä ei ole, kuljetusta ei saa suorittaa. Selkä menosuuntaan asennettua turvaistuinta ei saa sijoittaa aktiivisen turvatyynyn eteen.",e:"A child under 3 must have a proper restraint; without it, the trip may not be performed. A rear-facing seat must not be placed in front of an active airbag."},{t:"li",f:"Yli 3-vuotias mutta alle 135 cm: saa matkustaa ilman turvalaitetta, kunhan käyttää turvavyötä eikä istu etuistuimella.",e:"Over 3 but under 135 cm: may travel without a restraint as long as they wear the belt and do not sit in the front seat."},{t:"li",f:"Yli 135 cm: voi matkustaa kuten aikuinen; turvavyö on pakollinen.",e:"Over 135 cm: may travel like an adult; the seat belt is mandatory."},{t:"li",f:"Kuljettajan vastuulla on kysyä ikä ja pituus, varmistaa turvalaitteen oikea asennus ja kieltäytyä ottamasta alle 3-vuotiasta ilman turvalaitetta.",e:"The driver must ask age and height, ensure correct fitting, and refuse to take a child under 3 without a restraint."}]},{hf:"4. Avustamisvelvollisuus",he:"4. Duty to assist",it:[{t:"p",f:"Vammaispalvelulaki edellyttää, että kuljettaja avustaa asiakasta kodin ovelta ajoneuvolle, autoon nousemisessa ja siitä poistumisessa sekä apuvälineiden, laukkujen tai pyörätuolin siirrossa. Kysy aina, tarvitseeko asiakas apua – älä tee oletuksia, mutta ole valmis auttamaan.",e:"The Disability Services Act requires the driver to assist the customer from the door to the vehicle, getting in and out, and moving aids, bags or the wheelchair. Always ask whether the customer needs help — don't assume, but be ready to help."}]},{hf:"5. Näkövammaiset asiakkaat",he:"5. Visually impaired customers",it:[{t:"li",f:"Tunnistat usein valkoisesta kepistä (kansainvälinen merkki) tai opaskoirasta; osalla on rintamerkki. Kaikki näkövammaiset eivät ole täysin sokeita.",e:"Often recognised by a white cane (an international sign) or a guide dog; some wear a badge. Not all visually impaired people are fully blind."},{t:"li",f:"Kohtaaminen: lähesty rauhallisesti, esittele itsesi taksinkuljettajana, kerro ajoneuvon sijainti ja kysy, mille penkille asiakas haluaa.",e:"Meeting: approach calmly, introduce yourself as the taxi driver, describe where the car is and ask which seat they prefer."},{t:"li",f:"Opaskoira saa matkustaa matkustamossa tai tavaratilassa; varmista riittävä tila.",e:"The guide dog may travel in the cabin or the boot; ensure enough room."},{t:"li",f:"Kysy, miten asiakas haluaa tulla autetuksi; tarjoa käsivarttasi, jos hän toivoo, ja kysy määränpäässä avusta ulkona.",e:"Ask how the customer wants to be helped; offer your arm if they wish, and ask at the destination about help outside."}]},{hf:"Yhteenveto",he:"Summary",it:[{t:"p",f:"Kuljettajalta vaaditaan lain ja ohjeiden tuntemusta, empaattista ja huolellista asiakaspalvelua sekä avuliaisuutta ja turvallisuusajattelua.",e:"The driver needs knowledge of the law and instructions, empathetic and careful customer service, and helpfulness and a safety mindset."}]}]},{tf:"Oppitunti 5: Kuljetusten turvallisuus ja liikennesäännöt",te:"Lesson 5: Transport safety and traffic rules",secs:[{hf:"",he:"",it:[{t:"p",f:"Ammattiuran aikana kuljettaja todennäköisesti joutuu osalliseksi onnettomuuteen, saapuu ensimmäisenä onnettomuuspaikalle tai kohtaa asiakkaan sairaskohtauksen. Siksi on hallittava sekä ajoturvallisuus että hätätilanteissa toimiminen. Turvallisuus on vastuullista ajattelua ja ihmisten hyvinvoinnista huolehtimista.",e:"During a career a driver will likely be involved in an accident, arrive first at a scene, or meet a customer's medical emergency. So one must master both driving safety and acting in emergencies. Safety is responsible thinking and caring for people's wellbeing."}]},{hf:"Ennakoiva ajotapa",he:"Anticipatory driving",it:[{t:"p",f:"Ennakoiva ajotapa tarkoittaa kykyä nähdä vaaratilanteet ennen niiden syntymistä. Se estää onnettomuuksia, parantaa matkustusmukavuutta, pienentää polttoaineen kulutusta ja antaa ammattimaisen kuvan.",e:"Anticipatory driving means seeing hazards before they arise. It prevents accidents, improves comfort, cuts fuel use, and gives a professional impression."}]},{hf:"Turvavyön käyttö",he:"Seat-belt use",it:[{t:"li",f:"Tutkijalautakuntien mukaan noin kolmannes turvavyöttä menehtyneistä olisi voinut säilyä hengissä vyötä käyttämällä. Vyö yhdessä turvatyynyn kanssa on tehokkain keino vähentää vammoja.",e:"According to investigation boards, about a third of belt-less fatalities could have survived by wearing a belt. The belt together with the airbag is the most effective way to reduce injuries."},{t:"li",f:"Alle 15-vuotiaiden on käytettävä turvavyötä tai asianmukaista turvalaitetta, ja kuljettaja vastaa valvonnasta. 15 vuotta täyttäneen vastuu vyön käytöstä on asiakkaalla itsellään.",e:"Those under 15 must use a belt or proper restraint, and the driver is responsible for supervising this. For those aged 15+, responsibility for belt use lies with the passenger."},{t:"li",f:"Alle 3-vuotiasta ei saa kuljettaa taksissa ilman turvalaitetta.",e:"A child under 3 may not be carried in a taxi without a restraint."}]},{hf:"Toiminta onnettomuustilanteessa",he:"Acting at an accident scene",it:[{t:"li",f:"Turvaa oma ja muiden henki: pysäytä turvallisesti, laita hätävilkut, pue heijastinliivi, lähesty rauhallisesti.",e:"Secure your own and others' lives: stop safely, put on hazard lights, wear a hi-vis vest, approach calmly."},{t:"li",f:"Arvioi tilanne: onko loukkaantuneita ja kuinka monta, kuinka vakavaa.",e:"Assess: are there injured, how many, how serious."},{t:"li",f:"Hälytä apua: soita 112 ja kerro mitä on tapahtunut, missä tarkalleen olet ja kuinka monta loukkaantunutta. Noudata ohjeita äläkä sulje puhelua ennen lupaa.",e:"Call for help: dial 112 and say what happened, exactly where you are, and how many are injured. Follow instructions and don't hang up before permitted."},{t:"li",f:"Turvaa tapahtumapaikka (varoituskolmio), pelasta hengenvaarassa olevat ja aloita ensiapu: turvaa hengitys, tyrehdytä verenvuodot, noudata hätäkeskuksen ohjeita.",e:"Secure the scene (warning triangle), rescue those in mortal danger, and start first aid: secure breathing, stop bleeding, follow the emergency centre's instructions."}]},{hf:"Ensiapu",he:"First aid",it:[{t:"p",f:"Ensiapu on välitöntä apua ennen ammattilaisen saapumista. Kuljettaja ei ole terveydenhuollon työntekijä mutta voi olla ensimmäinen paikalla; lain mukaan apua ei saa jättää antamatta. Vakavia merkkejä: runsas verenvuoto, tajuttomuus, hengityksen pysähtyminen, ei merkkejä verenkierrosta. Auta ensin niitä, joiden henki on suurimmassa vaarassa.",e:"First aid is immediate help before professionals arrive. The driver is not a healthcare worker but may be first on the scene; by law, help must not be withheld. Serious signs: heavy bleeding, unconsciousness, stopped breathing, no signs of circulation. Help first those in the greatest danger."}]},{hf:"Äkillinen sairaskohtaus asiakkaalla",he:"Sudden illness of a customer",it:[{t:"p",f:"Asiakas voi saada rintakipua, hengitysvaikeuksia tai mennä tajuttomaksi. Toimi näin: pysäytä turvallisesti, kysy lääkkeistä, soita 112 ja kerro oireet selkeästi, älä jätä asiakasta yksin, pysy rauhallisena. Jos hengitys loppuu, soita uudelleen ja aloita elvytys.",e:"A customer may have chest pain, breathing difficulty or lose consciousness. Do this: stop safely, ask about medication, call 112 and state the symptoms clearly, don't leave the customer alone, stay calm. If breathing stops, call again and start resuscitation."}]},{hf:"Liikennesäännöt ja taksin oikeudet",he:"Traffic rules and taxi privileges",it:[{t:"li",f:"Taksikaistat: joissain kaupungeissa on takseille sallittuja kaistoja, joita saa käyttää vain taksiliikenteessä.",e:"Taxi lanes: some cities have lanes allowed for taxis, usable only while in taxi service."},{t:"li",f:"Taksipysäkit: takseilla on oikeus pysähtyä ja odottaa asiakkaita merkityillä taksiasemilla.",e:"Taxi stands: taxis may stop and wait for customers at marked taxi ranks."}]},{hf:"Kuljettajan työturvallisuus",he:"Driver's occupational safety",it:[{t:"li",f:"Riskejä: asiakkaiden uhkaava käytös, liikenteen vaarat ja kiire, pitkä istuminen (selkä ja niska), epäsäännölliset työajat ja yksintyöskentely.",e:"Risks: threatening customer behaviour, traffic hazards and haste, long sitting (back and neck), irregular hours and working alone."},{t:"li",f:"Työkyvyn ylläpito: säännölliset tauot, liikunta ja terveellinen ruoka, riittävä uni, ja stressin purku työvuorojen ulkopuolella – älä jää yksin kuormittavien kokemusten kanssa.",e:"Maintaining fitness for work: regular breaks, exercise and healthy food, enough sleep, and relieving stress outside shifts — don't be left alone with stressful experiences."}]},{hf:"Hätävarjelu",he:"Self-defence",it:[{t:"p",f:"Jos oma turvallisuus on uhattuna (asiakas käy käsiksi tai uhkaa väkivallalla), kuljettajalla on oikeus puolustautua, mutta vain tilanteeseen nähden kohtuullisesti. Pelkkä suullinen uhkailu ei oikeuta lyömistä. Toimi puolustavasti, älä hyökkäävästi; vältä fyysistä konfliktia ja poistu jos voit. Soita tarvittaessa 112 ja raportoi tapahtuma työnantajalle tai tilausvälityskeskukselle.",e:"If your safety is threatened (a customer grabs you or threatens violence), you may defend yourself, but only reasonably in proportion to the situation. Mere verbal threats don't justify hitting. Act defensively, not offensively; avoid physical conflict and leave if you can. Call 112 if needed and report it to the employer or dispatch centre."}]},{hf:"Yhteenveto",he:"Summary",it:[{t:"li",f:"Noudata liikennesääntöjä ja turvallista ajotapaa.",e:"Obey traffic rules and drive safely."},{t:"li",f:"Varmista turvavyön käyttö ja ajoneuvon kunto.",e:"Ensure seat-belt use and the vehicle's condition."},{t:"li",f:"Toimi hätätilanteessa määrätietoisesti ja rauhallisesti.",e:"Act decisively and calmly in an emergency."}]}]},{tf:"Oppitunti 6: Kertaus – tärkeimmät muistettavat",te:"Lesson 6: Revision — the key points to remember",secs:[{hf:"Kokeesta",he:"About the exam",it:[{t:"li",f:"Koe mittaa ammatillista osaamista, lakitietämystä, asiakaspalvelutaitoja ja kykyä toimia erityisryhmien kanssa.",e:"The exam measures professional competence, legal knowledge, customer-service skills and the ability to work with special groups."},{t:"li",f:"Kokeessa testataan käytännön tilanteita – pelkkä ulkoa opettelu ei riitä; ymmärrä, miksi säännöt ovat olemassa.",e:"The exam tests practical situations — rote learning isn't enough; understand why the rules exist."}]},{hf:"Ammatti",he:"The profession",it:[{t:"li",f:"Ajolupa edellyttää ammattipätevyyden osoittamista (koe) ja rikostaustan tarkistusta tietyissä kuljetuksissa (esim. koulukuljetukset).",e:"The permit requires proving competence (the exam) and a criminal-background check in certain transport (e.g. school transport)."},{t:"li",f:"Ajopäiväkirjaa on ylläpidettävä ja ajoneuvon kunnosta huolehdittava.",e:"A driving log must be kept and the vehicle's condition maintained."}]},{hf:"Asiakaspalvelu",he:"Customer service",it:[{t:"li",f:"Hyvä palvelu perustuu kohteliaisuuteen, kuuntelemiseen ja rauhalliseen toimintaan; erilaiset asiakkaat vaativat erilaisen lähestymistavan.",e:"Good service rests on courtesy, listening and calm conduct; different customers need different approaches."},{t:"li",f:"Ammattimaisuus välittyy käytöksessä, pukeutumisessa ja siistissä ajoneuvossa.",e:"Professionalism shows in behaviour, dress and a clean vehicle."}]},{hf:"Erityisryhmät",he:"Special groups",it:[{t:"li",f:"Pyörätuoli kiinnitetään aina neljästä rungon pisteestä; turvavyö kiinnitetään ajoneuvoon, ei pyörätuoliin.",e:"A wheelchair is always secured at four frame points; the belt attaches to the vehicle, not the wheelchair."},{t:"li",f:"Alle 3-vuotiasta ei saa kuljettaa ilman turvalaitetta; alle 135 cm lapsi vain takapenkillä (turvavyö riittää).",e:"A child under 3 may not be carried without a restraint; a child under 135 cm only in the back seat (belt suffices)."},{t:"li",f:"Näkövammaiset tunnistetaan valkoisesta kepistä tai opaskoirasta; esittele itsesi ja tarjoa apua.",e:"The visually impaired are identified by a white cane or guide dog; introduce yourself and offer help."},{t:"li",f:"Koulukuljetuksissa noudatetaan tarkkoja reittejä ja aikatauluja; kaikki käyttävät vyötä; ilmoita, jos lapsi ei saavu pysäkille.",e:"School transport follows exact routes and schedules; all wear belts; report if a child doesn't reach the stop."}]},{hf:"Turvallisuus ja maksaminen",he:"Safety and payment",it:[{t:"li",f:"Hätätilanteessa: pysäytä turvallisesti, hälytä apua (112), aloita ensiapu jos osaat, turvaa paikka. Auttamisvelvollisuus on jokaisella – laiminlyönti on rangaistavaa.",e:"In an emergency: stop safely, call help (112), start first aid if able, secure the scene. Everyone has a duty to help — neglect is punishable."},{t:"li",f:"Maksaminen: kokonaishinta kerrottava ennen matkaa, kuitti pakollinen, käteinen ja yleisimmät kortit hyväksyttävä.",e:"Payment: state the total price before the trip, a receipt is mandatory, cash and common cards must be accepted."}]},{hf:"Tärkeimmät muistettavat",he:"The key takeaways",it:[{t:"li",f:"Kuljettajalla on avustamisvelvollisuus, etenkin esteettömissä kuljetuksissa.",e:"The driver has a duty to assist, especially in accessible transport."},{t:"li",f:"Turvallisuus ja hyvä palvelu ovat osa ammattitaitoa.",e:"Safety and good service are part of professional skill."},{t:"li",f:"Toimi vastuullisesti myös yllättävissä tilanteissa: hätävarjelun pelisäännöt ja turvallisuuden jatkuva arviointi kuuluvat työhön.",e:"Act responsibly even in surprising situations: the rules of self-defence and continuous safety assessment are part of the job."}]}]}];const COURSEQUIZ=[{"t":"Kokeen perusteet","q_fi":"Kuinka monta kysymystä kokeessa on yhteensä?","q_en":"How many questions are in the exam in total?","o_fi":["70","40","60","50"],"o_en":["70","40","60","50"],"a":3},{"t":"Kokeen perusteet","q_fi":"Kuinka kauan taksinkuljettajan ajolupa on voimassa?","q_en":"How long is the taxi driver permit valid?","o_fi":["3 vuotta","Toistaiseksi voimassaoleva","2 vuotta","5 vuotta"],"o_en":["3 years","Valid indefinitely","2 years","5 years"],"a":3},{"t":"Kokeen perusteet","q_fi":"Mikä seuraavista on yksi ehto ennen ajoluvan hakemista?","q_en":"Which of the following is a condition before applying for the permit?","o_fi":["Työhaastattelu traficomin kanssa","Vähintään kolme vuotta ajokokemusta","Liikenneturvallisuuskurssin läpäisy","Vähintään vuoden voimassa ollut B-luokan ajo-oikeus"],"o_en":["A job interview with Traficom","At least three years of driving experience","Passing a traffic-safety course","A category B licence held for at least one year"],"a":3},{"t":"Kokeen perusteet","q_fi":"Mikä seuraavista tulee tehdä ENNEN kuin voit hakea ajolupaa?","q_en":"Which must be done BEFORE you can apply for the permit?","o_fi":["Täytyy olla vähintään 3 vuoden kokemus alalta","Traficomille täytyy antaa lupa verotietojen tarkastamista varten","Ajoneuvo täytyy rekisteröidä taksiliikenteeseen","Ajoterveysvaatimusten läpäiseminen ja lääkärintodistuksen antaminen traficomille"],"o_en":["Having at least 3 years' experience in the field","Giving Traficom permission to check tax data","The vehicle must be registered for taxi traffic","Passing the medical fitness requirements and giving Traficom a medical certificate"],"a":3},{"t":"Kokeen perusteet","q_fi":"Missä taksinkuljettajan koe suoritetaan?","q_en":"Where is the taxi driver exam taken?","o_fi":["Traficomin verkkosivuilla","Ajovarman palvelupisteessä","Poliisilaitoksella","Ajokorttikoulutuskeskuksessa"],"o_en":["On Traficom's website","At an Ajovarma service point","At a police station","At a driving-school centre"],"a":1},{"t":"Kokeen perusteet","q_fi":"Kuinka monta pistettä täytyy vähintään saada koko kokeessa, jotta sen läpäisee?","q_en":"How many points at minimum are needed to pass the whole exam?","o_fi":["45","35","38","42"],"o_en":["45","35","38","42"],"a":2},{"t":"Kokeen perusteet","q_fi":"Millä perusteella koe arvioidaan hyväksytyksi?","q_en":"On what basis is the exam judged a pass?","o_fi":["Kun sekä kokonaispistemäärä että aihealueiden vähimmäispisteet täyttyvät","Vain kokonaistuloksen perusteella","Vain aihekohdan pisteiden perusteella","Kun vähintään 90 % vastauksista on oikein"],"o_en":["When both the total score and the per-topic minimums are met","Only on the total result","Only on per-topic points","When at least 90% of answers are correct"],"a":0},{"t":"Kokeen perusteet","q_fi":"Kuinka monta minuuttia kestää normaali taksinkuljettajan koe?","q_en":"How many minutes does a normal taxi driver exam last?","o_fi":["60 minuuttia","30 minuuttia","45 minuuttia","90 minuuttia"],"o_en":["60 minutes","30 minutes","45 minutes","90 minutes"],"a":2},{"t":"Kokeen perusteet","q_fi":"Kuinka monta pistettä täytyy saada aihealueesta \"Taksipalvelujen asiakaspalvelutilanteet\", jotta koe hyväksytään?","q_en":"How many points are needed in the topic 'taxi customer-service situations' for a pass?","o_fi":["6","8","7","5"],"o_en":["6","8","7","5"],"a":2},{"t":"Kokeen perusteet","q_fi":"Jos hakija on täyttänyt 68 vuotta, mikä hänen tulee toimittaa ajolupahakemuksen liitteeksi?","q_en":"If the applicant has turned 68, what must they attach to the permit application?","o_fi":["Laajennettu lääkärinlausunto","Tavanomainen lääkärinlausunto","Silmälääkärin erikoislausunto","Työterveyshuollon suositus"],"o_en":["An expanded medical certificate","An ordinary medical certificate","An ophthalmologist's special statement","An occupational-health recommendation"],"a":0},{"t":"Ammatti ja säännöt","q_fi":"Helena on lähdössä lääkäriasemalle ja on oikeutettu Kelan korvaamaan taksimatkaan. Hänellä ei kuitenkaan ole vakiotaksioikeutta. Helena ei ole aiemmin tilannut Kelan matkaa ja haluaa toimia oikein saadakseen korvauksen matkasta. Miten Helenan tulee tilata taksimatka?","q_en":"Helena is going to a clinic and is entitled to a Kela-reimbursed taxi trip, but has no regular-taxi right and has never ordered a Kela trip. How should she order the taxi?","o_fi":["Varaamalla kyyti sähköpostilla suoraan terveydenhuollosta.","Pyytämällä ensimmäistä vapaata taksia kadulta ja maksamalla itse, jolloin Kela maksaa koko summan jälkikäteen.","Soittamalla itse valitsemalleen taksiyrittäjälle ja pyytämällä tätä ilmoittamaan matkan Kelaan.","Soittamalla Kelan alueelliseen tilausvälityskeskukseen, josta matka tilataan ja korvaus muodostuu oikein."],"o_en":["By booking by email directly from the healthcare unit","By hailing the first free taxi and paying herself, with Kela paying the full sum afterwards","By calling a taxi entrepreneur of her choice and asking them to report the trip to Kela","By calling Kela's regional dispatch centre, where the trip is ordered and the reimbursement is formed correctly"],"a":3},{"t":"Ammatti ja säännöt","q_fi":"Olet aloittamassa työvuoroasi taksiyrityksessä, jossa toimit työsuhteessa. Ennen ajoa sinua muistutetaan ajopäiväkirjan täyttämisestä. Mitä siihen tulee muun muassa merkitä?","q_en":"You are starting a shift as an employed driver and are reminded to fill the driving log. What, among other things, must be recorded in it?","o_fi":["Polttoaineen kulutus jokaisella ajokerran aikana.","Käytetyn maksutavan tyyppi ja asiakkaan antama arvio palvelun laadusta.","Jokaisen asiakkaan nimi tai henkilötunnus mahdollisten reklamaatioiden varalta.","Työvuoron alkamis- ja päättymisaika sekä pidetyt tauot."],"o_en":["Fuel consumption on each trip","The payment method used and the customer's rating of the service","Each customer's name or ID in case of complaints","The shift's start and end times and the breaks taken"],"a":3},{"t":"Ammatti ja säännöt","q_fi":"Taksinkuljettajille tarjotaan koulutusta erityisryhmien, kuten liikunta- tai aistivammaisten henkilöiden, turvalliseen ja laadukkaaseen kuljettamiseen. Mikä seuraavista väittämistä ei vastaa koulutuksen todellista luonnetta tai sisältöä?","q_en":"Drivers are offered training for safely transporting special groups. Which statement does NOT match the real nature of the training?","o_fi":["Koulutus on vapaaehtoista, mutta monissa kilpailutetuissa kuljetuksissa sen suorittaminen voi olla edellytys.","Koulutus on pakollinen kaikille taksinkuljettajille ja sen suorittaminen on edellytys ajoluvan saamiselle.","Koulutuksen tavoitteena on kehittää kuljettajan osaamista erityistä tukea tarvitsevien asiakkaiden kohtaamisessa ja avustamisessa","Koulutus voidaan suorittaa erillisenä lisäpätevyyskoulutuksena, eikä se sisälly automaattisesti taksinkuljettajan peruskoulutukseen"],"o_en":["The training is voluntary, but in many tendered contracts completing it can be a requirement","The training is mandatory for all drivers and completing it is a condition for getting the permit","The training aims to develop the driver's skills in meeting and assisting customers needing special support","It can be taken as a separate additional-qualification course and is not automatically part of basic driver training"],"a":1},{"t":"Ammatti ja säännöt","q_fi":"Suoritat aamulla sosiaalihuollon järjestämän kuljetuksen. Määränpäähän saavuttaessa, asiakas kertoo unohtaneensa lompakkonsa ja kyselee, pitääkö omavastuu maksaa nyt vai myöhemmin. Mikä seuraavista pitää paikkansa?","q_en":"On a social-services trip the customer says they forgot their wallet and asks whether the deductible is paid now or later. Which is correct?","o_fi":["Omavastuuta ei tarvitse periä lainkaan, jos kyseessä on tuttu asiakas tai asiakas vaikuttaa luotettavalta","Omavastuu määräytyy asiakkaan tulojen ja omaisuuden perusteella, joten kuljettajan tulee tarkistaa taustatiedot ennen perintää.","Omavastuu laskutetaan kelalta ajon suorittamisen jälkeen.","Omavastuun määrä ilmoitetaan normaalisti jo tilausvaiheessa, ja kuljettajan tehtävänä on periä se matkustajalta matkan päättyessä."],"o_en":["The deductible need not be collected at all if the customer is familiar or seems trustworthy","The deductible depends on the customer's income and assets, so the driver should check their background before collecting","The deductible is billed from Kela after the trip","The deductible amount is normally stated already at ordering, and the driver collects it from the passenger at the end of the trip"],"a":3},{"t":"Ammatti ja säännöt","q_fi":"Miro on ajanut osa-aikaisesti taksia opiskelujensa ohella jo reilut kolme ja puoli vuotta. Nyt hän on elämäntilanteen muutoksen takia muuttamassa toiselle paikkakunnalta ja aikoo lopettaa taksityöt. Mikä on Miron lakisääteinen irtisanomisaika?","q_en":"Miro has driven a taxi part-time alongside his studies for a good three and a half years and is now quitting. What is his statutory notice period?","o_fi":["14 päivää","Työntekijä voi lopettaa työt heti","1 kuukausi","3 kuukautta"],"o_en":["14 days","An employee may quit immediately","1 month","3 months"],"a":0},{"t":"Ammatti ja säännöt","q_fi":"Mikä taho myöntää taksinkuljettajan ajoluvan?","q_en":"Which body grants the taxi driver permit?","o_fi":["Liikenne- ja viestintävirasto Traficom","Poliisi","Kunnan tekninen toimi","Suomen Taksiliitto ry"],"o_en":["The Finnish Transport and Communications Agency Traficom","The police","The municipality's technical department","The Finnish Taxi Association"],"a":0},{"t":"Ammatti ja säännöt","q_fi":"Minkälaisia ominaisuuksia ja valmiuksia vaaditaan kuljettajalta, joka ajaa Kelan korvaamia kuljetuksia?","q_en":"What qualities and capabilities are required of a driver doing Kela-reimbursed trips?","o_fi":["Kuljettajan on oltava koulutettu avustaviin tehtäviin, toimittava huomaavaisesti ja noudatettava tarkasti Kelan ohjeistuksia.","Kuljettajan tulee olla ripeä ja sosiaalinen, jotta asiakas kokee kyytiin tulevansa huomioiduksi.","Kuljettajan tärkein tehtävä on ajaa mahdollisimman nopeasti, jotta ehtii suorittaa kaikki päivän ajot aikataulussa.","Kuljettajan ei tarvitse odottaa asiakasta tai avustaa häntä, koska Kela maksaa vain matkan, ei lisäpalveluita."],"o_en":["The driver must be trained for assisting tasks, act considerately and follow Kela's instructions closely","The driver should be brisk and sociable so the customer feels noticed","The driver's main task is to drive as fast as possible to keep on schedule","The driver need not wait for or assist the customer, since Kela pays only for the trip"],"a":0},{"t":"Ammatti ja säännöt","q_fi":"Ennen taksinkuljettajan ajoluvan myöntämistä on varmistettava, että hakijalla on riittävästi kokemusta henkilöauton kuljettamisesta. Kuinka kauan hakijan on pitänyt omistaa B-luokan ajo-oikeus ennen taksinkuljettajan ajolupahakemuksen käsittelyä?","q_en":"How long must the applicant have held a category B licence before the permit application is processed?","o_fi":["Kolmen vuoden verran.","Vähintään yhden vuoden verran.","Vähintään kuuden kuukauden verran.","Ei ole ennalta määrättyä aikaa, lupaa saa hakea heti ajokortin saamisen jälkeen"],"o_en":["About three years","At least one year","At least six months","No set time; you can apply right after getting the licence"],"a":1},{"t":"Ammatti ja säännöt","q_fi":"Taksiliikenneluvan myöntämiseen liittyy tiukat rehellisyys- ja luotettavuusvaatimukset. Kenelle lupaa ei voida myöntää?","q_en":"Taxi licensing has strict honesty and reliability requirements. To whom can a licence NOT be granted?","o_fi":["Hakijalle, joka pystyy osoittamaan ammatillisen pätevyyden ja taloudellisen kantokyvyn.","Yritykselle, jonka vastuuhenkilö täyttää kaikki vaaditut ehdot.","Henkilölle, joka on syyllistynyt esimerkiksi liikenneturvallisuuden vaarantamiseen luvan hakuvuonna.","Yhteisölle, jolla on voimassa oleva Y-tunnus ja tarvittavat vakuutukset."],"o_en":["An applicant who can show professional competence and financial capacity","A company whose responsible person meets all requirements","A person guilty of, for example, endangering traffic safety in the year of application","An entity with a valid Business ID and the required insurance"],"a":2},{"t":"Ammatti ja säännöt","q_fi":"Taksinkuljettajana työskentely vaatii hyvää fyysistä ja henkistä kuntoa. Ennen ajoluvan myöntämistä vaaditaan, että hakija todistaa täyttävänsä tietyt terveysvaatimukset. Miten tämä vaatimus käytännössä varmistetaan?","q_en":"How is the health requirement verified in practice before the permit is granted?","o_fi":["Lääkärin tekemällä terveystarkastuksella ja siitä annettavalla virallisella todistuksella.","Hakijan itsearvioinnilla ja omalla ilmoituksella terveydentilastaan.","Asiakkaiden palautteella ja työnantajan arvion perusteella.","Poliisin suorittamalla haastattelulla ja taustatarkistuksella."],"o_en":["By a doctor's health check and an official certificate issued on it","By the applicant's self-assessment and own declaration of health","By customer feedback and the employer's assessment","By a police interview and background check"],"a":0},{"t":"Ammatti ja säännöt","q_fi":"Kuinka pitkäksi aikaa rattijuopumuksesta tuomitulla on ajo-oikeus estettynä ennen kuin hän voi hakea taksinkuljettajan ajolupaa uudelleen?","q_en":"For how long is the driving right blocked for someone convicted of drunk driving before they can reapply for the taxi driver permit?","o_fi":["5 vuotta.","Kuljettaja saa pitää ajoluvan, jos tekee rikoksen ensimmäistä kertaa.","Enintään 1 vuoden.","Enintään 3 vuotta."],"o_en":["5 years","The driver keeps the permit if it is a first offence","At most 1 year","At most 3 years"],"a":0},{"t":"Ammatti ja säännöt","q_fi":"Kuinka pitkä on taksinkuljettajan pisin sallittu ajoaika ilman lepoa tai taukoja?","q_en":"What is the longest driving time allowed without rest or breaks?","o_fi":["5,5 tuntia","3,5 tuntia","6,5 tuntia","4,5 tuntia"],"o_en":["5.5 hours","3.5 hours","6.5 hours","4.5 hours"],"a":0},{"t":"Ammatti ja säännöt","q_fi":"Asiakkaasi kysyy matkan aikana, voiko hän hakea vakiotaksioikeutta Kela- kyyteihin, koska kokee vaihtuvien kuljettajien aiheuttavan stressiä ja epävarmuutta. Hän ei ole varma, miten asia etenee. Miten neuvot asiakasta?","q_en":"A customer asks during the trip about applying for a regular-taxi right for Kela trips because changing drivers causes stress. How do you advise them?","o_fi":["Kela myöntää vakiotaksin automaattisesti yli 65-vuotiaille asiakkaille, jos he käyttävät taksia säännöllisesti.","Kela ei enää myönnä vakiotaksioikeuksia, vaan kuljettaja määräytyy aina satunnaisesti.","Neuvon asiakasta ottamaan yhteyttä Kelan asiakaspalveluun, josta saa ohjeet vakiotaksioikeuden hakemiseen.","Suosittelen asiakasta pyytämään kuljettajaa kirjallisesti ja tuomaan pyynnön seuraavalla kerralla."],"o_en":["Kela grants a regular taxi automatically to customers over 65 who use taxis regularly","Kela no longer grants regular-taxi rights; the driver is always random","I advise contacting Kela customer service, which gives instructions for applying for the regular-taxi right","I advise asking the driver in writing and bringing the request next time"],"a":2},{"t":"Ammatti ja säännöt","q_fi":"Missä maantieteellisesti taksinkuljettajan ajolupa oikeuttaa ajamaan taksia?","q_en":"Geographically, where does the taxi driver permit entitle you to drive a taxi?","o_fi":["Vain sillä alueella, jossa kuljettaja on kirjoilla vakituisesti.","Ainoastaan siinä kunnassa, johon lupa on alun perin myönnetty.","Ainoastaan suurimmissa kaupungeissa, joissa on järjestetty julkinen tilausvälitysjärjestelmä","Koko Manner-Suomen alueella."],"o_en":["Only in the area where the driver is officially registered as resident","Only in the municipality where the permit was originally granted","Only in the largest cities with a public dispatch system","Throughout mainland Finland"],"a":3},{"t":"Ammatti ja säännöt","q_fi":"Miten taksiliikenteen hinnoittelun on lakisääteisesti toimittava asiakkaan näkökulmasta?","q_en":"How must taxi pricing legally work from the customer's perspective?","o_fi":["Asiakkaalle on ilmoitettava hinnat etukäteen selkeästi ennen matkan alkamista, ellei käytetä taksamittaria.","Taksin hinnasto tarvitsee olla näkyvissä vain, jos asiakas sitä pyytää.","Taksinkuljettajalla ei ole velvollisuutta kertoa hinnasta, jos hinta jää alle 30 euron.","Hinnan voi sopia vasta matkan aikana, jos asiakas vaikuttaa kiireiseltä."],"o_en":["Prices must be told clearly in advance before the trip begins, unless a taximeter is used","The price list need be visible only if the customer asks","The driver has no duty to state the price if it stays under €30","The price may be agreed only during the trip if the customer seems in a hurry"],"a":0},{"t":"Ammatti ja säännöt","q_fi":"Kuka voi peruuttaa taksinkuljettajan ajoluvan viranomaispäätöksellä?","q_en":"Who can revoke the taxi driver permit by an official decision?","o_fi":["Asiakas","Työnantaja","Liikenne- ja viestintävirasto (Traficom)","Poliisi"],"o_en":["The customer","The employer","The Finnish Transport and Communications Agency (Traficom)","The police"],"a":3},{"t":"Ammatti ja säännöt","q_fi":"Petri sai taksinkuljettajan ajoluvan neljä vuotta sitten, kun hän asui ja työskenteli Lahdessa. Nyt elämäntilanne on muuttunut, ja Petri on muuttamassa pysyvästi Ouluun. Hän on jo sopinut työhaastattelusta oululaisen taksiyrittäjän kanssa. Voiko Petri aloittaa taksinkuljettajan työn Oulussa ilman lisätoimenpiteitä?","q_en":"Petri got his permit four years ago in Lahti and is moving permanently to Oulu, where he has a job interview. Can he start driving in Oulu without extra steps?","o_fi":["Ei, ellei poliisi myönnä poikkeuslupaa alueen vaihtoon.","Ei, koska ajolupa on sidottu alkuperäiseen asemapaikkaan.","Kyllä, taksinkuljettajan ajolupa oikeuttaa ajamaan taksia koko Manner-Suomen alueella riippumatta siitä, missä kaupungissa lupa on alun perin myönnetty.","Kyllä, mutta vasta kun uusi asemapaikka on merkitty virallisiin rekistereihin"],"o_en":["No, unless the police grant a special exemption for the area change","No, because the permit is tied to the original base location","Yes — the permit entitles you to drive throughout mainland Finland regardless of where it was granted","Yes, but only once the new base location is entered in the official registers"],"a":2},{"t":"Ammatti ja säännöt","q_fi":"Eläkeläinen asiakas on varannut matkansa keskitetyn tilausvälityskeskuksen kautta mennäkseen silmälääkärin vastaanotolle. Hän kysyy sinulta etukäteen, paljonko matka hänelle maksaa, kun kyseessä on Kela-korvattava matka. Mikä seuraavista väittämistä pitää paikkansa?","q_en":"A pensioner has booked through the central dispatch centre to go to an eye doctor and asks in advance what the Kela-reimbursed trip will cost. Which statement is correct?","o_fi":["Kela-kyyti on täysin ilmainen, kun se on varattu keskitetyn tilausnumeron kautta.","Asiakas maksaa enintään Kelan vahvistaman omavastuun, joka on 25 euroa yhdensuuntaiselta matkalta.","Asiakas maksaa normaalin taksikyydin hinnan, ellei hän ole etukäteen hakenut Kelakorvauksen päätöstä postitse.","Asiakas voi itse päättää kuljettajalle kaikki pysähdykset reitin varrella ilman lisämaksua."],"o_en":["The Kela trip is completely free when booked via the central number","The customer pays at most the Kela-confirmed deductible, which is €25 per one-way trip","The customer pays the normal taxi price unless they applied for a Kela decision by post in advance","The customer may decide on all stops along the route at no extra charge"],"a":1},{"t":"Ammatti ja säännöt","q_fi":"Joonas on saanut taksinkuljettajan ajolupansa tarkalleen 3 vuotta sitten. Hän ei ole uusinut ajolupaa vuosien aikana. Kuinka kauan Joonaksella on taksinkuljettajan ajolupa vielä voimassa, ennen kuin hänen täytyy se käydä uusimassa?","q_en":"Joonas got his permit exactly 3 years ago and has not renewed it. How much longer is it valid before he must renew?","o_fi":["Viisi vuotta.","Vuoden verran.","Kaksi vuotta.","Seitsemän vuotta."],"o_en":["Five years","About a year","Two years","Seven years"],"a":2},{"t":"Ammatti ja säännöt","q_fi":"Mikä seuraavista ei pidä paikkaansa koskien taksinkuljettajan ajopäiväkirjaa?","q_en":"Which of the following is NOT true about the driving log?","o_fi":["Kuljettajan ei tarvitse merkitä taukojen ajankohtia, jos niitä ei ehdi pitää kiireisessä työvuorossa.","Työnantajan on annettava kuljettajilleen ajopäiväkirja.","Ajopäiväkirjasta tulee käydä ilmi työajan, taukojen ja lepoaikojen alkamis- ja päättymisajankohdat.","Ajopäiväkirja on tärkeä työkalu työaikalainsäädännön noudattamisen valvomiseksi."],"o_en":["The driver need not record break times if there's no time to take them on a busy shift","The employer must give drivers a driving log","The log must show the start and end times of working time, breaks and rest periods","The log is an important tool for monitoring compliance with working-hours law"],"a":0},{"t":"Ammatti ja säännöt","q_fi":"Tommi on uusi kuljettaja ja on onnistunut viemään asiakkaan määränpäähän. Kuitenkin maksussa syntyy ongelma. Asiakas pystyy maksamaan vain käteisellä ja Tommilla on vain korttilaite käytössä. Mitkä maksun välineet ovat lain mukaan käytössä?","q_en":"Tommi has only a card reader, but the customer can pay only in cash. Which payment methods are legally available?","o_fi":["Asiakas voi maksaa matkansa käteisellä sekä yleisimmillä pankki- ja luottokorteilla, koska taksin tulee hyväksyä vähintään nämä maksutavat.","Kuljettaja saa päättää, hyväksyykö käteismaksun vai vaatiiko aina korttimaksun.","Asiakas voi maksaa vain käteisellä, ellei taksiyrittäjä ole ilmoittanut korttimaksujen hyväksynnästä","Maksutavat tulee sopia ennen matkaa, joten ilman ennakkotilausta korttimaksua ei voi käyttää."],"o_en":["The customer may pay in cash and with the most common debit and credit cards, because a taxi must accept at least these methods","The driver may decide whether to accept cash or always require card payment","The customer may pay only in cash unless the taxi entrepreneur has announced acceptance of card payments","Payment methods must be agreed before the trip, so without a pre-order card payment cannot be used"],"a":0},{"t":"Ammatti ja säännöt","q_fi":"Milloin taksinkuljettajan nimi ja tunnistetiedot on pidettävä asiakkaan nähtävillä ajoneuvossa?","q_en":"When must the driver's name and identification be visible to the customer in the vehicle?","o_fi":["Vain jos asiakas sitä erikseen pyytää matkan aikana.","Aina, kun ajossa on maksava asiakas - oli kyse sitten ennakkotilauksesta tai kadulta otetusta kyydistä.","Ainoastaan silloin, kun matka tehdään sairaalalle tai viranomaisen määräyksestä.","Kuljettajan tiedot saa halutessaan laittaa esille, mutta se ei ole pakollista"],"o_en":["Only if the customer specifically asks during the trip","Always when carrying a paying customer — whether a pre-order or a street hail","Only when the trip is to a hospital or by an authority's order","The driver's details may be displayed if desired, but it is not mandatory"],"a":1},{"t":"Ammatti ja säännöt","q_fi":"Mikä seuraavista kuuluu lakisääteisiin taksamittarin teknisiin vaatimuksiin Suomessa?","q_en":"Which is a statutory technical requirement for a taximeter in Finland?","o_fi":["Mittarin on oltava helppo lukea, jotta kuljettaja ja matkustaja voivat seurata hinnanmuutoksia.","Taksamittarin on kestettävä jopa +60 °C kuumuutta, jotta se toimii myös ääriolosuhteissa ilman erityistä suojausta.","Taksamittarin ei tarvitse olla sinetöity, kunhan se toimii johdonmukaisesti ja näyttää summat oikein.","Riittää, että mittari rekisteröi pelkästään ajomatkan keston."],"o_en":["The meter must be easy to read, so the driver and passenger can follow price changes","The meter must withstand up to +60 °C so it works in extremes without special protection","The meter need not be sealed as long as it works consistently and shows sums correctly","It is enough that the meter records only the trip duration"],"a":0},{"t":"Ammatti ja säännöt","q_fi":"Mitä vuorokausilepoa koskevaa poikkeusta voidaan soveltaa taksinkuljettajaan erityistehtävissä, kuten satunnaisissa tai tilapäisissä kuljetuksissa?","q_en":"What exception to the daily rest can apply to a driver in special tasks, such as occasional or temporary transport?","o_fi":["Kuljettajan vuorokausilepo voidaan jättää kokonaan väliin, mikäli kyseessä on säännöllinen yöajotehtävä.","Kuljettaja saa ajaa jopa 20 tuntia yhtäjaksoisesti ilman lepoa, jos kuljetus on kiireellinen.","Vuorokausilepoa ei tarvitse pitää ollenkaan, jos kuljettaja tuntee olonsa virkeäksi ja työtehtävät jatkuvat.","Tietyissä poikkeustilanteissa vuorokausilepo voidaan enintään kahdesti seitsemän vuorokauden aikana lyhentää vähintään seitsemään tuntiin, jos kuljetustehtävä sitä edellyttää."],"o_en":["Daily rest may be skipped entirely for a regular night-driving task","The driver may drive up to 20 hours non-stop without rest if the trip is urgent","Daily rest need not be taken at all if the driver feels alert and tasks continue","In certain exceptional cases daily rest may be reduced to at least seven hours, at most twice within seven days, if the task requires it"],"a":3},{"t":"Asiakaspalvelu","q_fi":"Olet ajanut asiakkaan keskustasta lähiöön. Matkan päätyttyä asiakas vaikuttaa välttelevältä eikä ota lompakkoaan esiin. Hän sanoo \"maksavansa myöhemmin\" ja pyrkii poistumaan autosta maksamatta. Miten toimit kuljettajana oikein?","q_en":"A customer seems evasive at the end and tries to leave without paying, saying they'll 'pay later'. How do you act correctly?","o_fi":["Uhkaan asiakasta turpaan vetämisellä jos maksusuoritetta ei tapahdu.","Estän asiakkaan poistumisen autosta lukitsemalla ovet.","Ilmoitan asiakkaalle, että maksun laiminlyönti on rikos ja kutsun poliisin selvittämään tilanteen.","Päästän asiakkaan menemään ja toivon, että hän maksaa seuraavalla kerralla."],"o_en":["I threaten the customer with a beating if they don't pay","I prevent the customer from leaving by locking the doors","I tell the customer that non-payment is an offence and call the police to resolve it","I let the customer go and hope they pay next time"],"a":2},{"t":"Asiakaspalvelu","q_fi":"Olet kuljettamassa rouva Nurmea, liikuntarajoitteista asiakasta, tämän lääkärikäynnin jälkeen ystävänsä syntymäpäiväjuhliin. Matkalla hän pyytää sinua pysähtymään Alkon edessä ja hakemaan hänelle kaksi pulloa valkoviiniä, koska hän ei itse pysty liikkumaan vaivatta. Hän tarjoaa myös hieman ylimääräistä vaivanpalkkaa. Miten toimit?","q_en":"A mobility-impaired customer asks you to stop at Alko and buy her two bottles of white wine, offering extra payment. How do you act?","o_fi":["Hyväksyn, koska asiakkaalla on selkeä tarve ja hän tarjosi ylimääräistä maksua.","Kieltäydyn kohteliaasti ja kerron, että laki ei salli minun ostavan tai kuljettavan alkoholia asiakkaan puolesta.","Sovin, että asiakas jää autoon ja minä hoidan viiniostokset, jos jono ei ole pitkä. Tämä toimintatapa kuuluu hyvään asiakaspalveluun.","Suostun, jos joku ulkopuolinen voi todistaa, että pyynnön teki asiakas."],"o_en":["I accept, because the customer has a clear need and offered extra pay","I politely refuse and explain that the law does not allow me to buy or transport alcohol on the customer's behalf","I agree that the customer stays in the car and I do the wine shopping if the queue isn't long — this is good service","I agree if an outsider can witness that the customer made the request"],"a":1},{"t":"Asiakaspalvelu","q_fi":"Kokenut taksinkuljettaja on tehnyt pitkän työviikon ja tuntee itsensä väsyneeksi ja ärtyneeksi. Perjantai-iltana kyytiin nousee iäkäs asiakas, joka kyselee hinnasta ja pyytää hiljentämään musiikkia. Markus kokee asiakkaan vaatimukset rasittavina ja vastaa lyhyesti, jopa tylysti. Hän ei tervehdi, ei kiitä kyydistä eikä vastaa hyvästeihin. Seuraavana päivänä asiakas tekee asiasta kirjallisen valituksen taksiyritykselle. Onko asiakkaalla oikeus valittaa saamastaan palvelusta tällaisessa tilanteessa?","q_en":"A tired driver is curt and rude to an elderly customer, doesn't greet or thank them, and the customer later files a written complaint. Does the customer have the right to complain?","o_fi":["Kyllä, koska taksinkuljettajan kuuluu aina kohdella asiakkaita kunnioittavasti ja asiallisesti, myös väsyneenä.","Ei, koska kyseessä ei ollut fyysinen uhka tai rikkomus, vaan pelkkä tunneasia.","Ei, koska kuljettajan tunnetila voi vaikuttaa asiakaspalveluun, eikä kaikkea voi ottaa henkilökohtaisesti.","Vain siinä tapauksessa, jos asiakas on ensin kohdellut kuljettajaa epäasiallisesti."],"o_en":["Yes, because a driver must always treat customers respectfully and properly, even when tired","No, because there was no physical threat or violation, just a matter of feelings","No, because the driver's mood can affect service and not everything should be taken personally","Only if the customer first treated the driver improperly"],"a":0},{"t":"Asiakaspalvelu","q_fi":"Mikä seuraavista vaihtoehdoista edustaa hyvää ja ammattimaista asiakaspalvelua taksinkuljettajalta?","q_en":"Which represents good, professional customer service from a driver?","o_fi":["Kuljettaja tervehtii iloisesti ja antaa asiakkaalle tilaa päättää, haluaako viettää matkan keskustellen vai hiljaisuudessa. Keskustelun aihetta ei tyrkytetä, vaan asiakas saa itse ohjata tunnelmaa.","Kuljettaja kysyy heti aluksi henkilökohtaisia asioita, jotta syntyy rento ilmapiiri, ja jatkaa puhumista koko matkan ajan asiakkaan reaktioista riippumatta.","Kuljettaja tervehtii mekaanisesti, laittaa radiokanavan kovalle ja kertoo omia mielipiteitään päivän uutisista, vaikka asiakas ei vastaa.","Kuljettaja käynnistää matkan sanomatta sanaakaan ja pitää koko kyydin ajan silmiin katsomatta jäykkää hiljaisuutta yllä, jotta ei häiritse asiakasta."],"o_en":["The driver greets cheerfully and lets the customer decide whether to chat or travel in silence; topics aren't forced and the customer sets the mood","The driver immediately asks personal questions to create a relaxed mood and keeps talking the whole trip regardless of the customer's reactions","The driver greets mechanically, turns the radio up loud and shares opinions on the day's news even though the customer doesn't respond","The driver starts without a word and keeps a stiff silence the whole ride without eye contact, so as not to disturb the customer"],"a":0},{"t":"Asiakaspalvelu","q_fi":"Kiireinen asiakas hyppää kyytiisi rautatieasemalta ja sanoo vain määränpään, mutta ei toivomaansa reittiä. Asiakas toteaa: \"Mene miten parhaaksi näet.\" Matkan hinta määräytyy käytetyn ajan tai matkan pituuden mukaan. Miten toimit?","q_en":"A hurried customer gives only a destination and says 'go as you see best'. The price depends on time or distance. How do you act?","o_fi":["Ajan pidemmän reitin, jos se on minulle helpompi ja vähemmän liikennettä sisältävä.","Ajan lyhintä reittiä kartan mukaan, vaikka se kulkisi huonokuntoisen ja vaarallisen tien kautta.","Valitsen nopeimman reitin, vaikka se sisältäisi maksullisen tien ilman asiakkaan lupaa.","Valitsen matkustajan kannalta tarkoituksenmukaisen ja edullisimman mahdollisen reitin, ottaen huomioon liikennetilanteen."],"o_en":["I drive a longer route if it's easier for me and has less traffic","I drive the shortest route by the map even if it goes via a poor, dangerous road","I choose the fastest route even if it uses a toll road without the customer's permission","I choose a sensible, cheapest possible route for the passenger, taking traffic into account"],"a":3},{"t":"Asiakaspalvelu","q_fi":"Kello on neljä aamuyöllä. Saat kyytiin voimakkaasti päihtyneen asiakkaan, joka ei puhu paljoa matkan aikana. Määränpäässä asiakas nousee autosta maksamatta, hoipertelee pari askelta ja kaatuu lumihankeen, johon hän sammuu. Mitä teet?","q_en":"At 4 a.m. a heavily intoxicated customer gets out without paying, staggers, falls into a snowbank and passes out. What do you do?","o_fi":["Otan asiakkaan takaisin kyytiin ja yritän ajaa poliisiasemalle saadakseni tilanteeseen apua.","Varmistan, ettei asiakas jää vaaraan, soitan hätäkeskukseen ja selvittelen asian poliisin kanssa.","Tutkin asiakkaan taskut siltä varalta, jos häneltä löytyisi käteistä, jolla voisi maksaa taksimatkan.","Jätän asiakkaan makaamaan lumeen, koska en voi pakottaa häntä maksamaan ja jatkan seuraavaan ajoon."],"o_en":["I take the customer back in and try to drive to the police station for help","I make sure the customer is not in danger, call the emergency centre and sort it out with the police","I search the customer's pockets in case there's cash to pay the fare","I leave the customer lying in the snow, since I can't force payment, and go to the next trip"],"a":1},{"t":"Asiakaspalvelu","q_fi":"Taksinkuljettajalla on perjantai-illan viimeinen kyyti menossa ja hän saapuu asiakkaan kanssa määränpäähän. Asiakas kieltäytyy tässä vaiheessa maksamasta. Miten toimit tilanteessa?","q_en":"On the last Friday-night trip the customer refuses to pay at the destination. How do you act?","o_fi":["Soitan hätäkeskuksen kautta poliisit paikalle selvittämään asiaa.","Estän asiakasta poistumasta ajoneuvosta siihen asti, että maksu suoritetaan.","Pidän asiakkaan tavarat tai henkilöllisyystodistuksen panttina, kunnes maksu on saatu.","Annan asiakkaalle alennusta ja toivon, että hän maksaa edes osan matkasta."],"o_en":["I call the police to the scene via the emergency centre to resolve it","I prevent the customer from leaving the vehicle until they pay","I hold the customer's belongings or ID as a pledge until paid","I give a discount and hope they pay at least part"],"a":0},{"t":"Asiakaspalvelu","q_fi":"Miten toimit, jos asiakkaasi kertoo haluavansa matkustaa hiljaisuudessa?","q_en":"How do you act if your customer says they want to travel in silence?","o_fi":["Jatkan keskustelua, koska asiakkaan viihtyvyys on tärkeää.","Pyydän asiakasta osallistumaan keskusteluun matkan ajan.","Kunnioitan asiakkaan toivetta ja keskustelen vain, jos se liittyy matkareittiin tai turvallisuuteen.","Olen hiljaa, vaikka en olisi täysin varma ajoreitistä."],"o_en":["I keep talking, because the customer's enjoyment matters","I ask the customer to take part in conversation during the trip","I respect the wish and speak only about the route or safety","I stay silent even if I'm not fully sure of the route"],"a":2},{"t":"Asiakaspalvelu","q_fi":"Mikä on kuljettajan ensisijainen tehtävä tilanteessa, jossa asiakas antaa epätarkan osoitteen?","q_en":"What is the driver's primary task when a customer gives an imprecise address?","o_fi":["Kysyä lisätietoja asiakkaalta ja tarvittaessa käyttää navigaattoria","Valita reitti itse","Ajaa lähimpään paikkaan","Kieltäytyä kuljetuksesta"],"o_en":["Ask the customer for more details and use the navigator if needed","Choose the route myself","Drive to the nearest place","Refuse the trip"],"a":0},{"t":"Asiakaspalvelu","q_fi":"Miksi taksinkuljettajalta edellytetään riittävää kielitaitoa viranomaisvaatimusten mukaisesti? Valitse vaihtoehto, joka on eniten oikein.","q_en":"Why is adequate language skill required of a driver per the official requirements? Choose the most correct.","o_fi":["Koska tieliikennelaki edellyttää kykyä lukea liikennemerkkien lisäkyltit, vaikka asiakasviestintä ei olisi sujuvaa.","Koska kuljettajan tehtävä on varmistaa maksutapahtuman sujuvuus ja osata selittää hinnasto, mutta asiakkaan määränpäähän pääsy ei vaadi varsinaista kielitaitoa.","Koska kuljettajan täytyy pystyä ymmärtämään asiakkaan tarpeet, antaa tarvittavat tiedot ja varmistaa matkustamisen sujuvuus ja turvallisuus.","Koska ilman hyvää kielitaitoa kuljettaja ei voi vastaanottaa maksuja asiakkaalta sujuvasti."],"o_en":["Because traffic law requires reading supplementary signs, even if customer communication isn't fluent","Because the driver must ensure smooth payment and explain the price list, but getting the customer to the destination needs no real language skill","Because the driver must understand the customer's needs, give necessary information and ensure smooth, safe travel","Because without good language skills the driver cannot take payments smoothly"],"a":2},{"t":"Asiakaspalvelu","q_fi":"Olet liikenteessä asiakkaan kanssa, ja matka etenee normaalisti. Yhtäkkiä kuulet puhelimesi soivan ja huomaat, että handsfree-laitteesi jäi toimistolle. Mikä seuraavista tavoista toimia on oikein?","q_en":"Your phone rings and your handsfree was left at the office. Which is correct?","o_fi":["Vastaan puheluun nopeasti, koska se saattaa koskea seuraavaa asiakasta.","Jos puheluun vastaaminen on ajon kannalta välttämätöntä, pysäytän auton turvalliseen paikkaan ja vastaan siihen.","Jätän puhelun huomiotta, enkä tee asialle mitään, koska asiakas voi häiriintyä pysähdyksestä.","Pyydän asiakasta vastaamaan puhelimeen puolestani, jos se sopii hänelle."],"o_en":["I answer quickly, since it may concern the next customer","If answering is necessary for the trip, I stop the car in a safe place and answer","I ignore the call and do nothing, since a stop might disturb the customer","I ask the customer to answer for me if that's okay with them"],"a":1},{"t":"Asiakaspalvelu","q_fi":"Mikä seuraavista väittämistä on virheellinen taksinkuljettajan toimintaan liittyen?","q_en":"Which statement about a driver's conduct is INCORRECT?","o_fi":["Matkustaja ei saa koskaan päättää ajon aikana mahdollisista pysähdyksistä.","Alkolukko voi olla pakollinen osassa luvanvaraisista kuljetuksista.","Taksinkuljettaja saa käyttää matkapuhelinta ajon aikana handsfree-laitteella, jos se on ajon kannalta välttämätöntä.","Kuljettaja voi valita ajoreitin, jos asiakas ei toisin ohjeista."],"o_en":["A passenger may never decide on possible stops during the trip","An alcohol interlock may be mandatory in some licensed transport","A driver may use a phone while driving with a handsfree device if necessary for the trip","The driver may choose the route if the customer doesn't instruct otherwise"],"a":0},{"t":"Asiakaspalvelu","q_fi":"Huomaat asiakkaasi (pörssiyhtiön toimitusjohtaja) juoksevan kohti taksia puhelin korvalla ja salkku auki. Hän hyppää kyytiin ja sanoo ”nyt talla pohjaan, yhtiökokous alkaa kymmenen minuutin päästä”. Tiedät, ettei matkaa voi suorittaa ajoissa ilman ylinopeutta. Kun kerrot tilanteesta, asiakas vaatii sinua ajamaan ylinopeutta ja lupaa maksaa kaikki sakot. Miten toimit tällaisessa tilanteessa?","q_en":"A CEO jumps in and demands you speed because the AGM starts in ten minutes, promising to pay any fines. You know you can't make it without speeding. How do you act?","o_fi":["Kerrot asiakkaalle ystävällisesti, että et voi rikkoa liikennesääntöjä, mutta ajat nopeinta mahdollista reittiä turvallisesti.","Lähdet ajamaan ylinopeutta asiakkaan vaatimuksesta, koska tilanne on poikkeuksellinen ja hän kantaa vastuun.","Päätät ottaa riskin ja ajat runsasta ylinopeutta, koska asiakas lupasi maksaa sakot. Lisäksi asiakkaan toiveisiin vastaaminen kuuluu hyvään asiakaspalveluun.","Ajat nopeusrajoituksen mukaan vain taajamissa, mutta muualla joustat asiakkaan pyynnöstä."],"o_en":["I kindly tell the customer I can't break traffic rules, but I drive the fastest possible route safely","I start speeding at the customer's demand, since the situation is exceptional and they take responsibility","I take the risk and speed heavily, because the customer promised to pay fines and meeting wishes is good service","I obey limits only in built-up areas and flex elsewhere at the customer's request"],"a":0},{"t":"Asiakaspalvelu","q_fi":"Mikä seuraavista vaikuttaa matkustusmukavuuteen?","q_en":"Which of the following affects travel comfort?","o_fi":["Lyhyt ja vähäsanainen kommunikointi","Kuljettajan suosikkimusiikin soittaminen","Rauhallinen ja tasainen ajotapa","Reitin valinta ilman asiakkaan mielipidettä"],"o_en":["Short, terse communication","Playing the driver's favourite music","Calm, steady driving","Choosing the route without the customer's opinion"],"a":2},{"t":"Asiakaspalvelu","q_fi":"Taksinkuljettaja Sami ottaa kyytiin asiakkaan, joka alkaa matkan aikana käyttäytyä uhkaavasti ja lopulta käy käsiksi kuljettajaan. Sami on tilanteessa yksin ja joutuu tekemään nopeita päätöksiä sekä oman turvallisuutensa että lain noudattamisen kannalta. Mikä seuraavista pitää paikkansa kuljettajan toimivallasta tilanteessa, jossa asiakas käyttäytyy väkivaltaisesti?","q_en":"A customer becomes threatening and finally grabs the driver, who is alone. What is true about the driver's authority when a customer is violent?","o_fi":["Taksinkuljettajalla ei ole oikeutta reagoida asiakkaan käytökseen mitenkään, koska kyseessä on maksava asiakas.","Taksinkuljettajan tulee yrittää rauhoittaa asiakas asettamalla kätensä tämän olkapäälle.","Kuljettajalla ei ole oikeutta puuttua tilanteeseen fyysisesti, vaan hänen on poistuttava paikalta välittömästi.","Kuljettajalla on oikeus ottaa kiinni väkivaltainen asiakas ja luovuttaa hänet poliisille – tämä perustuu yleiseen kiinniotto-oikeuteen. Tärkeintä on kuitenkin hätänumeroon soittaminen."],"o_en":["The driver has no right to react to the customer's behaviour, since it's a paying customer","The driver should try to calm the customer by placing a hand on their shoulder","The driver has no right to intervene physically and must leave the scene immediately","The driver has the right to apprehend a violent customer and hand them to the police — based on the general right of apprehension. The most important thing, however, is to call the emergency number"],"a":3},{"t":"Asiakaspalvelu","q_fi":"Mikko hyppäsi taksiin rautatieasemalta ja pyysi kuljettajaa viemään hänet hotellille. Matkan lopussa Mikko maksaa kortilla. Tarvitseeko kuljettajan tarjota Mikolle kuittia, vaikka hän ei sitä erikseen pyydä?","q_en":"Mikko pays by card at the end of the trip. Must the driver offer a receipt even if he doesn't ask?","o_fi":["Kuittia täytyy aina tarjota.","Kuittia tulee tarjota vain, kun asiakas maksaa käteisellä.","Kuittia tulee tarjota vain, kun asiakas maksaa kortilla.","Kuittia tulee tarjota vain jos matka on pidempi kuin 10km."],"o_en":["A receipt must always be offered","A receipt need be offered only when the customer pays in cash","A receipt need be offered only when the customer pays by card","A receipt need be offered only if the trip is longer than 10 km"],"a":0},{"t":"Asiakaspalvelu","q_fi":"Missä seuraavista tilanteista taksinkuljettajalla on oikeus kieltäytyä ottamasta kyytiä?","q_en":"In which situation does the driver have the right to refuse a ride?","o_fi":["Asiakas pyytää kuljettajaa ajamaan reilua ylinopeutta, koska hänellä on kiire.","Kyyti aiheuttaisi sen, että kuljettajan lakisääteinen työaika ylittyisi.","Kuljettaja haluaa keskittyä puhelimessa puhumiseen eikä ota asiakkaita hetkeen.","Asiakas pyytää kuljettajaa ohittamaan alkolukon käyttämisen."],"o_en":["The customer asks the driver to drive well over the speed limit because they're in a hurry","The ride would cause the driver's statutory working time to be exceeded","The driver wants to focus on a phone call and won't take customers for a while","The customer asks the driver to skip using the alcohol interlock"],"a":1},{"t":"Asiakaspalvelu","q_fi":"Mikä seuraavista kuvastaa ammattimaista ja vastuullista viestintälaitteiden käyttöä taksinkuljettajan asiakaspalveluun liittyen?","q_en":"Which reflects professional, responsible use of communication devices in taxi customer service?","o_fi":["Kuljettaja voi hoitaa omia puheluitaan vapaasti, kunhan hän käyttää kuulokemikrofonia.","Asiakas voi vaatia kuljettajaa katkaisemaan minkä tahansa puhelun, jos hän ei halua sen jatkuvan.","Puhelimeen vastaaminen on perusteltua vain silloin, kun se liittyy kuljetukseen ja ei vaaranna liikennettä.","Viestittely asiakkaan kanssa ajon aikana on hyväksyttävää, jos se liittyy määränpäähän."],"o_en":["The driver may freely handle their own calls as long as they use a headset","The customer may demand the driver end any call they don't want to continue","Answering the phone is justified only when it concerns the transport and doesn't endanger traffic","Texting with the customer while driving is acceptable if it concerns the destination"],"a":2},{"t":"Asiakaspalvelu","q_fi":"Taksinkuljettaja Laura on vienyt yövuorollaan asiakkaan tämän antamaan osoitteeseen. Kun hän saapuu määränpäähän, asiakas nukkuu syvässä unessa takapenkillä eikä herää, vaikka Laura yrittää kohteliaasti herätellä häntä useaan otteeseen. Matka on vielä maksamatta. Miten toimit?","q_en":"At the destination the customer is deeply asleep and won't wake despite polite attempts; the trip is unpaid. How do you act?","o_fi":["Odotan hiljaa, kunnes asiakas itse herää, koska se on hyvää asiakaspalvelua.","Kaadan juomapullostani kylmää vettä asiakkaan päälle herättääkseni hänet.","Yritän herättää asiakkaan vielä kerran, ja jos se ei onnistu, otan yhteyttä hätäkeskukseen.","Siirrän asiakkaan ulos autosta, jotta voin jatkaa seuraavaan tilaukseen."],"o_en":["I wait quietly until the customer wakes, because that's good service","I pour cold water from my bottle on the customer to wake them","I try to wake the customer once more, and if it fails, I contact the emergency centre","I move the customer out of the car so I can continue to the next order"],"a":2},{"t":"Asiakaspalvelu","q_fi":"Olet saattanut asiakkaan kotiovelle kiireisen kaupunkikierroksen jälkeen. Noin kymmenen minuuttia myöhemmin huomaat takapenkin jalkatilassa lompakon, jonka sisällä on edellisen asiakkaan henkilökortti. Mitä teet vastuullisena taksinkuljettajana?","q_en":"Ten minutes after dropping a customer you find a wallet with the previous customer's ID. What do you do?","o_fi":["Käytän mahdollisuuden hyväksi ja otan muutaman setelin vaivan palkaksi, ennen kuin vien lompakon löytötavaratoimistoon.","Yritän tavoittaa asiakkaan välittömästi. Ellei se onnistu, toimitan laukun viipymättä poliisin löytötavaratoimistoon, kuten laki edellyttää.","Jätän lompakon taksiasemalle ilmoittamatta mitään ja jatkan ajovuoroasi.","Päätän pitää lompakon autossa seuraavaan vuoroon asti, sillä jos asiakas ei kysy siitä, asia unohtuu."],"o_en":["I take a few notes as a reward before taking the wallet to lost-property","I try to reach the customer immediately; if that fails, I deliver the wallet without delay to the police lost-property office, as the law requires","I leave the wallet at the taxi rank without reporting anything and continue my shift","I keep the wallet in the car until the next shift, since if no one asks, it'll be forgotten"],"a":1},{"t":"Asiakaspalvelu","q_fi":"Asiakas nousee kyytiin juna-asemalta ja mainitsee määränpään, jota et osaa paikantaa. Miten toimit ammattimaisesti?","q_en":"A customer names a destination you can't locate. How do you act professionally?","o_fi":["Kerron asiakkaalle, että en tiedä paikkaa ja pyydän häntä etsimään reitin puhelimellaan.","Ajelen alueella summittaisesti ja toivon, että asiakas tunnistaa tutun reitin matkan varrella.","Ilmoitan asiakkaalle, että koska en tunne reittiä enkä halua tehdä virheitä ajosuunnassa, en voi ottaa ajoa vastaan ilman tarkempia ohjeita asiakkaalta.","Hyödynnän käytössäsi olevaa navigointilaitetta ja kysyn samalla asiakkaalta lisätietoja tarvittaessa."],"o_en":["I tell the customer I don't know the place and ask them to find the route on their phone","I drive around randomly and hope the customer recognises a familiar route","I tell the customer I don't know the route and won't take the trip without more precise directions","I use the navigation device and ask the customer for more details as needed"],"a":3},{"t":"Erityisryhmät","q_fi":"Jos pyörätuoliasiakkaalla on mukanaan henkilökohtainen avustaja, kenen vastuulla on varmistaa, että pyörätuoli on kiinnitetty ajoneuvoon oikein ennen matkan alkua?","q_en":"If a wheelchair customer has a personal assistant, whose responsibility is it to ensure the wheelchair is correctly secured before the trip?","o_fi":["Asiakkaan itsensä, ellei hänellä ole liikuntarajoitteita ylävartalossa.","Henkilökohtaisen avustajan, koska hän vastaa asiakkaan turvallisuudesta.","Yhteisvastuullisesti kaikkien osapuolten, kunhan asiakas hyväksyy järjestelyn.","Taksinkuljettajan, koska hän vastaa ajoneuvon turvallisuudesta."],"o_en":["The customer's own, unless they have upper-body mobility limitations","The personal assistant's, since they're responsible for the customer's safety","Jointly all parties', as long as the customer accepts the arrangement","The driver's, since they're responsible for the vehicle's safety"],"a":3},{"t":"Erityisryhmät","q_fi":"Taksinkuljettajan työnkuvaan liittyy erilaisia lakisääteisiä velvoitteita matkustajien turvallisuudesta. Mikä seuraavista väittämistä pitää paikkansa?","q_en":"A driver has statutory obligations for passenger safety. Which statement is correct?","o_fi":["Turvalaitteiden käyttö taksissa on suositeltavaa, mutta ei velvoittavaa matkustajan koosta riippumatta.","Kuljettajalla ei ole velvollisuutta varmistaa turvalaitteen käyttöä, jos lapsen huoltaja on kyydissä.","Jos matkustaja kieltäytyy käyttämästä turvalaitetta, vastuu siirtyy matkustajalle eikä kuljettajalle jää velvoitteita.","Alle 135 cm pitkä lapsi on aina kuljetettava autossa takapenkillä."],"o_en":["Using restraints in a taxi is recommended but not mandatory regardless of passenger size","The driver has no duty to ensure restraint use if the child's guardian is aboard","If a passenger refuses a restraint, responsibility shifts to them and the driver has no obligations","A child under 135 cm must always be carried in the back seat"],"a":3},{"t":"Erityisryhmät","q_fi":"9-vuotias Aino käy viikoittain Kelan järjestämässä fysioterapiassa, joka on osa hänen lääkinnällistä kuntoutustaan. Hän käyttää pyörätuolia eikä pysty liikkumaan itsenäisesti. Ainon isä kysyy sinulta, voisiko Aino saada aina saman kuljettajan Kela kyyteihin helpottamaan arkea ja lisäämään turvallisuutta. Miten vastaat?","q_en":"Aino (9) uses a wheelchair and attends weekly Kela physiotherapy. Her father asks if she could always get the same driver. How do you answer?","o_fi":["Vakiokyyditykset ovat mahdollisia vain yli 18-vuotiaille asiakkaille.","Kela ei huomioi asiakkaan erityistarpeita kuljettajavalinnoissa.","Vakiotaksioikeutta ei myönnetä kuntoutukseen, vain akuutteihin hoitomatkoihin.","Kyllä, perustelluissa tapauksissa Kela voi myöntää oikeuden vakiotaksiin, jolloin kuljetukset hoidetaan mahdollisuuksien mukaan saman kuljettajan tai yrityksen kautta."],"o_en":["Regular rides are possible only for customers over 18","Kela does not consider a customer's special needs in driver selection","A regular-taxi right is not granted for rehabilitation, only acute care trips","Yes — in justified cases Kela can grant a regular-taxi right, so trips are handled where possible via the same driver or company"],"a":3},{"t":"Erityisryhmät","q_fi":"Marja on saanut uuden ajotehtävän, jossa hän kuljettaa koululaisia aamuisin ja iltapäivisin pienellä maaseutupaikkakunnalla. Ensimmäisellä ajopäivänään hän pohtii, millä nopeudella saa lain mukaan ajaa, kun kyseessä on koulukuljetus?","q_en":"Marja drives schoolchildren in a rural area and wonders what speed she may legally drive on a school transport.","o_fi":["Enintään 100 km/h, jos sääolosuhteet sen sallivat.","Enintään 80 km/h","Enintään 60 km/h","Samalla nopeudella kuin tiekohtainen nopeusrajoitus."],"o_en":["At most 100 km/h if weather allows","At most 80 km/h","At most 60 km/h","The same as the road-specific speed limit"],"a":3},{"t":"Erityisryhmät","q_fi":"Esteettömässä taksiajossa asiakas jää pyörätuoliin matkan ajaksi. Mikä seuraavista kuvaa oikeaa menettelyä pyörätuolin kiinnittämiseksi?","q_en":"In accessible transport the customer stays in the wheelchair. Which describes the correct securing procedure?","o_fi":["Pyörätuoli sidotaan auton lattiaan yksittäisellä hihnalla istuimen takaosasta.","Kiinnitys ei ole tarpeen, jos pyörätuoli on jarrutettu ja asiakas käyttää turvavyötä.","Kiinnitys tehdään nelipistejärjestelmällä pyörätuolin rungosta.","Asiakas voi itse valita, kiinnitetäänkö pyörätuoli vai ei."],"o_en":["The wheelchair is tied to the floor with a single strap from the rear of the seat","Securing is unnecessary if the wheelchair is braked and the customer wears a belt","Securing uses a four-point system from the wheelchair frame","The customer may choose whether the wheelchair is secured or not"],"a":2},{"t":"Erityisryhmät","q_fi":"Taksinkuljettaja Sami saa kyytiin asiakkaan, jolla on valkoinen keppi. Mitä on hyvä muistaa tällaisten asiakkaiden kanssa toimimisesta?","q_en":"A customer has a white cane. What is good to remember when serving such customers?","o_fi":["Tarttua asiakkaan kyynärpäästä ja ohjata hänet autoon ilman kysymyksiä, jotta asiat sujuvat nopeasti.","Kysyä asiakkaalta, miten hän haluaa tulla autetuksi, ennen kuin tarjoaa apua.","Välttää kommunikointia, jotta asiakas ei tunne oloaan kiusatuksi.","Puhua kovalla ja selkeällä äänellä, sillä näkövammainen ei usein kuule kunnolla."],"o_en":["Take the customer by the elbow and steer them to the car without asking, to keep things quick","Ask the customer how they want to be helped before offering help","Avoid communication so the customer doesn't feel bothered","Speak loudly and clearly, since the visually impaired often can't hear well"],"a":1},{"t":"Erityisryhmät","q_fi":"Olet suorittamassa kunnan järjestämää koulukuljetusta ja huomaat, että ajoneuvossa on alkolukko. Miksi tällainen laite on näissä kuljetuksissa pakollinen?","q_en":"You notice an alcohol interlock in a school-transport vehicle. Why is it mandatory in these trips?","o_fi":["Se varmistaa, ettei kuljettaja voi käynnistää ajoneuvoa, jos hän on alkoholin vaikutuksen alaisena.","Laite on asennettu, jotta kuljettaja ei voi keskustella asiakkaiden kanssa ajon aikana.","Koska koulukuljetuksissa ei vaadita turvavyön käyttöä, alkolukko kompensoi turvallisuutta.","Se estää ajoneuvon käynnistymisen, jos mittaustulos ylittää 0,30 mg/l"],"o_en":["It ensures the driver cannot start the vehicle if under the influence of alcohol","It's fitted so the driver can't talk to passengers while driving","Because seat belts aren't required in school transport, the interlock compensates for safety","It prevents starting if the reading exceeds 0.30 mg/l"],"a":0},{"t":"Erityisryhmät","q_fi":"Sinulle annetaan työvuorollasi yllättäen tehtäväksi ottaa kyytiin asiakas, joka ei pysty kommunikoimaan suullisesti. Miten kuljettajan tulee toimia tilanteessa?","q_en":"You must take a customer who cannot communicate verbally. How should the driver act?","o_fi":["Kuljettajan on pyrittävä varmistamaan määränpää ja matkan turvallisuus muilla keinoin kuin puheella.","Kuljettaja voi jättää asiakkaan pois kyydistä, jos viestintä ei onnistu sanallisesti.","Jos asiakkaan puhekyky on rajoittunut, matkaa ei saa aloittaa ilman tulkkia.","Kuljettaja voi jatkaa ajoa vain, jos asiakas pystyy kirjoittamaan osoitteen selkeästi navigaattoriin."],"o_en":["The driver must try to confirm the destination and ensure safety by means other than speech","The driver may leave the customer behind if verbal communication fails","If speech is limited, the trip may not start without an interpreter","The driver may continue only if the customer can clearly type the address into the navigator"],"a":0},{"t":"Erityisryhmät","q_fi":"Kuljetat iäkästä asiakasta, joka tarvitsee apua liikkumisessa. Päätepisteenä on hoitolaitos, jonka edessä ei ole henkilökuntaa vastassa. Mikä seuraavista tavoista toimia on oikea ja ammattimainen?","q_en":"You're taking an elderly customer needing mobility help to a care facility where no staff are waiting. Which is correct and professional?","o_fi":["Oletat, että hoitohenkilökunta huomaa asiakkaan saapumisen aikanaan, ja jatkat seuraavaan ajoon.","Varmistat, että asiakas pääsee turvallisesti hoitolaitoksen sisään asti, ja tarvittaessa odotat, että henkilökunta ottaa hänet vastaan.","Jätät asiakkaan ulko-oven eteen, koska vastuu siirtyy laitokselle, kun ovi näkyy.","Ilmoitat asiakkaalle autosta käsin, että hän voi siirtyä yksin loppumatkan."],"o_en":["You assume staff will notice the arrival in time and continue to the next trip","You make sure the customer gets safely inside, and if needed wait until staff receive them","You leave the customer at the door, since responsibility shifts to the facility once the door is visible","You tell the customer from the car that they can go the rest of the way alone"],"a":1},{"t":"Erityisryhmät","q_fi":"On viides ajopäiväsi uudessa työpaikassa. Sinut ohjataan noutamaan 72- vuotias Eeva, joka odottaa kyytiä terveysasemalta kotiin. Saapuessasi näet hänen seisovan rauhallisesti sisäänkäynnin läheisyydessä valkoinen keppi kädessään. Mikä on ammatillisesti oikea tapa kohdata tämä asiakas?","q_en":"You go to fetch 72-year-old Eeva, standing calmly near the entrance with a white cane. What is the professionally correct way to meet her?","o_fi":["Odotat autossa, kunnes asiakas huomaa sinut – turha mennä häiritsemään, jos hän ei ole pyytänyt apua.","Avaat auton oven ja soitat torvea, jotta asiakas löytää reitin itsenäisesti.","Arvioit, että asiakas ei ole tunnistanut sinua ja jatkat seuraavaan tilaukseen ilmoittamatta siitä erikseen.","Lähestyt Eevaa rauhallisesti ja kerrot selkeästi suullisesti, kuka olet ja mitä varten olet tullut, sekä kysyt, miten voit auttaa häntä turvallisesti autoon."],"o_en":["You wait in the car until she notices you — no point disturbing her if she hasn't asked for help","You open the car door and honk so she finds the way independently","You decide she hasn't recognised you and continue to the next order without telling her","You approach Eeva calmly, clearly say out loud who you are and why you've come, and ask how to help her safely into the car"],"a":3},{"t":"Erityisryhmät","q_fi":"40-vuotias Sanni on aktiivinen sähköpyörätuolin käyttäjä ja nousee taksiisi ostoskeskuksen pihalta. Hän kertoo haluavansa siirtyä itse pyörätuolistaan auton istuimelle. Hän vaikuttaa päättäväiseltä ja tottuneelta toimimaan itsenäisesti. Miten toimit kuljettajana?","q_en":"Sanni (40) actively uses an electric wheelchair and wants to transfer to the seat herself; she seems determined and used to acting independently. How do you act?","o_fi":["Kunnioitan asiakkaan toivetta, annan hänen siirtyä itsenäisesti ja tarjoan apua vain, jos hän sitä pyytää tai näyttää tarvitsevan.","Otan asiakkaan sanat ilmoituksena, ettei minulta odoteta apua, ja pysyn tarkoituksella täysin passiivisena.","Vaadin saada auttaa siirtymisessä, vaikka asiakas sanoo pärjäävänsä itse, koska asiakkaan turvallisuus on kaikista tärkeintä.","Käsittelen tilanteen kiireisesti ja pyydän asiakasta siirtymään nopeasti, jotta matka pääsee alkamaan aikataulussa."],"o_en":["I respect her wish, let her transfer independently and offer help only if she asks or appears to need it","I take her words as a sign that no help is expected and stay deliberately fully passive","I insist on helping with the transfer even though she says she manages, because safety is most important","I handle it hurriedly and ask her to transfer quickly to keep on schedule"],"a":0},{"t":"Erityisryhmät","q_fi":"Olet ajamassa säännöllistä koulukuljetusta, jossa kulkee sekä alakouluikäisiä että esikoululaisia. Lapset nousevat kyytiin eri pysäkeiltä, ja osa tarvitsee muistutuksia käytöksestä ja turvallisuudesta. Eräs lapsi yrittää matkustaa ilman turvavyötä. Mikä seuraavista on oikein?","q_en":"On a school transport with primary and pre-school children, one child tries to ride without a belt. Which is correct?","o_fi":["Kuljettajan tulee itse käyttää turvavyötä ja huolehtia siitä, että myös kaikki lapset ovat asianmukaisesti kiinnitettyinä.","Turvavyön käyttö on vapaaehtoista, kun kyseessä on lyhyt siirtymä matalalla nopeudella.","Jos lapset ovat levottomia, turvavyötä ei tarvitse vaatia, jotta tunnelma säilyy rauhallisena.","Lasten turvallisuus on vanhempien vastuulla, joten kuljettajan ei tarvitse puuttua turvavyön käyttöön."],"o_en":["The driver must wear their own belt and ensure all children are properly secured too","Belt use is voluntary on a short, low-speed transfer","If the children are restless, the belt need not be required to keep the mood calm","Children's safety is the parents' responsibility, so the driver needn't intervene on belts"],"a":0},{"t":"Erityisryhmät","q_fi":"Olet vastaanottanut taksikyydin, jossa asiakkaalla on mukanaan opaskoira. Hän on näkövammainen, ja tarvitsee koiraa liikkumisen tueksi. Miten sinun tulisi kuljettajana suhtautua tilanteeseen?","q_en":"A visually impaired customer has a guide dog for mobility support. How should you, as the driver, treat the situation?","o_fi":["Kuljettajan tulee kieltäytyä ottamasta koiraa kyytiin, koska se voi aiheuttaa allergiaa seuraavalle asiakkaalle.","Opaskoira saa kulkea matkustamossa asiakkaan kanssa, ja sille on annettava riittävästi tilaa.","Otan koiran auton kyytiin normaalisti, mutta ennen liikkeellelähtöä varmistan, että koiralla on turvavyövaljaat, kuten tieliikennelaki edellyttää.","Koira tulee siirtää etupenkin jalkatilaan erilleen asiakkaasta turvallisuussyistä."],"o_en":["The driver should refuse the dog, since it may cause allergy for the next customer","The guide dog may travel in the cabin with the customer and must be given enough room","I take the dog normally, but before setting off I ensure it has a seat-belt harness, as traffic law requires","The dog should be moved to the front footwell away from the customer for safety"],"a":1},{"t":"Erityisryhmät","q_fi":"Saat asiakkaaksi pyörätuolia käyttävän henkilön, joka saapuu taksillesi yhdessä avustajansa kanssa. Mukanaan heillä on useita laukkuja ja apuvälineitä. Matka on varattu ennakkoon esteettömällä kalustolla. Miten kuljettajan tulee toimia tilanteessa?","q_en":"A wheelchair customer arrives with an assistant and several bags and aids; the trip was pre-booked with accessible equipment. How should the driver act?","o_fi":["Kuljettaja tarjoaa aktiivisesti apua asiakkaan siirtymisessä autoon ja huolehtii siitä, että matkatavarat ja apuvälineet on lastattu turvallisesti.","Vastuuta matkatavaroista ei siirry kuljettajalle, joten niiden turvallisuudesta ei tarvitse huolehtia.","Kuljettajan tulee odottaa, että asiakas tai avustaja pyytää apua, koska omaaloitteisuus voi olla loukkaavaa.","Koska mukana on avustaja, kuljettajan ei tarvitse osallistua siirtymiseen tai tavaroiden käsittelyyn."],"o_en":["The driver actively offers help with the transfer into the car and ensures the luggage and aids are loaded safely","Responsibility for luggage doesn't pass to the driver, so its safety needn't be ensured","The driver should wait until the customer or assistant asks for help, since taking initiative may be offensive","Since an assistant is present, the driver need not take part in the transfer or handling the items"],"a":0},{"t":"Erityisryhmät","q_fi":"Olet ajamassa varhaiskasvatusikäisten lasten kuljetusta päiväkotiin. Vanhemmat ja hoitajat luottavat siihen, että toimit tilanteessa ammattimaisesti. Mikä seuraavista parhaiten kuvaa taksinkuljettajan vastuullista roolia tällaisessa kuljetuksessa?","q_en":"You're driving day-care-age children to day-care. Which best describes the driver's responsible role?","o_fi":["Kuljettajan ensisijainen tehtävä on pitää tiukka aikataulu, eikä lasten käyttäytymiseen puuttuminen kuulu hänelle.","Kuljettajan tulee käyttäytyä rauhallisesti ja johdonmukaisesti, toimien turvallisena aikuisena ja esimerkkinä lapsille.","Lapsia kuljetettaessa voidaan soveltaa sääntöjä vapaammin, jotta matkasta tulee rennompi ja mukavampi.","Koska kyse on lyhyistä matkoista, kuljettajan ei tarvitse kiinnittää huomiota käytökseensä"],"o_en":["The driver's main task is keeping a tight schedule; intervening in children's behaviour isn't their job","The driver should behave calmly and consistently, acting as a safe adult and example for the children","When carrying children, rules can be applied more loosely to make the trip relaxed","Since the trips are short, the driver needn't pay attention to their conduct"],"a":1},{"t":"Erityisryhmät","q_fi":"Mikä seuraavista pyörätuolin kiinnittämistä taksiin koskevista väitteistä pitää paikkaansa?","q_en":"Which statement about securing a wheelchair in a taxi is correct?","o_fi":["Jos pyörätuoli näyttää tukevasti seisovalta, sen kiinnittäminen ei ole pakollista.","On pyörätuolin käyttäjän vastuulla on päättää, käytetäänkö kiinnityksiä vai ei.","Kuljettajan tehtävänä on huolehtia, että pyörätuoli on kiinnitetty ajon ajaksi rungosta.","Lyhyillä matkoilla (alle 1 km) voidaan joustaa kiinnittämisestä, jos asiakas niin toivoo."],"o_en":["If the wheelchair looks firmly placed, securing isn't mandatory","It's the wheelchair user's responsibility to decide whether securing is used","The driver must ensure the wheelchair is secured by the frame for the trip","On short trips (under 1 km) securing can be relaxed if the customer wishes"],"a":2},{"t":"Erityisryhmät","q_fi":"Miten alle kolmevuotiaan lapsen turvallinen kuljettaminen taksissa tulee lain mukaan järjestää?","q_en":"How must safe transport of a child under three be arranged in a taxi by law?","o_fi":["Jos matka on lyhyt ja kaupungin sisäinen, turvalaitteen käyttö ei ole välttämätöntä.","Lapsi v
