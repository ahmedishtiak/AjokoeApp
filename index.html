{t:"Speed limits",q:"No sign is posted inside a built-up area (taajama). Default limit:",o:["30","50","80"],a:1,w:"The built-up-area sign sets 50 km/h by default."},{t:"Speed limits",q:"Outside built-up areas with no posted limit, the default is:",o:["60","80","100"],a:1,w:"Rural default is 80 km/h; reduce for conditions."},{t:"Speed limits",q:"A motorway shows 120 in summer. In winter it is typically:",o:["120","100","130"],a:1,w:"Motorway limits commonly drop to 100 km/h in winter."},{t:"Speed limits",q:"Near children at a school with no number posted, drive about:",o:["50","30","10"],a:1,w:"Adapt to conditions; children present means roughly 30 km/h."},{t:"Speed limits",q:"Serious speeding fines in Finland are large because they are:",o:["Flat","Day-fines scaled to income","Always €115"],a:1,w:"Serious cases use income-scaled day-fines; minor cases get a fixed fine."},{t:"Speed limits",q:"A speed-limit sign applies until:",o:["The next junction only","A new limit, an end sign, or area sign changes it","You leave the road"],a:1,w:"A posted limit holds until changed by another limit, an end sign, or an area sign."},{t:"Speed limits",q:"In a residential 'living street' (pihakatu), the limit is essentially:",o:["50","Walking pace, max 20","30"],a:1,w:"On a living street you drive at walking pace (max ~20 km/h) and give way to pedestrians and play."},// Winter
{t:"Winter driving",q:"On black ice at 80 km/h, stopping distance vs dry road is about:",o:["The same","Twice","Three to four times"],a:2,w:"Ice gives little grip; stopping grows 3–4×, and ABS cannot beat physics."},{t:"Winter driving",q:"Studded tyres are permitted roughly during:",o:["All year","1 Nov – 31 Mar (and when conditions need)","December only"],a:1,w:"Studded tyres allowed ~1 Nov–31 Mar and outside it when weather requires."},{t:"Winter driving",q:"Skidding while braking on ice, you should:",o:["Brake harder","Ease off, keep wheels rolling, steer to target","Pull handbrake"],a:1,w:"Release pressure, keep wheels turning, steer smoothly where you want to go."},{t:"Winter driving",q:"Black ice forms first on:",o:["Long straights","Bridges and shaded sections","Car parks"],a:1,w:"Bridges and shade lose heat fastest and ice first, often looking merely wet."},{t:"Winter driving",q:"In heavy snow with poor visibility you should:",o:["Hold the limit","Lower speed and increase the gap ahead","Use full beam"],a:1,w:"Slow below the limit, leave a big gap; full beam dazzles you off snow."},{t:"Winter driving",q:"Winter tyres on a car under 3.5 t must have a tread depth of at least:",o:["1.6 mm","3.0 mm","5.0 mm"],a:1,w:"Winter tyres require at least 3.0 mm tread (summer tyres 1.6 mm) for grip in snow."},// Markings / overtaking
{t:"Road markings",q:"A solid centre line behind a slow tractor. Overtake?",o:["Yes, tractors exempt","Yes if you see ahead","No — a solid line must not be crossed"],a:2,w:"A solid centre line forbids crossing/overtaking; wait for a dashed section."},{t:"Road markings",q:"A dashed centre line indicates:",o:["Overtaking allowed when safe","No overtaking","Parking lane"],a:0,w:"Dashed permits overtaking when safe."},{t:"Road markings",q:"A solid line beside a dashed line means:",o:["Nobody overtakes","You may overtake if the dashed line is on your side","Trucks only"],a:1,w:"Cross by the nearest line: dashed on your side = may overtake."},{t:"Road markings",q:"A yellow line along the kerb usually means:",o:["Wide parking","Stopping/parking restriction","Cycle lane"],a:1,w:"Yellow kerb markings mark stopping or parking restrictions."},{t:"Overtaking",q:"Overtaking is normally done on the:",o:["Right","Left","Either on motorways"],a:1,w:"Overtake on the left; right-side passing only in specific cases (vehicle turning left, queued lanes)."},{t:"Overtaking",q:"A car behind is already overtaking you as you plan to pull out. You:",o:["Overtake first","Let it pass before you move","Block it"],a:1,w:"Check mirrors/blind spot; if someone is overtaking you, let them finish first."},{t:"Overtaking",q:"You may not overtake:",o:["Only where signed","At crossings, hill crests, bends, junctions, or where view is limited","Never rurally"],a:1,w:"Beyond signs, never overtake where sight is restricted."},{t:"Overtaking",q:"You may pass on the right when:",o:["Never","The vehicle ahead is turning left and there is room","Always in town"],a:1,w:"Passing on the right is allowed when the vehicle ahead signals and moves to turn left, or in slow parallel-lane traffic."},// Pedestrians / cyclists / trams
{t:"Pedestrians",q:"A pedestrian is approaching a zebra crossing ahead. You:",o:["Continue","Stop and let them cross","Honk"],a:1,w:"Give way to anyone at or approaching a crossing; stop first."},{t:"Pedestrians",q:"A tram stops with no boarding island; passengers step onto the road. You:",o:["Pass slowly on the left","Stop until all are clear","Honk and pass"],a:1,w:"With no island, passengers cross your lane — stop fully until clear."},{t:"Pedestrians",q:"A blind person with a white cane steps toward the crossing. You:",o:["Expect them to wait","Always stop and give way","Sound the horn"],a:1,w:"Always give way to a pedestrian with a white cane or guide dog; they may not see you."},{t:"Cyclists",q:"Turning right with a cycle lane on your right, before turning you:",o:["Turn immediately","Check for and give way to cyclists going straight","Speed up"],a:1,w:"A cyclist going straight in the cycle lane has priority; check your right and mirror before turning across it."},{t:"Cyclists",q:"Overtaking a cyclist, you should leave:",o:["Any gap","Ample side clearance, more at speed","Less than a metre"],a:1,w:"Pass wide and slow; cyclists wobble and react to wind, surface, and gusts from your vehicle."},{t:"Cyclists",q:"At a cycle crossing as you turn, the cyclist already crossing has:",o:["No priority","Priority — give way","Equal, so push on"],a:1,w:"Treat a cycle crossing like a pedestrian crossing when turning: give way."},// Emergencies
{t:"Emergencies",q:"An emergency vehicle (blue lights, siren) is behind you; red light ahead. You:",o:["Move right and stop, even on red","Run the red to clear it","Hold your lane"],a:0,w:"Move right and stop; stopping on red here is lawful and required. Running it risks a blocking crash."},{t:"Emergencies",q:"Which flashing colour means give way?",o:["Amber","Blue","Green"],a:1,w:"Blue = emergency services; give way. Amber marks slow/maintenance vehicles."},{t:"Emergencies",q:"After a breakdown where your car endangers traffic, you must:",o:["Hazard lights only","Place a warning triangle and use hazards","Wait inside"],a:1,w:"A warning triangle is compulsory; hazards alone aren't enough. Set it at a safe distance."},{t:"Emergencies",q:"At the scene of an accident with injuries, your first duty is to:",o:["Photograph it","Stop, secure the scene, help and call 112","Drive on if not involved"],a:1,w:"Stop, make the scene safe, give first aid as able, and call the emergency number 112."},// Motorway
{t:"Motorway",q:"A car merges from a ramp on your right while you're in the right lane. Who yields?",o:["You","The merging car","Neither"],a:1,w:"Joining traffic gives way to traffic already on the motorway; moving left when safe is courteous."},{t:"Motorway",q:"On a motorway you should normally drive in:",o:["Any lane","The right lane, left only to overtake","The left lane"],a:1,w:"Keep right; use the left lane only to overtake, then return."},{t:"Motorway",q:"Stopping or reversing on the motorway carriageway is:",o:["Allowed briefly","Prohibited except a genuine emergency (use the shoulder)","Fine in light traffic"],a:1,w:"Never stop or reverse on the carriageway; pull onto the hard shoulder in trouble."},{t:"Motorway",q:"The minimum speed principle on a motorway means:",o:["No minimum","Vehicles unable to keep a reasonable speed may not use it","Everyone must do 120"],a:1,w:"Slow vehicles (e.g. mopeds, tractors) are banned; you must be able to maintain motorway speeds safely."},// Driver conduct
{t:"Driver conduct",q:"Finland's general blood-alcohol limit is:",o:["0.2‰","0.5‰","0.8‰"],a:1,w:"Limit 0.5‰; above 1.2‰ is aggravated. Random breath tests are routine."},{t:"Driver conduct",q:"Two hours after two beers you feel fine. Certainly under the limit?",o:["Yes","Not necessarily — clearance varies","Yes, feeling proves it"],a:1,w:"Clearance varies with weight, food and metabolism; 'feeling fine' is unreliable."},{t:"Driver conduct",q:"Handheld mobile phone use while driving is:",o:["OK at lights","Prohibited; hands-free only","OK for short calls"],a:1,w:"Handheld use is banned; set up navigation and audio before moving."},{t:"Driver conduct",q:"Seatbelts must be worn:",o:["Front only","Every seat, front and back","Driver only"],a:1,w:"Everyone belts up in every seat; the driver ensures children are restrained."},{t:"Driver conduct",q:"Dipped headlights must be on:",o:["Night only","Bad weather only","Always when driving, day and night"],a:2,w:"Daytime/dipped lights are mandatory whenever you drive."},{t:"Driver conduct",q:"Sounding the horn in towns is:",o:["Encouraged","Only to prevent immediate danger","OK below 50"],a:1,w:"In built-up areas the horn is only for immediate danger."},{t:"Driver conduct",q:"Hazard warning lights are mainly for:",o:["Convenience","When stationary and causing danger, or warning of a sudden hazard","Driving in rain"],a:1,w:"They signal your vehicle is a hazard, chiefly when stopped where it endangers others."},{t:"Driver conduct",q:"Feeling drowsy on a long winter drive, you should:",o:["Open a window and push on","Take a break, rest or swap","Drive faster"],a:1,w:"Fatigue impairs like alcohol; stop and rest — fresh air alone doesn't fix it."},{t:"Driver conduct",q:"A child under 135 cm generally must use:",o:["An adult belt","A suitable child restraint/booster","Nothing in the back"],a:1,w:"Children shorter than ~135 cm need an appropriate child seat or booster suited to their size."},{t:"Driver conduct",q:"Full-beam headlights must be dipped when:",o:["Never","Meeting oncoming traffic or following closely","Only in towns"],a:1,w:"Dip for oncoming vehicles and when close behind another car to avoid dazzling drivers."},{t:"Driver conduct",q:"Medication that causes drowsiness and driving:",o:["Is always fine","May impair you like alcohol — check warnings","Only matters at night"],a:1,w:"Some medicines impair reactions; heed warnings and don't drive if affected."},// Signs (text)
{t:"Road signs",q:"A blue circle with a white arrow means you:",o:["May go that way","Must go in the arrow's direction","Enter a one-way street"],a:1,w:"Blue circles are mandatory; the arrow is the only permitted direction."},{t:"Road signs",q:"In Finland, speed-limit and most prohibitory signs have which background?",o:["White, red border","Yellow, red border","Blue, white border"],a:1,w:"Finnish quirk: prohibitory/speed signs use a YELLOW background with red border; no-parking/stopping are blue."},{t:"Road signs",q:"A triangular sign with a red border warns of:",o:["A prohibition","A hazard ahead","A mandatory action"],a:1,w:"Triangles warn; prepare for the hazard shown."},{t:"Road signs",q:"A blue circle, red border, one diagonal slash means:",o:["No stopping","No parking (brief stop OK)","No entry"],a:1,w:"One slash = no parking; two crossed slashes = no stopping at all."},{t:"Road signs",q:"A round sign with two cars side by side (one red) means:",o:["Two-way traffic","No overtaking","Car park"],a:1,w:"It prohibits overtaking; the crossed-out version ends the restriction."},{t:"Road signs",q:"A red circle with a single white horizontal bar means:",o:["No entry for all vehicles","One-way","No waiting"],a:0,w:"That sign forbids entry to all vehicles in that direction."},{t:"Road signs",q:"A square blue sign with a white 'P' indicates:",o:["Prohibition","Parking permitted (subject to conditions)","Police"],a:1,w:"Blue square = information; the P shows parking is allowed, subject to any panels."},// Parking
{t:"Parking",q:"'P 2h' with a disc symbol means you:",o:["Pay a meter","Set the parking disc to arrival; max 2 h","Park free, no limit"],a:1,w:"Set the disc to the next half-hour after arrival, display it, stay max 2 h."},{t:"Parking",q:"'No parking' vs 'no stopping':",o:["Same","No-parking allows a brief load/drop-off; no-stopping forbids any pause","No-stopping allows loading"],a:1,w:"No-parking permits a brief halt to load/drop off; no-stopping means no pause at all."},{t:"Parking",q:"A winter alternating/odd-even parking sign controls:",o:["Car colour","Which side to park by date, for snow ploughing","Price"],a:1,w:"It switches the legal side by date so ploughs can clear each side; wrong side risks towing."},{t:"Parking",q:"You should not park:",o:["Anywhere in town","On or just before a pedestrian crossing","On any hill"],a:1,w:"Parking on/just before a crossing hides pedestrians; keep the approach clear."},{t:"Parking",q:"Parking on the left side of a two-way street is:",o:["Always fine","Generally not allowed (park on the right)","Only at night"],a:1,w:"On two-way streets park on the right; left-side parking is generally prohibited."},// Hazards / wildlife
{t:"Hazards",q:"A moose warning sign: risk is greatest:",o:["Midday","Dawn and dusk","Summer only"],a:1,w:"Moose move most at dawn and dusk; a 500 kg collision is often fatal — slow and scan."},{t:"Hazards",q:"A moose suddenly crosses and you can't avoid it. Advice:",o:["Swerve hard at speed","Brake firmly straight, aim behind it","Accelerate"],a:1,w:"Brake hard straight; violent swerving risks rollover/oncoming. Animals move forward, so aim behind."},{t:"Hazards",q:"Reindeer on a Lapland road should be treated as:",o:["Fast-moving","Unpredictable, often in groups — slow right down","No hazard"],a:1,w:"Reindeer wander and cluster; where there's one, more follow."},{t:"Hazards",q:"Approaching an unguarded level crossing, you must:",o:["Speed across","Slow, look both ways, cross only when clear","Rely on lights only"],a:1,w:"At an unguarded crossing, reduce speed and check for trains both ways before crossing."},{t:"Hazards",q:"Aquaplaning (hydroplaning) in heavy rain is best avoided by:",o:["Speeding up","Slowing down and keeping tyres in good tread","Braking hard"],a:1,w:"Lower speed and good tread keep tyres in contact; if it happens, ease off gently and steer straight."},// General / eco / vehicle
{t:"General",q:"Low-emission, efficient driving is best achieved by:",o:["Hard accel and late braking","Smooth accel, anticipation, steady speeds","High revs"],a:1,w:"Read ahead, accelerate gently, hold steady speeds, ease off early — smoothness saves fuel and improves safety."},{t:"General",q:"A passed Finnish theory test is valid for:",o:["One month","One year","Five years"],a:1,w:"Valid one year, within which you take the driving test."},{t:"General",q:"Tailgating is dangerous mainly because it:",o:["Saves no time","Removes reaction and stopping space","Uses fuel"],a:1,w:"Close following leaves no room to react or brake, especially on ice."},{t:"General",q:"The '3-second rule' for following distance should be:",o:["Halved in winter","At least doubled on slippery roads","Ignored on motorways"],a:1,w:"Leave 3 seconds in good conditions and much more on ice or in poor visibility."},{t:"General",q:"Before a long drive you should check:",o:["Only fuel","Tyres, lights, fluids, washer and screen","Nothing"],a:1,w:"Check tyres (incl. pressure/tread), lights, oil/coolant, washer fluid and a clean screen."},{t:"General",q:"Worn tyres in the wet mainly increase the risk of:",o:["Better grip","Longer braking and aquaplaning","Lower fuel use"],a:1,w:"Shallow tread can't clear water, lengthening braking and inviting aquaplaning."},{t:"General",q:"Carrying a load on the roof affects the car by:",o:["Nothing","Raising the centre of gravity and changing handling","Improving braking"],a:1,w:"A roof load raises the centre of gravity, affecting cornering and braking; secure it and slow down."},{t:"General",q:"If your vehicle starts to skid in a bend, you should:",o:["Brake hard","Ease off, look and steer where you want to go","Accelerate"],a:1,w:"Smoothly ease off and steer toward your intended path; harsh inputs worsen the slide."},{t:"General",q:"Eco-driving also means using engine braking by:",o:["Coasting in neutral","Lifting off early in gear to slow","Revving high"],a:1,w:"Lifting off in gear lets the engine slow you, saving fuel and brake wear; avoid neutral coasting."},{t:"General",q:"Your responsibility for passengers' seatbelts covers:",o:["No one else","Children — ensure they are properly restrained","Only the front passenger"],a:1,w:"The driver is responsible for ensuring minors are correctly restrained."},{t:"General",q:"When fuel is low and a warning shows, you should:",o:["Drive faster","Refuel at the next opportunity","Ignore it"],a:1,w:"Refuel soon; running dry can strand you dangerously and may damage the fuel system."},{t:"General",q:"A flashing green or 'walking' figure for pedestrians starting to flash means:",o:["Speed up to cross","Finish crossing; don't start","Stop in the road"],a:1,w:"A flashing pedestrian phase means finish if already crossing but do not start a new crossing."},// Additional coverage
{t:"Priority",q:"Two cars meet at an equal crossroads, each with a car to their right. To break the deadlock you should:",o:["Force through first","Make eye contact and proceed carefully one at a time","Reverse away"],a:1,w:"In a four-way right-hand deadlock, communicate and let one move at a time — courtesy and care resolve it safely."},{t:"Traffic lights",q:"A bus lane signal shows a white horizontal bar on black. For general traffic it means:",o:["Go","It is a signal for buses/trams, not for you","Stop"],a:1,w:"Special bar signals control trams and buses; follow your own normal lights, not these."},{t:"Overtaking",q:"Before pulling out to overtake, your sequence should be:",o:["Pull out, then check","Mirrors, blind spot, signal, then move when clear","Signal only"],a:1,w:"Check mirrors and the blind spot, signal your intention, and move out only when the road ahead and behind is clear."},{t:"Winter driving",q:"Engine braking on a long icy descent is useful because it:",o:["Saves fuel only","Slows you with less risk of wheel lock than heavy braking","Warms the brakes"],a:1,w:"Letting the engine slow you in a lower gear reduces reliance on the brakes, lowering the chance of locking up on ice."},{t:"Driver conduct",q:"Your view is blocked by snow on the windscreen and lights. Before driving you must:",o:["Clear a small peephole","Clear all glass, lights and the roof","Just start driving"],a:1,w:"Clear all windows, mirrors, lights and loose roof snow; a peephole and snow flying off endanger you and others."},{t:"Pedestrians",q:"At a zebra crossing with a central island, a pedestrian has crossed to the island and waits. You on the far side:",o:["Must always stop","Treat each half separately; give way when they move toward your side","Ignore them"],a:1,w:"With a refuge island the two halves act separately; give way once the pedestrian steps off toward your carriageway."},{t:"Motorway",q:"If you miss your motorway exit you should:",o:["Reverse to it","Stop and back up on the shoulder","Continue to the next exit"],a:2,w:"Never reverse or stop on a motorway; carry on to the next exit and rejoin — a missed exit is only a short detour."},{t:"Hazards",q:"Driving into low winter sun, the main danger is:",o:["Engine overheating","Glare hiding pedestrians and signals — slow and use the visor","Fuel freezing"],a:1,w:"Sun glare, worse on a dirty screen, can hide hazards; slow down, clean the glass and use the sun visor."},{t:"Road markings",q:"A continuous edge line at the side of the carriageway marks:",o:["A cycle lane","The edge of the drivable carriageway","A parking bay"],a:1,w:"The edge line shows where the carriageway ends; it helps you judge position in the dark and poor weather."},{t:"Driver conduct",q:"You realise you are too tired to continue safely on a motorway. You should:",o:["Stop on the hard shoulder to nap","Leave at a rest area or services and rest","Drive with the window open"],a:1,w:"The hard shoulder is for emergencies only; take the next rest area or services to stop and sleep safely."},{t:"Cyclists",q:"In winter, cyclists and pedestrians on shared paths near the road mean you should:",o:["Expect none in winter","Still watch carefully — many cycle and walk year-round","Use the path yourself"],a:1,w:"Finns cycle and walk through winter; expect vulnerable road users on paths and at crossings in all seasons."},{t:"General",q:"An ABS system helps mainly by:",o:["Stopping you faster on all surfaces","Preventing wheel lock so you can steer while braking hard","Replacing winter tyres"],a:1,w:"ABS stops the wheels locking so you keep steering control in emergency braking; it does not shorten distance on ice."}];/* ---------- 2) TRAFFIC SITUATIONS (Yes/No, sketched scenes) ---------- *//* Each: scene spec + proposal + answer(true=Yes) + why + highlights[{x,d,r}] (laneX,-depth) */const SIT=[{id:"s1",env:"city",scene:{road:"cross",center:"dashed",arrows:[{lane:0.35,dir:"straight"}],objects:[{type:"truckOncoming",lane:-0.5,depth:0.3}]},prop:"I may drive straight on in this lane.",a:true,w:"The painted arrow in your lane allows straight ahead. The red truck is oncoming in the opposite lane. Stay in your marked lane and follow it through the junction.",hi:[{x:0.35,d:0.34,r:20},{x:-0.5,d:0.3,r:20}]},{id:"s2",env:"city",scene:{road:"straight",center:"dashed",crossing:0.4,objects:[{type:"pedestrian",lane:0.65,depth:0.42}]},prop:"I can continue without slowing for the crossing.",a:false,w:"A pedestrian is approaching the zebra crossing. You must slow and be ready to stop and give way.",hi:[{x:0.65,d:0.42,r:18},{x:0,d:0.4,r:26}]},{id:"s3",env:"rural",scene:{road:"straight",center:"solid",objects:[{type:"carAhead",lane:0.32,depth:0.45,slow:true}]},prop:"I may overtake the slow vehicle here.",a:false,w:"The centre line is solid — overtaking is forbidden. Wait for a dashed section with a clear view.",hi:[{x:0,d:0.6,r:14}]},{id:"s4",env:"city",scene:{road:"cross",center:"dashed",objects:[{type:"carRight",lane:0.9,depth:0.5}]},prop:"I have priority over the car coming from the right.",a:false,w:"With no signs, the right-hand rule applies: give way to the vehicle approaching from your right.",hi:[{x:1.12,d:0.45,r:24}]},{id:"s5",env:"city",scene:{road:"straight",center:"dashed",objects:[{type:"cyclist",lane:0.8,depth:0.35}],turn:"right"},prop:"I may turn right across the cycle lane without giving way.",a:false,w:"A cyclist going straight on your right has priority. Check your mirror and blind spot and give way before turning.",hi:[{x:0.8,d:0.35,r:16}]},{id:"s6",env:"rural",weather:"snow",scene:{road:"straight",center:"dashed",objects:[{type:"carAhead",lane:0.32,depth:0.4}]},prop:"My following distance should be larger than on a dry road.",a:true,w:"On snow and ice, stopping distance multiplies. Increase the gap well beyond the dry-road three seconds.",hi:[{x:0,d:0.4,r:16}]},{id:"s7",env:"city",scene:{road:"straight",center:"dashed",objects:[{type:"tram",lane:-0.4,depth:0.4},{type:"pedestrian",lane:-0.1,depth:0.45}]},prop:"A tram has stopped with no island; I may pass while passengers cross.",a:false,w:"Passengers cross your lane to reach the pavement. Stop completely until everyone is safe.",hi:[{x:-0.1,d:0.45,r:16},{x:-0.4,d:0.4,r:20}]},{id:"s8",env:"city",scene:{road:"straight",center:"dashed",objects:[{type:"emergency",lane:-0.12,depth:0.5}]},prop:"I should move to the right and let the emergency vehicle pass.",a:true,w:"Blue lights and siren: move right, slow or stop, and let it through — even past a green light.",hi:[{x:-0.12,d:0.5,r:18}]},{id:"s9",env:"rural",scene:{road:"straight",center:"dashed",sign:{code:"warnMoose",lane:1.12,depth:0.55}},prop:"I should scan the roadsides and be ready to slow.",a:true,w:"The moose warning means animals may cross, especially at dawn and dusk. Reduce speed and watch the verges.",hi:[{x:1.12,d:0.55,r:24}]},{id:"s10",env:"city",scene:{road:"straight",center:"dashed",sign:{code:"speed30",lane:1.12,depth:0.5}},prop:"I may keep driving at 50 km/h past this sign.",a:false,w:"The sign sets a 30 km/h limit from here. Slow to 30 before reaching it.",hi:[{x:1.12,d:0.5,r:24}]},{id:"s11",env:"residential",scene:{road:"straight",center:"none",parked:true,objects:[{type:"pedestrian",lane:-0.55,depth:0.3}]},prop:"Between parked cars I should expect pedestrians to step out.",a:true,w:"Children and pedestrians can emerge between parked cars. Cover the brake, reduce speed, and watch the gaps.",hi:[{x:-0.55,d:0.3,r:16}]},{id:"s12",env:"city",scene:{road:"roundabout",objects:[{type:"carLeft",lane:-0.5,depth:0.4}]},prop:"I can enter the roundabout ahead of the circulating car.",a:false,w:"A vehicle is already circulating from your left. Give way and enter only when there is a safe gap.",hi:[{x:-0.5,d:0.4,r:18}]},{id:"s13",env:"rural",weather:"fog",scene:{road:"straight",center:"dashed"},prop:"In this fog I should use dipped headlights, not full beam.",a:true,w:"Full beam reflects off fog and dazzles you. Use dipped beam with fog lights, and slow down.",hi:[{x:0,d:0.2,r:30}]},{id:"s14",env:"city",scene:{road:"cross",crossDepth:0.52,center:"dashed",stopLine:0.44,light:{state:"yellowFlash",lane:1.06,depth:0.5}},prop:"The flashing yellow means I must stop and wait.",a:false,w:"Flashing yellow is not a stop. Slow down, take care, and apply normal priority (right-hand) rules at the junction.",hi:[{x:1.06,d:0.5,r:16}]},{id:"s15",env:"city",scene:{road:"cross",crossDepth:0.52,center:"dashed",stopLine:0.44,light:{state:"red",lane:1.06,depth:0.5}},prop:"I may cross the junction on this red light.",a:false,w:"Red means stop behind the stop line and wait. No crossing the junction until the light turns green.",hi:[{x:1.06,d:0.5,r:16},{x:0.5,d:0.44,r:14}]},{id:"s16",env:"rural",scene:{road:"curveLeft",center:"solid"},prop:"I should reduce speed before the bend, not in it.",a:true,w:"Brake on the straight before the curve; braking mid-bend on a slippery road can break grip and cause a skid.",hi:[{x:-0.3,d:0.5,r:18}]},{id:"s17",env:"city",scene:{road:"tjunction",crossDepth:0.52,center:"dashed",stopLine:0.46,sign:{code:"yield",lane:1.12,depth:0.5},objects:[{type:"crossR",lane:-0.55,depth:0.52}]},prop:"The give-way sign lets me roll on without yielding if I feel it's clear.",a:false,w:"A give-way sign means you must yield to traffic on the through road — here a car is crossing. Proceed only when it is genuinely clear.",hi:[{x:1.12,d:0.5,r:24},{x:-0.55,d:0.52,r:18}]},{id:"s18",env:"highway",scene:{road:"straight",center:"dashed",lanes:2,objects:[{type:"carMergeRight",lane:0.8,depth:0.45}]},prop:"Traffic merging from the on-ramp must give way to me.",a:true,w:"You are already on the motorway, so joining traffic yields. Moving left when safe is the courteous choice.",hi:[{x:0.8,d:0.45,r:16}]},{id:"s19",env:"city",scene:{road:"straight",center:"dashed",objects:[{type:"ballChild",lane:-0.5,depth:0.35}]},prop:"A ball rolls into the road; I should expect a child to follow.",a:true,w:"Where a ball appears, a child often follows. Brake and be ready to stop.",hi:[{x:-0.5,d:0.35,r:16}]},{id:"s20",env:"rural",scene:{road:"straight",center:"dashed",objects:[{type:"carAhead",lane:0.2,depth:0.5,signalLeft:true}]},prop:"The car ahead signals left; I may pass it on the right.",a:true,w:"When the vehicle ahead clearly signals and moves to turn left, you may carefully pass on the right if there is room.",hi:[{x:0.2,d:0.5,r:16},{x:0.62,d:0.5,r:14}]},{id:"s21",env:"city",scene:{road:"straight",center:"dashed",sign:{code:"noStopping",lane:1.12,depth:0.5}},prop:"I can stop here briefly to drop off a passenger.",a:false,w:"A no-stopping sign forbids any pause, even to drop off. Find a permitted spot.",hi:[{x:1.12,d:0.5,r:24}]},{id:"s22",env:"rural",weather:"night",scene:{road:"straight",center:"dashed",objects:[{type:"carOncoming",lane:-0.45,depth:0.45}]},prop:"I should dip my full beam for the oncoming car.",a:true,w:"Dip your headlights when meeting oncoming traffic so you don't dazzle the other driver.",hi:[{x:-0.45,d:0.45,r:16}]},{id:"s23",env:"city",scene:{road:"straight",center:"dashed",crossing:0.45,objects:[{type:"blind",lane:0.6,depth:0.45}]},prop:"A person with a white cane waits; I must give way.",a:true,w:"Always give way to a pedestrian with a white cane or guide dog — they may not be able to see you.",hi:[{x:0.6,d:0.45,r:16}]},{id:"s24",env:"residential",scene:{road:"straight",center:"none",sign:{code:"livingStreet",lane:1.12,depth:0.5}},prop:"On this living street I may drive at the normal 50 km/h.",a:false,w:"On a living street you drive at walking pace and give way to pedestrians, including children playing.",hi:[{x:1.12,d:0.5,r:24}]},{id:"s25",env:"rural",weather:"rain",scene:{road:"straight",center:"dashed"},prop:"In heavy standing water I should slow to avoid aquaplaning.",a:true,w:"Standing water can lift the tyres (aquaplaning). Reduce speed; if it happens, ease off and steer straight.",hi:[{x:0,d:0.3,r:24}]},{id:"s26",env:"city",scene:{road:"cross",center:"dashed",sign:{code:"priorityRoad",lane:1.12,depth:0.5},objects:[{type:"carRight",lane:0.9,depth:0.5}]},prop:"On this priority road I keep priority over the side road on the right.",a:true,w:"The priority-road sign overrides the right-hand rule; side-road traffic must give way to you.",hi:[{x:1.12,d:0.5,r:24},{x:0.9,d:0.5,r:14}]},{id:"s27",env:"city",scene:{road:"straight",center:"dashed",objects:[{type:"busStop",lane:0.7,depth:0.4,indicating:true}]},prop:"A bus signals to pull out from its stop; in town I should let it go.",a:true,w:"In built-up areas you must give way to a bus signalling to leave its stop, if you can do so safely.",hi:[{x:0.7,d:0.4,r:18}]},{id:"s28",env:"rural",scene:{road:"straight",center:"dashed",sign:{code:"warnLevelOpen",lane:1.12,depth:0.55}},prop:"Approaching the level crossing I should slow and check for trains.",a:true,w:"Reduce speed, look both ways and cross only when clear; never queue on the tracks.",hi:[{x:1.12,d:0.55,r:24}]},{id:"s29",env:"city",scene:{road:"straight",center:"solid",objects:[{type:"cyclist",lane:0.6,depth:0.4}]},prop:"I may overtake the cyclist closely since they are slow.",a:false,w:"Pass cyclists wide and at reduced speed; a close pass is dangerous and the solid line limits your room.",hi:[{x:0.6,d:0.4,r:16}]},{id:"s30",env:"city",scene:{road:"cross",center:"dashed",arrows:[{lane:-0.4,dir:"left"},{lane:0.4,dir:"straight"}]},prop:"From the right-hand lane (straight arrow) I may turn left.",a:false,w:"Painted arrows are binding. The left arrow lane turns left; the straight-arrow lane must go straight. Pick the correct lane early.",hi:[{x:-0.4,d:0.34,r:16},{x:0.4,d:0.34,r:16}]},// ---- PRIORITY / RIGHT OF WAY ----
{id:"s31",env:"city",scene:{road:"cross",center:"dashed",objects:[{type:"carLeft",lane:-0.85,depth:0.5}]},prop:"A car approaches from my left at this unmarked junction; I must give way to it.",a:false,w:"The right-hand rule applies: you yield to traffic from the RIGHT, not the left. You keep priority here — but you would still yield to a tram from either side.",hi:[{x:-0.8,d:0.5,r:18}]},{id:"s32",env:"city",scene:{road:"cross",center:"dashed",sign:{code:"stop",lane:1.12,depth:0.5},objects:[{type:"crossR",lane:-0.55,depth:0.52}]},prop:"At this STOP sign I may roll through slowly because the road looks clear.",a:false,w:"STOP means a full stop at the line every time, then give way. Rolling through is an offence even if it seems clear.",hi:[{x:1.12,d:0.5,r:24}]},{id:"s33",env:"city",scene:{road:"cross",center:"dashed",sign:{code:"priorityRoad",lane:1.12,depth:0.5},objects:[{type:"carRight",lane:0.9,depth:0.5}]},prop:"I am on a priority road; the car waiting on the side road to my right must give way to me.",a:true,w:"The priority-road sign overrides the right-hand rule. Side-road traffic yields to you.",hi:[{x:1.12,d:0.5,r:24},{x:0.9,d:0.5,r:16}]},{id:"s34",env:"city",scene:{road:"cross",center:"dashed",arrows:[{lane:0.35,dir:"left"}],objects:[{type:"carOncoming",lane:-0.45,depth:0.45}]},prop:"Turning left here, I must give way to the oncoming car going straight.",a:true,w:"A left turn yields to oncoming traffic proceeding straight, and to pedestrians/cyclists crossing the road you enter.",hi:[{x:-0.45,d:0.45,r:18}]},{id:"s35",env:"residential",scene:{road:"straight",center:"none",sign:{code:"livingStreet",lane:1.12,depth:0.5},objects:[{type:"pedestrian",lane:-0.4,depth:0.4}]},prop:"Leaving this yard street onto the main road, I must give way to all traffic and pedestrians.",a:true,w:"Exiting a yard/living street, you give way to everyone — through traffic and pedestrians alike.",hi:[{x:1.12,d:0.5,r:24},{x:-0.4,d:0.4,r:16}]},{id:"s36",env:"city",scene:{road:"tjunction",crossDepth:0.52,center:"dashed",objects:[{type:"crossR",lane:-0.55,depth:0.52}]},prop:"My road ends at this T-junction with no signs, so the through road automatically has priority.",a:false,w:"Without signs the right-hand rule still governs. Road shape or which road 'ends' does not create priority by itself.",hi:[{x:-0.55,d:0.52,r:18}]},{id:"s37",env:"rural",scene:{road:"straight",center:"solid",parked:true,objects:[{type:"carOncoming",lane:-0.45,depth:0.4}]},prop:"An obstacle is on my side of this narrow road; I must give way to the oncoming car.",a:true,w:"Where the obstruction is on your side, you wait and let oncoming traffic pass first.",hi:[{x:-0.45,d:0.4,r:18}]},{id:"s38",env:"city",scene:{road:"straight",center:"dashed",objects:[{type:"tram",lane:-0.4,depth:0.4}]},prop:"A tram approaches the junction from my left; I may go first because it is on my left.",a:false,w:"Trams get free passage at junctions from EITHER direction, including the left. Give way.",hi:[{x:-0.4,d:0.4,r:20}]},{id:"s39",env:"city",scene:{road:"cross",center:"dashed",objects:[{type:"carRight",lane:0.9,depth:0.5}]},prop:"At this unmarked crossroads I must give way to the car coming from my right.",a:true,w:"Right-hand rule: yield to traffic approaching from the right when there are no signs or signals.",hi:[{x:0.9,d:0.5,r:18}]},{id:"s40",env:"city",scene:{road:"cross",center:"dashed",sign:{code:"priorityEnds",lane:1.12,depth:0.5},objects:[{type:"carRight",lane:0.9,depth:0.5}]},prop:"Past this 'end of priority road' sign I keep priority over the car on my right.",a:false,w:"Priority has ended, so the normal right-hand rule resumes — give way to the car from the right.",hi:[{x:1.12,d:0.5,r:24},{x:0.9,d:0.5,r:16}]},// ---- ROUNDABOUTS ----
{id:"s41",env:"city",scene:{road:"roundabout",sign:{code:"warnRoundabout",lane:1.12,depth:0.55},objects:[{type:"carLeft",lane:-0.5,depth:0.4}]},prop:"A car is already circulating from my left; I must give way before entering.",a:true,w:"Traffic already in the roundabout has priority. Enter only when there is a safe gap.",hi:[{x:-0.5,d:0.4,r:18}]},{id:"s42",env:"city",scene:{road:"roundabout"},prop:"I should signal left as I enter the roundabout.",a:false,w:"No signal on entry. Signal RIGHT only just before the exit you take.",hi:[{x:0,d:0.4,r:22}]},{id:"s43",env:"city",scene:{road:"roundabout",crossing:0.3,objects:[{type:"pedestrian",lane:0.6,depth:0.32}]},prop:"Leaving the roundabout, I must give way to the pedestrian on the crossing at my exit.",a:true,w:"The exiting driver gives way to pedestrians and cyclists crossing the exit road.",hi:[{x:0.6,d:0.32,r:18}]},{id:"s44",env:"city",scene:{road:"roundabout",objects:[{type:"cyclist",lane:-0.45,depth:0.4}]},prop:"A cyclist is circulating in the roundabout; they have the same priority as a car.",a:true,w:"Cyclists in the roundabout have priority like any other vehicle. Give way on entry.",hi:[{x:-0.45,d:0.4,r:16}]},// ---- TRAFFIC LIGHTS ----
{id:"s45",env:"city",scene:{road:"cross",crossDepth:0.52,center:"dashed",stopLine:0.44,light:{state:"redYellow",lane:1.06,depth:0.5}},prop:"Red and yellow show together, so I may start moving now.",a:false,w:"Red+yellow means 'get ready'. Stay stopped until the light is fully green.",hi:[{x:1.06,d:0.5,r:16}]},{id:"s46",env:"city",scene:{road:"cross",crossDepth:0.52,center:"dashed",stopLine:0.44,light:{state:"green",lane:1.06,depth:0.5},arrows:[{lane:0.35,dir:"left"}],objects:[{type:"carOncoming",lane:-0.45,depth:0.42}]},prop:"I have a green light and want to turn left; I must still give way to oncoming traffic.",a:true,w:"A round green gives no priority for a left turn — yield to oncoming vehicles and to crossing pedestrians.",hi:[{x:-0.45,d:0.42,r:18}]},{id:"s47",env:"city",scene:{road:"cross",crossDepth:0.52,center:"dashed",stopLine:0.44,light:{state:"green",lane:1.06,depth:0.5},crossing:0.34,objects:[{type:"pedestrian",lane:0.62,depth:0.36}]},prop:"Turning right on green, I must give way to pedestrians crossing the road I turn into.",a:true,w:"Green does not exempt you from yielding to pedestrians already crossing your exit road.",hi:[{x:0.62,d:0.36,r:18}]},{id:"s48",env:"city",scene:{road:"cross",crossDepth:0.52,center:"dashed",stopLine:0.44,light:{state:"green",lane:1.06,depth:0.5}},prop:"The light is green; I may proceed when the way is clear.",a:true,w:"Green means go if the junction is clear. Watch for late crossing pedestrians and emergency vehicles.",hi:[{x:1.06,d:0.5,r:16}]},// ---- PEDESTRIANS & CYCLISTS ----
{id:"s49",env:"city",scene:{road:"straight",center:"dashed",crossing:0.42,objects:[{type:"pedestrian",lane:-0.55,depth:0.45}]},prop:"A pedestrian is stepping onto the zebra from the left; I must give way.",a:true,w:"Give free passage to a pedestrian on, or about to step onto, the crossing.",hi:[{x:-0.55,d:0.45,r:18},{x:0,d:0.42,r:24}]},{id:"s50",env:"city",scene:{road:"straight",center:"dashed",crossing:0.45,objects:[{type:"carAhead",lane:-0.4,depth:0.5,slow:true}]},prop:"A car in the next lane has stopped at the crossing; I may pass it without stopping.",a:false,w:"Never pass a vehicle stopped for a crossing — a pedestrian you cannot see may be in front of it.",hi:[{x:-0.4,d:0.5,r:18},{x:0,d:0.45,r:24}]},{id:"s51",env:"city",scene:{road:"straight",center:"dashed",crossing:0.45,objects:[{type:"blind",lane:0.6,depth:0.45}]},prop:"A person with a white cane waits at the crossing; I must give way and take special care.",a:true,w:"A white cane signals a visually impaired pedestrian. Always stop and give way.",hi:[{x:0.6,d:0.45,r:16}]},{id:"s52",env:"city",scene:{road:"straight",center:"dashed",objects:[{type:"child",lane:-0.5,depth:0.4}]},prop:"A child is alone near the roadside; I should slow and be ready to stop.",a:true,w:"Children are unpredictable. The law requires special caution near children, the elderly and the disabled.",hi:[{x:-0.5,d:0.4,r:16}]},{id:"s53",env:"city",scene:{road:"straight",center:"dashed",turn:"right",objects:[{type:"cyclist",lane:0.8,depth:0.35}]},prop:"Turning right, I may cross the cycle lane without giving way to the cyclist going straight.",a:false,w:"A cyclist going straight on your right has priority. Check the mirror and blind spot and give way.",hi:[{x:0.8,d:0.35,r:16}]},{id:"s54",env:"city",scene:{road:"straight",center:"solid",objects:[{type:"cyclist",lane:0.55,depth:0.4}]},prop:"Overtaking this cyclist, I must leave plenty of side clearance.",a:true,w:"Pass cyclists wide and slow; they can wobble or be pushed by gusts. A close pass is dangerous.",hi:[{x:0.55,d:0.4,r:16}]},{id:"s55",env:"city",scene:{road:"straight",center:"dashed",crossing:0.44,objects:[{type:"pedestrian",lane:0.05,depth:0.46}]},prop:"A pedestrian is on the refuge island and stepping toward my side; I must give way.",a:true,w:"Once the pedestrian moves toward your half of the road, give way and let them complete the crossing.",hi:[{x:0.05,d:0.46,r:16}]},{id:"s56",env:"city",scene:{road:"straight",center:"dashed",crossing:0.42,objects:[{type:"cyclist",lane:-0.5,depth:0.45}]},prop:"A person is pushing (walking) a bicycle across the zebra; I treat them as a pedestrian and give way.",a:true,w:"A walked bicycle counts as a pedestrian on the crossing — give way.",hi:[{x:-0.5,d:0.45,r:16}]},// ---- OVERTAKING & LANES ----
{id:"s57",env:"rural",scene:{road:"straight",center:"solid",objects:[{type:"carAhead",lane:0.32,depth:0.5,slow:true}]},prop:"A solid centre line is on my side; I may cross it to overtake this slow car.",a:false,w:"A solid centre line must not be crossed. Wait for a dashed section with a clear view.",hi:[{x:0,d:0.6,r:14}]},{id:"s58",env:"rural",scene:{road:"straight",center:"dashed",objects:[{type:"carAhead",lane:0.32,depth:0.5,slow:true}]},prop:"The centre line is dashed and the road ahead is clear; I may overtake.",a:true,w:"A dashed line allows overtaking when it is safe — good view, enough room, no oncoming hazard.",hi:[{x:0.32,d:0.5,r:16}]},{id:"s59",env:"rural",scene:{road:"straight",center:"dashed",objects:[{type:"carAhead",lane:0.2,depth:0.5,signalLeft:true}]},prop:"The car ahead signals left and moves over; I may pass it on the right.",a:true,w:"When the vehicle ahead clearly signals and moves to turn left, you may pass carefully on the right.",hi:[{x:0.2,d:0.5,r:16},{x:0.62,d:0.5,r:14}]},{id:"s60",env:"rural",scene:{road:"curveLeft",center:"solid",objects:[{type:"carAhead",lane:0.3,depth:0.5}]},prop:"I may overtake on this blind left bend if I am quick.",a:false,w:"Overtaking is forbidden where sight distance is too short — bends, hill crests and junctions.",hi:[{x:0.3,d:0.5,r:16}]},{id:"s61",env:"rural",scene:{road:"straight",center:"dashed",objects:[{type:"carAhead",lane:0.32,depth:0.45,signalLeft:true}]},prop:"The car ahead has signalled to overtake the vehicle in front of it; I may begin overtaking it.",a:false,w:"Do not overtake a vehicle that is itself starting to overtake. Wait until the road is settled.",hi:[{x:0.32,d:0.45,r:16}]},{id:"s62",env:"highway",scene:{road:"straight",center:"dashed",lanes:2,objects:[{type:"carMergeRight",lane:0.8,depth:0.45}]},prop:"On this multi-lane road I should keep to the rightmost free lane.",a:true,w:"Keep right; use the left lanes only for overtaking, then return. Don't lane-hog.",hi:[{x:0.8,d:0.45,r:16}]},// ---- SPEED & SIGNS ----
{id:"s63",env:"city",scene:{road:"straight",center:"dashed",sign:{code:"speed30",lane:1.12,depth:0.5}},prop:"I may keep driving 50 km/h past this sign.",a:false,w:"The sign sets 30 km/h from here. Slow to 30 before reaching it.",hi:[{x:1.12,d:0.5,r:24}]},{id:"s64",env:"rural",scene:{road:"straight",center:"dashed",sign:{code:"speed80",lane:1.12,depth:0.5}},prop:"This yellow-background sign is a normal Finnish speed-limit sign for 80 km/h.",a:true,w:"Finnish prohibitory and speed-limit signs use a yellow background — a distinctive national feature.",hi:[{x:1.12,d:0.5,r:24}]},{id:"s65",env:"residential",scene:{road:"straight",center:"none",sign:{code:"livingStreet",lane:1.12,depth:0.5}},prop:"On this living street I may drive the normal 50 km/h.",a:false,w:"On a living street you drive at walking pace (max about 20 km/h) and give way to pedestrians.",hi:[{x:1.12,d:0.5,r:24}]},{id:"s66",env:"city",scene:{road:"straight",center:"dashed",sign:{code:"noEntry",lane:1.12,depth:0.5}},prop:"This sign means I must not drive into this street.",a:true,w:"A red circle with a white bar means no entry for all vehicles in this direction.",hi:[{x:1.12,d:0.5,r:24}]},{id:"s67",env:"city",scene:{road:"straight",center:"dashed",sign:{code:"noOvertake",lane:1.12,depth:0.5},objects:[{type:"carAhead",lane:0.32,depth:0.5}]},prop:"Past this sign I may overtake the car ahead.",a:false,w:"The two-cars sign forbids overtaking other motor vehicles from here until the end sign.",hi:[{x:1.12,d:0.5,r:24}]},{id:"s68",env:"rural",scene:{road:"straight",center:"dashed",sign:{code:"warnGeneral",lane:1.12,depth:0.55}},prop:"This triangular sign warns of a hazard ahead, so I should prepare and slow if needed.",a:true,w:"Triangles warn. The 'other danger' sign means a hazard ahead not covered by a specific sign.",hi:[{x:1.12,d:0.55,r:24}]},{id:"s69",env:"city",scene:{road:"straight",center:"dashed",sign:{code:"warnLights",lane:1.12,depth:0.55}},prop:"This sign tells me to be ready to stop for traffic lights ahead.",a:true,w:"The traffic-signals warning sign means lights are ahead; be ready to stop.",hi:[{x:1.12,d:0.55,r:24}]},// ---- WINTER / WEATHER / HAZARD ----

e, so you must stop until they are clear. (Answer: you may NOT pass.)",hi:[{x:-0.1,d:0.45,r:16},{x:-0.4,d:0.4,r:20}]},{id:"s98",env:"rural",scene:{road:"straight",center:"dashed",sign:{code:"warnLevelGuarded",lane:1.12,depth:0.55}},prop:"At this guarded level crossing I must stop and wait when the barriers lower or the light shows red.",a:true,w:"Stop and wait at a guarded crossing when barriers are down or the red light shows. Never zig-zag round barriers.",hi:[{x:1.12,d:0.55,r:24}]},{id:"s99",env:"rural",scene:{road:"straight",center:"dashed",sign:{code:"warnLevelOpen",lane:1.12,depth:0.55}},prop:"At this unguarded level crossing I should slow and check both ways for a train before crossing.",a:true,w:"An unguarded crossing has no barriers — reduce speed, look both ways and cross only when clear.",hi:[{x:1.12,d:0.55,r:24}]},{id:"s100",env:"city",scene:{road:"straight",center:"dashed",sign:{code:"warnRoadworks",lane:1.12,depth:0.55}},prop:"A traffic controller at these road works directs me to stop; I must obey them even if the lights are green.",a:true,w:"A traffic controller's signals override traffic lights and signs. Obey the controller.",hi:[{x:1.12,d:0.55,r:24}]},// ---- RISK PERCEPTION ----

{t:"Commercial mgmt",q:"Which company form gives the owner limited liability and has no minimum share capital requirement in Finland?",o:["Toiminimi (sole trader)","Osakeyhtiö (Oy)","Avoin yhtiö (general partnership)"],a:1,w:"An Oy is a separate legal person with limited liability, and since 2019 it has no minimum share capital. A sole trader is personally liable for business debts."},{t:"Commercial mgmt",q:"As a sole trader (toiminimi), how is your liability for business debts treated?",o:["Limited to business assets","You are personally liable with your own assets","No liability at all"],a:1,w:"A sole trader and the business are the same legal person, so you answer for business debts with your personal assets."},{t:"Commercial mgmt",q:"Municipal and Kela-funded taxi rides are typically awarded through:",o:["First come, first served","Public procurement (competitive tendering)","Personal contacts"],a:1,w:"Public bodies must follow procurement law; transport contracts are tendered, and operators bid to win them."},{t:"Commercial mgmt",q:"A valid sales invoice must as a minimum include:",o:["Only the total sum","Seller and buyer details, date, itemised service, VAT rate and amount","Just the driver's name"],a:1,w:"Invoicing rules require identifying the parties, the date, what was sold, and the VAT breakdown so the document is valid for accounting and VAT."},{t:"Commercial mgmt",q:"The main purpose of a written work plan and organisation chart in a taxi firm is to:",o:["Satisfy curiosity","Clarify roles, shifts and responsibilities so operations run safely and lawfully","Replace insurance"],a:1,w:"Planning who drives, when, and who is responsible keeps shifts legal (working-hours rules) and service reliable."},{t:"Commercial mgmt",q:"Safety management in a taxi business mainly means:",o:["Only buying a dashcam","Systematically identifying risks and instructing drivers on vehicle, equipment and passenger safety","Driving fast"],a:1,w:"It is a continuous process: assess hazards, give drivers clear safety instructions, and take preventive measures."},{t:"Commercial mgmt",q:"A driver must be able to take into account a passenger's functional limitations. This is part of the operator's duty to ensure:",o:["Maximum profit","Accessible, appropriate service for special groups","Faster trips"],a:1,w:"The law requires drivers to help passengers in and out and meet the special needs arising from disabilities or impairments."},{t:"Commercial mgmt",q:"Accepting card payments and handling cash correctly matters commercially because it:",o:["Is optional and irrelevant","Affects customer service, cash flow and proper recording of income","Only concerns the bank"],a:1,w:"Payment methods influence customer convenience, your liquidity, and the accuracy of recorded sales for accounting and tax."},// --- Financial management (9) ---

nd actually collecting payment from customers."},{t:"Financial mgmt",q:"To judge whether the business is profitable, you would look first at:",o:["The colour of the car","Profit and key ratios from the income statement","The number of phone calls"],a:1,w:"Profitability is read from results and financial ratios (e.g. operating margin), not from activity alone."},{t:"Financial mgmt",q:"Good liquidity means the business:",o:["Owns many cars","Can pay its bills on time as they fall due","Has high revenue only"],a:1,w:"Liquidity is about having cash available when payments are due; high revenue with poor cash timing can still cause trouble."},// --- Vehicle & traffic legislation (4) ---

:0},{"t":"Asiakaspalvelu","q_fi":"Mikä seuraavista väittämistä pitää paikkansa?","q_en":"Which of the following statements is correct?","o_fi":["Jos tarkkaa hintaa ei tiedä, kerrotaan hinnan määräytymisperuste.","Keksitään summa.","Kieltäydytään kertomasta hinnasta.","Veloitetaan satunnainen summa."],"o_en":["If the exact price is unknown, explain how it is determined.","Make up a sum.","Refuse to state a price.","Charge a random sum."],"a":0},{"t":"Ajoluvan perusteet","q_fi":"Mitä taksinkuljettajan on osattava kokeessa aihealueesta 'liikenneturvallisuus'?","q_en":"What must a driver know in the exam's 'traffic safety' topic?","o_fi":["Turvalliseen kuljetukseen ja liikenteeseen vaikuttavat tekijät","Vain verotus","Vain yhtiömuodot","Vain kirjanpito"],"o_en":["Factors affecting safe transport and traffic","Only taxation","Only company forms","Only accounting"],"a":0},{"t":"Ajoluvan perusteet","q_fi":"Mitä aihealuetta kokeessa EI enää ole?","q_en":"Which topic is NO longer in the exam?","o_fi":["Paikallistuntemus","Asiakaspalvelu","Liikenneturvallisuus","Erityisryhmät"],"o_en":["Local knowledge","Customer service","Traffic safety","Special groups"],"a":0},{"t":"Ajoluvan perusteet","q_fi":"Mitä kokeen aihealue 'erityisryhmät' käsittelee?","q_en":"What does the exam topic 'special groups' cover?","o_fi":["Yrityksen verotusta","Kirjanpitoa","Palkkahallintoa","Eri matkustajaryhmien erityistarpeita"],"o_en":["Company taxation","Accounting","Payroll","Special needs of different passenger groups"],"a":3},{"t":"Asiakaspalvelu","q_fi":"Mitä teet, jos kaksi asiakasta kiistelee etusijasta taksitolpalla?","q_en":"What if two customers argue over priority at a taxi rank?","o_fi":["Poistut paikalta","Valitset kovaäänisimmän","Toimit rauhallisesti ja tasapuolisesti","Provosoit lisää"],"o_en":["Leave the scene","Pick the loudest","Act calmly and fairly","Provoke more"],"a":2},{"t":"Asiakaspalvelu","q_fi":"Mitä teet, jos asiakas haluaa kuitin yritykselleen?","q_en":"What if a customer "o_fi":["Etsit lähimmän sallitun ja turvallisen paikan","Pysähdyt suojatielle","Pysähdyt kieltopaikalle","Jätät risteykseen"],"o_en":["Find the nearest permitted, safe spot","Stop on a crossing","Stop at the forbidden place","Drop in a junction"],"a":0},{"t":"Liikenneturvallisuus","q_fi":"Mikä seuraavista väittämistä pitää paikkansa?","q_en":"Which of the following statements is correct?","o_fi":["Lasin puhdistus on tarpeetonta.","Näkyvyydellä ei ole väliä.","Tuulilasi ja ikkunat puhdistetaan näkyvyyden takaamiseksi ennen ajoa.","Osittain peitetyllä lasilla saa ajaa."],"o_en":["Clearing the glass is unnecessary.","Visibility doesn't matter.","The windscreen and windows are cleared for visibility before driving.","You may drive with it partly covered."],"a":2},{"t":"Asiakaspalvelu","q_fi":"Mikä seuraavista väittämistä pitää paikkansa?","q_en":"Which of the following statements is correct?","o_fi":["Palaute kielletään.","Asiakaspalautteeseen suhtaudutaan asiallisesti ja toimintaa kehitetään.","Palaute jätetään huomiotta.","Palautteesta loukkaannutaan."],"o_en":["Feedback is denied.","Customer feedback is taken professionally and used to improve.","Feedback is ignored.","Feedback offends you."],"a":1}];// Bilingual course derived from the Finnish study material "Taksikoe" (driver-permit course).
// Structure: COURSE = [ {tf,te, secs:[ {hf,he, it:[ {t:'p'|'li', f, e} ] } ] } ]
const COURSE=[{tf:"Oppitunti 1: Johdatus taksinkuljettajan kokeeseen",te:"Lesson 1: Introduction to the taxi driver exam",secs:[{hf:"Yleistietoa kokeesta",he:"General information about the exam",it:[{t:"p",f:"Taksinkuljettajan osaaminen varmistetaan virallisella sähköisellä kokeella, jonka tarkoituksena on arvioida hakijan valmiudet toimia vastuullisena ja asiakaspalveluhenkisenä kuljettajana. Koe testaa työssä vaadittavia tietoja.",e:"A taxi driver's competence is verified by an official electronic exam whose purpose is to assess the applicant's readiness to act as a responsible, service-minded driver. The exam tests the knowledge required in the job."},{t:"p",f:"Kokeessa on 50 monivalintakysymystä, joista jokaiseen valitaan yksi oikea vastaus useista vaihtoehdoista. Jokaisesta oikeasta vastauksesta saa yhden pisteen. Miinuspisteitä ei ole. Hyväksytty suoritus edellyttää sekä kokonaispistemäärän että aihealuekohtaisten vähimmäispisteiden saavuttamista.",e:"The exam has 50 multiple-choice questions, each with one correct answer among several options. Each correct answer scores one point. There are no minus points. A pass requires reaching both the total score and the per-topic minimum scores."}]},{hf:"Kokeen kesto",he:"Exam duration",it:[{t:"li",f:"Normaalisti: 45 minuuttia.",e:"Normally: 45 minutes."},{t:"li",f:"Erityistilanteessa (esim. lukihäiriö tai lääkärinlausunnolla todettu syy): 90 minuuttia suullisesti tai kirjallisesti.",e:"In special cases (e.g. dyslexia or a medically certified reason): 90 minutes, orally or in writing."}]},{hf:"Kokeen suoritus",he:"Taking the exam",it:[{t:"p",f:"Koe tehdään sähköisesti Ajovarman palvelupisteessä tablettilaitteella. Ajan kokeeseen voi varata Ajovarman verkkosivuilta (ajovarma.fi/ammattiliikenne).",e:"The exam is taken electronically at an Ajovarma service point on a tablet. You can book a time on Ajovarma's website (ajovarma.fi/ammattiliikenne)."}]},{hf:"Kokeen sisältö",he:"Exam content",it:[{t:"p",f:"Kysymykset liittyvät neljään keskeiseen osa-alueeseen, jotka ovat olennaisia taksinkuljettajan työssä. Näissä arvioidaan käytännön tietoja, eettistä ymmärrystä ja asiakaspalvelutaitoja.",e:"The questions relate to four key areas essential to a taxi driver's work. They assess practical knowledge, ethical understanding and customer-service skills."}]},{hf:"1. Matkustajien avustaminen ja turvallisuus",he:"1. Assisting passengers and safety",it:[{t:"li",f:"Kuljettajan yleisvastuu matkustajista ja kuljetuksen suorittamisesta.",e:"The driver's general responsibility for passengers and for carrying out the transport."},{t:"li",f:"Teknisten apuvälineiden, turvalaitteiden ja viestintälaitteiden oikea käyttö ja kiinnittäminen.",e:"Correct use and securing of technical aids, safety devices and communication equipment."}]},{hf:"2. Matkustajien erityisryhmien huomiointi",he:"2. Considering special passenger groups",it:[{t:"li",f:"Taito huomioida erityisryhmien (esim. vanhukset, koululaiset, vammaiset) tarpeet.",e:"The ability to consider the needs of special groups (e.g. elderly, schoolchildren, disabled people)."},{t:"li",f:"Matkustajien avun tarpeen tunnistaminen ja avustamista koskevat vaatimukset.",e:"Recognising passengers' need for help and the requirements for assisting them."}]},{hf:"3. Asiakaspalvelutilanteet",he:"3. Customer-service situations",it:[{t:"li",f:"Asiakkaan matkustusmukavuuteen vaikuttavat tekijät.",e:"Factors affecting the customer's travel comfort."},{t:"li",f:"Kuljettajan käytös ja vuorovaikutus asiakkaan kanssa.",e:"The driver's behaviour and interaction with the customer."},{t:"li",f:"Yleinen vastuu hyvästä asiakaskokemuksesta.",e:"General responsibility for a good customer experience."}]},{hf:"4. Kuljetusten ja liikenteen turvallisuus",he:"4. Transport and traffic safety",it:[{t:"li",f:"Yleinen liikenneturvallisuus.",e:"General traffic safety."},{t:"li",f:"Taksin kuljettamiseen liittyvät säännökset ja määräykset.",e:"Rules and regulations relating to driving a taxi."},{t:"li",f:"Lain mukaiset vaatimukset palvelun laadusta ja turvallisuudesta.",e:"Statutory requirements on service quality and safety."}]},{hf:"Ehdot ennen ajoluvan hakemista",he:"Conditions before applying for the permit",it:[{t:"li",f:"Vähintään vuoden voimassa ollut B-luokan ajo-oikeus.",e:"A category B driving licence held for at least one year."},{t:"li",f:"Ammattiliikenteen terveysvaatimusten täyttyminen (terveystarkastus ja lääkärintodistus ammattia varten).",e:"Meeting the professional-traffic health requirements (a health check and a medical certificate for the profession)."},{t:"li",f:"Taksinkuljettajan kokeen läpäiseminen.",e:"Passing the taxi driver exam."},{t:"li",f:"Rikosrekisteritarkastuksen läpäiseminen.",e:"Passing the criminal-record check."}]},{hf:"Muistilista ennen koetta",he:"Checklist before the exam",it:[{t:"li",f:"Varaa aika Ajovarmasta hyvissä ajoin.",e:"Book a time at Ajovarma well in advance."},{t:"li",f:"Harjoittele kaikki aihealueet hyvin.",e:"Practise all topic areas thoroughly."},{t:"li",f:"Muista ottaa henkilöllisyystodistus mukaan.",e:"Remember to bring an identity document."}]},{hf:"Vinkki harjoitteluun",he:"A tip on practising",it:[{t:"p",f:"Harjoitusmateriaalin hyödyllisin osuus on tehtävien teko – älä siis välttele niitä. Tehtävissä voi tulla uusia asioita; vastaa parhaasi mukaan ja opi virheistä. Oikeassa kokeessakin voi tulla yllättäviä kysymyksiä.",e:"The most useful part of practice material is doing the exercises — so don't avoid them. New things may come up; answer as best you can and learn from mistakes. The real exam can also have surprising questions."}]}]},{tf:"Oppitunti 2: Yleistietoa taksinkuljettajan ammatista",te:"Lesson 2: General information about the taxi driver profession",secs:[{hf:"1. Taksinkuljettajan ajolupa",he:"1. The taxi driver permit",it:[{t:"li",f:"Taksinkuljettajan ajolupa on lähtökohtaisesti voimassa 5 vuotta.",e:"The taxi driver permit is, as a rule, valid for 5 years."},{t:"li",f:"Kun kuljettaja täyttää 68 vuotta, lupa myönnetään vain kahdeksi vuodeksi kerrallaan.",e:"When the driver turns 68, the permit is granted for only two years at a time."},{t:"li",f:"Jos 68 vuotta täyttyy kesken voimassa olevan luvan, seuraava lupa myönnetään kahdeksi vuodeksi.",e:"If the driver turns 68 during a valid permit, the next permit is granted for two years."}]},{hf:"Ajoluvan uusiminen",he:"Renewing the permit",it:[{t:"li",f:"Haettava ennen nykyisen luvan voimassaolon päättymistä.",e:"Apply before the current permit expires."},{t:"li",f:"68 vuotta täyttäneen hakemukseen on liitettävä laajennettu lääkärintodistus, jossa otetaan huomioon ikääntymisen vaikutukset ajoterveyteen.",e:"An applicant aged 68+ must attach an expanded medical certificate that accounts for the effects of ageing on fitness to drive."}]},{hf:"Luvan peruminen",he:"Revoking the permit",it:[{t:"p",f:"Poliisi voi peruuttaa ajoluvan, jos kuljettaja ei enää täytä vaatimuksia (esim. terveys, rikokset). Ajolupa on voimassa koko Manner-Suomessa, eikä sitä ole sidottu paikkakuntaan.",e:"The police can revoke the permit if the driver no longer meets the requirements (e.g. health, crimes). The permit is valid throughout mainland Finland and is not tied to a locality."}]},{hf:"2. Työsuhteet ja velvollisuudet",he:"2. Employment and obligations",it:[{t:"p",f:"Taksinkuljettaja voi toimia työsuhteessa tai yrittäjänä.",e:"A taxi driver may work as an employee or as an entrepreneur."},{t:"li",f:"Työntekijän irtisanomisaika: yleensä 14 päivää, kun työsuhde on kestänyt enintään 5 vuotta. Muutoin 1 kuukausi.",e:"Employee's notice period: usually 14 days when employment has lasted up to 5 years; otherwise 1 month."},{t:"li",f:"Velvollisuus pitää ajopäiväkirjaa: työvuoron alku- ja loppuaika, tauot ja poikkeamat työaikaan. Ajopäiväkirja on työaikalain valvontaväline, eikä sitä saa jättää täyttämättä kiireen vuoksi.",e:"A duty to keep a driving log: shift start and end times, breaks and deviations from working time. The driving log is a tool for enforcing the Working Hours Act and must not be left unfilled due to haste."}]},{hf:"3. Kela-korvattavat matkat",he:"3. Kela-reimbursed trips",it:[{t:"li",f:"Tilattava alueellisesta tilausvälityskeskuksesta, jotta Kela maksaa korvauksen.",e:"Must be ordered from the regional dispatch centre for Kela to pay the reimbursement."},{t:"li",f:"Asiakas maksaa vain omavastuun (enintään 25 € / suunta).",e:"The customer pays only the deductible (at most €25 per direction)."},{t:"li",f:"Lisäpysähdyksiä ei saa veloittaa, ellei asiasta ole erikseen sovittu.",e:"Extra stops may not be charged unless separately agreed."},{t:"li",f:"Asiakas voi hakea vakiotaksioikeutta erityisestä syystä (esim. sairaus, stressi). Alle 16-vuotiaat yksin matkustavat lapset ovat oikeutettuja vakiotaksiin.",e:"A customer may apply for a 'regular taxi' right for a special reason (e.g. illness, stress). Children under 16 travelling alone are entitled to a regular taxi."},{t:"li",f:"Korvaus lasketaan halvimman soveltuvan kulkumuodon ja lähimmän soveltuvan hoitopaikan mukaan. Terveydentilan on edellytettävä taksia, eikä joukkoliikennettä ole kohtuudella saatavilla.",e:"Reimbursement is calculated by the cheapest suitable mode and the nearest suitable care location. The health condition must require a taxi, and public transport must not be reasonably available."}]},{hf:"Omavastuu ja vuosittainen maksukatto",he:"Deductible and annual cap",it:[{t:"li",f:"Omavastuu on enintään 25 € yhdensuuntaiselta matkalta; jos matka maksaa alle 25 €, asiakas maksaa koko hinnan. Omavastuu peritään jokaisesta matkasta erikseen (meno ja paluu erikseen).",e:"The deductible is at most €25 per one-way trip; if the trip costs under €25, the customer pays the whole price. The deductible is charged per trip (outbound and return separately)."},{t:"li",f:"Kun omavastuut saavuttavat vuoden aikana 300 € (matkakatto), asiakkaan ei tarvitse enää maksaa omavastuuta loppuvuonna. Matkat on silti tilattava hyväksytyn tilausvälityskeskuksen kautta.",e:"When deductibles reach €300 within a year (the travel cap), the customer no longer pays a deductible for the rest of the year. Trips must still be ordered through an approved dispatch centre."}]},{hf:"4. Työaika",he:"4. Working time",it:[{t:"p",f:"Työaika tarkoittaa aikaa, jolloin kuljettaja on työnantajan käytettävissä ja tekee työhön liittyviä tehtäviä – ei pelkkää ajamista. Työaikaa ovat mm. ajaminen, varaustilassa odottaminen, ajoneuvon valmistelu (lämmitys, jääraappaus, tankkaus), pesu ja huolto ohjeistettuna, sekä vuoron alku- ja lopputoimet (ajopäiväkirja, kassatilitys, tarkastus).",e:"Working time means time when the driver is at the employer's disposal and performing work tasks — not just driving. It includes driving, waiting while on call, preparing the vehicle (heating, scraping ice, refuelling), washing and servicing when instructed, and shift start/end tasks (driving log, cash settlement, inspection)."},{t:"li",f:"Vuorokautinen työaika: enintään 11 tuntia 24 tunnin jakson aikana (alkaa vuorokausilevon jälkeen).",e:"Daily working time: at most 11 hours within a 24-hour period (starting after the daily rest)."},{t:"li",f:"Erityistilanteessa työaika voidaan pidentää enintään 13 tuntiin; tällöin seuraavan 48 tunnin aikana työaika ei saa ylittää 22 tuntia.",e:"In special cases working time may be extended to at most 13 hours; then over the following 48 hours working time must not exceed 22 hours."},{t:"li",f:"Viikkotyöaika: enintään 60 tuntia kalenteriviikossa.",e:"Weekly working time: at most 60 hours per calendar week."}]},{hf:"Ajoaika ja lepoajat",he:"Driving time and rest",it:[{t:"li",f:"Ajoaika: kuljettaja saa ajaa enintään 5,5 tuntia yhtäjaksoisesti.",e:"Driving time: the driver may drive at most 5.5 hours continuously."},{t:"li",f:"Ajamisen jälkeen on pidettävä vähintään 30 minuutin tauko, joka voidaan jakaa kahteen osaan (esim. 2 × 15 min).",e:"After driving, a break of at least 30 minutes must be taken, which may be split into two parts (e.g. 2 × 15 min)."},{t:"li",f:"Vuorokausilepo: vähintään 10 tuntia yhtäjaksoista lepoa jokaisena 24 tunnin jaksona; kuljetustehtävän vaatiessa enintään kahdesti seitsemän päivän aikana lyhennettävissä 7 tuntiin.",e:"Daily rest: at least 10 hours of continuous rest in each 24-hour period; when the assignment requires, it may be reduced to 7 hours at most twice within seven days."},{t:"li",f:"Viikkolepo: vähintään 35 tuntia yhtäjaksoista lepoa viikoittain, mahdollisuuksien mukaan sunnuntain yhteydessä.",e:"Weekly rest: at least 35 hours of continuous rest per week, where possible in connection with Sunday."}]},{hf:"5. Maksaminen ja hinnoittelu",he:"5. Payment and pricing",it:[{t:"li",f:"Hyväksyttävät maksutavat: käteinen sekä yleisimmät pankki- ja luottokortit.",e:"Accepted payment methods: cash and the most common debit and credit cards."},{t:"li",f:"Jos taksamittaria ei käytetä, matkan hinta on ilmoitettava asiakkaalle etukäteen; hinnaston on oltava näkyvillä. Kuljettajan on ennen matkaa ilmoitettava kokonaishinta veroineen tai miten hinta määräytyy.",e:"If a taximeter is not used, the price must be told to the customer in advance; the price list must be visible. Before the trip the driver must state the total price including taxes, or how the price is determined."},{t:"li",f:"Taksamittarin on oltava helppolukuinen, viranomaisvaatimusten mukaisesti sinetöity ja näytettävä hinta selvästi ja reaaliaikaisesti.",e:"The taximeter must be easy to read, sealed per official requirements, and show the price clearly and in real time."},{t:"li",f:"Matkan päätteeksi asiakkaalle on aina tarjottava kuitti (paperinen tai sähköinen).",e:"At the end of the trip a receipt must always be offered to the customer (paper or electronic)."}]},{hf:"Jos asiakas ei maksa",he:"If the customer does not pay",it:[{t:"li",f:"Jos asiakas käyttää palvelua tietoisesti maksukyvyttömänä, kyseessä on petos; kuljettajalla on kiinniotto-oikeus ja kannattaa kutsua poliisi.",e:"If a customer knowingly uses the service while unable to pay, it is fraud; the driver has a right of apprehension and should call the police."},{t:"li",f:"Jos asiakas vain ei halua maksaa, kyse on riita-asiasta, ei rikoksesta, eikä kiinniotto-oikeutta ole. Poliisi kannattaa silti kutsua. Väkivallalla uhkailu tai maksun periminen väkisin on ehdottomasti kielletty.",e:"If a customer simply won't pay, it is a civil dispute, not a crime, and there is no right of apprehension. Still call the police. Threatening violence or forcibly collecting payment is strictly forbidden."}]},{hf:"Yhteenveto",he:"Summary",it:[{t:"p",f:"Taksinkuljettajan työ on vastuullinen palveluammatti, joka edellyttää lainsäädännön tarkkaa noudattamista, hyvää asiakaspalveluasennetta, itsenäistä toimintakykyä ja halua kehittää ammattitaitoa.",e:"A taxi driver's work is a responsible service profession requiring careful compliance with the law, a good service attitude, the ability to act independently, and a willingness to develop one's skills."}]}]},{tf:"Oppitunti 3: Asiakaspalvelu ja vuorovaikutustilanteet",te:"Lesson 3: Customer service and interaction",secs:[{hf:"",he:"",it:[{t:"p",f:"Taksinkuljettajan työ on ennen kaikkea palveluammatti, jossa vuorovaikutus on keskeistä. Asiakas ei välttämättä muista, miten autoa ajettiin, mutta hän muistaa kohtaamisen tunteen. Ystävällinen, kohtelias ja avulias käytös saa asiakkaan käyttämään palvelua uudestaan.",e:"A taxi driver's job is above all a service profession in which interaction is central. The customer may not remember how the car was driven, but they remember how the encounter felt. Friendly, polite, helpful behaviour makes the customer return."}]},{hf:"Asiakaslähtöisyys",he:"Customer focus",it:[{t:"p",f:"Osa asiakkaista arvostaa keskustelua, toiset toivovat hiljaisuutta. Kuljettajan tehtävänä on lukea tilanteita ja mukauttaa käytös asiakkaan toiveiden mukaan. Ulkopaikkakuntalaisen tai kielitaidoltaan rajoittuneen kanssa rauhallinen ja selkeä puhe korostuvat.",e:"Some customers value conversation, others prefer quiet. The driver's task is to read the situation and adapt to the customer's wishes. With out-of-towners or those with limited language skills, calm and clear speech matter more."}]},{hf:"Matkustusmukavuuteen vaikuttavat tekijät",he:"Factors affecting travel comfort",it:[{t:"li",f:"Auton siisteys ja kunto: puhdas, tuoksuton, ehjä matkustamo; toimiva ilmastointi.",e:"Cleanliness and condition: a clean, odour-free, intact cabin; working climate control."},{t:"li",f:"Rauhallinen ja tasainen ajotapa: vältä äkkijarrutuksia, kovaa kiihdytystä ja jyrkkiä kaarroksia.",e:"Calm, steady driving: avoid sudden braking, hard acceleration and sharp turns."},{t:"li",f:"Ovien avaaminen ja tavaroiden auttaminen – pienet eleet parantavat kokemusta.",e:"Opening doors and helping with bags — small gestures improve the experience."},{t:"li",f:"Asiakasta kuunnellaan: kysytään radiosta, reitistä tai hiljaisuudesta. Turvallisuuden tunne lisää mukavuutta.",e:"Listen to the customer: ask about the radio, route or quiet. A sense of safety adds to comfort."}]},{hf:"Käyttäytyminen ja vuorovaikutus",he:"Behaviour and interaction",it:[{t:"li",f:"Kohteliaisuus: tervehdys, kiitos, anteeksi ja hyvästely kuuluvat peruspalveluun.",e:"Courtesy: greeting, thanks, apology and farewell are basic service."},{t:"li",f:"Tilannetaju: kaikki eivät halua keskustella – aisti asiakkaan mieliala.",e:"Situational awareness: not everyone wants to chat — sense the customer's mood."},{t:"li",f:"Rauhallisuus ja ammatillisuus myös haastavissa tilanteissa (viivästykset, ärtyneisyys).",e:"Calm and professionalism even in difficult situations (delays, irritation)."},{t:"li",f:"Kielitaito: selkeä puhe, yksinkertaiset sanat, tarvittaessa englanti.",e:"Language skills: clear speech, simple words, English when needed."},{t:"li",f:"Kunnioitus: asiakkaita kohdellaan yhdenvertaisesti taustasta, iästä tai tilanteesta riippumatta.",e:"Respect: treat customers equally regardless of background, age or situation."}]},{hf:"Kuljettajan yleisvastuu",he:"The driver's general responsibility",it:[{t:"li",f:"Aikataulun ja reitin huomiointi sekä matkan turvallinen suoritus liikennesääntöjä noudattaen.",e:"Considering schedule and route, and carrying out the trip safely while obeying traffic rules."},{t:"li",f:"Oikeus ja velvollisuus kieltäytyä kuljetuksesta, jos asiakas on väkivaltainen tai päihtynyt tai vaarantaa turvallisuuden.",e:"The right and duty to refuse transport if the customer is violent or intoxicated or endangers safety."},{t:"li",f:"Unohtuneiden tavaroiden käsittely ohjeiden mukaisesti. Kuljettaja edustaa itseään, työnantajaansa ja koko alaa.",e:"Handling lost property per instructions. The driver represents themselves, their employer and the whole sector."}]},{hf:"Päihtynyt asiakas",he:"Intoxicated customer",it:[{t:"p",f:"Jos asiakas on niin päihtynyt, ettei kykene huolehtimaan itsestään, kuljettajan on varmistettava, ettei asiakas jää vaaraan yksin, ja tarvittaessa kutsuttava poliisi. Avuttoman henkilön jättäminen yksin esimerkiksi tien varteen voi olla rikoslain mukainen heitteillejättö.",e:"If a customer is so intoxicated that they cannot look after themselves, the driver must ensure they are not left in danger alone, and call the police if needed. Abandoning a helpless person, e.g. at the roadside, can be the crime of abandonment under the Criminal Code."}]},{hf:"Haastavat asiakkaat",he:"Challenging customers",it:[{t:"p",f:"Aggressiivisessa tilanteessa toimi rauhallisesti ja vetäydy tarvittaessa turvallisesti; vaarassa soita poliisi. Kuljettaja ei saa käyttäytyä epäasiallisesti tai provosoitua, ei syrjiä asiakasta iän, sukupuolen tai taustan perusteella, eikä kieltäytyä matkasta ilman perusteltua syytä (esim. turvallisuusriski, tekninen vika).",e:"In an aggressive situation, stay calm and withdraw safely if needed; if in danger, call the police. The driver must not behave improperly or be provoked, must not discriminate by age, sex or background, and must not refuse a trip without a justified reason (e.g. safety risk, technical fault)."}]},{hf:"Yhteenveto",he:"Summary",it:[{t:"p",f:"Hyvä asiakaspalvelu on kilpailuetu: asiakas muistaa kohtaamisen tunteen, ja hyvä palvelu johtaa toistuviin kyyteihin ja suosituksiin.",e:"Good customer service is a competitive advantage: the customer remembers how the encounter felt, and good service leads to repeat trips and recommendations."}]}]},{tf:"Oppitunti 4: Erityisryhmien kuljettaminen ja esteettömyys",te:"Lesson 4: Transporting special groups and accessibility",secs:[{hf:"1. Vanhusten kuljettaminen",he:"1. Transporting the elderly",it:[{t:"p",f:"Iäkkäät ovat takseille kasvava asiakasryhmä. Heidän kuljettamisensa vaatii aikaa, ymmärrystä ja sopivaa apua. Vanhus voi tarvita apua kotiovelta autolle, autoon nousemisessa, turvavyön kiinnittämisessä, tavaroiden kantamisessa ja poistumisessa määränpäässä.",e:"The elderly are a growing customer group for taxis. Transporting them takes time, understanding and suitable help. An elderly person may need help from the door to the car, getting in, fastening the belt, carrying bags and getting out at the destination."}]},{hf:"Muistisairaat asiakkaat",he:"Customers with memory illness",it:[{t:"p",f:"Muistisairaus ei aina näy ulospäin. Merkkejä: asiakas on epävarma määränpäästä tai toistaa kysymyksiä, vaikuttaa sekavalta tai pelokkaalta, unohtaa maksamisen tai tavaroita.",e:"Memory illness is not always visible. Signs: uncertainty about the destination or repeated questions, seeming confused or fearful, forgetting to pay or forgetting belongings."},{t:"li",f:"Puhu rauhallisesti ja selkeästi, vältä monimutkaisia ohjeita; vahvista määränpää ystävällisesti.",e:"Speak calmly and clearly, avoid complex instructions; confirm the destination kindly."},{t:"li",f:"Ole kärsivällinen. Jos asiakas on selvästi hukassa, ota yhteyttä tilausvälityskeskukseen tai tarvittaessa hätäkeskukseen, ja varmista, että asiakas pääsee turvallisesti perille tavaroineen.",e:"Be patient. If the customer is clearly lost, contact the dispatch centre or, if needed, the emergency centre, and make sure the customer reaches the destination safely with their belongings."}]},{hf:"2. Varhaiskasvatus- ja koulukuljetukset",he:"2. Day-care and school transport",it:[{t:"li",f:"Kuljetukset tehdään tilaajan aikataulujen ja reittien mukaan; reitiltä tai aikataulusta ei saa poiketa ilman tilaajan lupaa.",e:"Transport follows the orderer's schedules and routes; you may not deviate without the orderer's permission."},{t:"li",f:"Jos lapsi ei ilmesty pysäkille tai jää ilman valvontaa määränpäässä, ota välittömästi yhteyttä tilaajaan tai huoltajaan.",e:"If a child doesn't appear at the stop or is left unsupervised at the destination, contact the orderer or guardian immediately."},{t:"li",f:"Kaikki käyttävät aina turvavyötä, myös lyhyillä matkoilla – kuljettaja on tästä vastuussa. Jos lapsi kieltäytyy, ota yhteys kouluun tai huoltajaan ennen jatkamista.",e:"Everyone always wears a belt, even on short trips — the driver is responsible. If a child refuses, contact the school or guardian before continuing."},{t:"li",f:"Saata pienemmät lapset tarvittaessa ovelta ovelle. Kuljettaja on lapselle tärkeä aikuinen ja roolimalli – pysy rauhallisena ja johdonmukaisena.",e:"Escort younger children door to door when needed. The driver is an important adult and role model for the child — stay calm and consistent."}]},{hf:"Koulukuljetusmerkki ja alkolukko",he:"School-transport sign and alcohol interlock",it:[{t:"li",f:"Ajoneuvossa on oltava koulukuljetusmerkki (tyypillisesti keltainen kolmio, jossa kuva lapsista).",e:"The vehicle must carry a school-transport sign (typically a yellow triangle showing children)."},{t:"li",f:"Koulukuljetuksissa ajoneuvossa on oltava alkolukko: kuljettajan on puhallettava ennen ajoa, tai auto ei käynnisty. Onnistuneen puhalluksen jälkeen on 20 minuuttia aikaa käynnistää; sammutuksen jälkeen alkaa uusi 20 minuuttia ilman uusintapuhallusta. Ilman alkolukkoa kuljetuksia ei saa tehdä.",e:"School transport vehicles must have an alcohol interlock: the driver must blow before driving or the car won't start. After a successful test there are 20 minutes to start; after switching off, a new 20-minute window begins without re-blowing. Without the interlock, transport may not be carried out."},{t:"li",f:"Alaikäisten kuljetuksissa edellytetään rikostaustan selvittämistä: kuljettaja tilaa itse rikosrekisteriotteen ja näyttää sen työnantajalle. Ilman hyväksyttyä taustaa ei voi osallistua koulukuljetuksiin.",e:"Transporting minors requires a criminal-background check: the driver orders their own criminal-record extract and shows it to the employer. Without an approved background, one cannot do school transport."}]},{hf:"3. Pyörätuolia käyttävät asiakkaat",he:"3. Wheelchair users",it:[{t:"p",f:"Esteetön taksi on ajoneuvo, jossa on tilaa vähintään yhdelle pyörätuoliasiakkaalle ja jossa kulku tapahtuu turvallisesti luiskan tai nostolaitteen kautta ilman, että asiakkaan tarvitsee poistua pyörätuolista.",e:"An accessible taxi has room for at least one wheelchair customer and safe entry via a ramp or lift, so the customer need not leave the wheelchair."},{t:"p",f:"Jopa jarrutettu pyörätuoli voi liikkua ohjausliikkeissä. Kuljettajan on aina varmistettava, että pyörätuoli ja asiakas ovat oikein kiinnitetty ennen matkaa – asiakkaan kiire ei oikeuta laiminlyöntiä.",e:"Even a braked wheelchair can move during steering. The driver must always ensure the wheelchair and passenger are properly secured before the trip — the customer's haste does not justify neglect."}]},{hf:"Nelipistekiinnitys",he:"Four-point securing",it:[{t:"li",f:"Pyörätuoli kiinnitetään aina rungosta neljästä pisteestä – ei pyöristä tai käsinojista.",e:"The wheelchair is always secured by the frame at four points — not by wheels or armrests."},{t:"li",f:"Asiakkaalle kiinnitetään oma turvavyö, joka kiinnittyy ajoneuvoon, ei pyörätuoliin.",e:"The pa
