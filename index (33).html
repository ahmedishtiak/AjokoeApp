const { useState, useEffect, useRef, useMemo } = React;



/* ===================== AJOKOE DATA ===================== */

/* ---------- 1) MULTIPLE-CHOICE (100+) ---------- */
const MCQ = [
  // Priority / right of way
  { t: "Priority", q: "At an unmarked intersection with no signs or lights, a vehicle approaches from your right. Who has priority?", o: ["You", "The vehicle from your right", "The larger vehicle"], a: 1, w: "Right-hand rule: with no signs or signals, give way to traffic from the right — even if your road looks bigger." },
  { t: "Priority", q: "A downward-pointing triangle (red border) requires you to:", o: ["Always stop fully", "Give way to traffic on the crossing road", "Do nothing"], a: 1, w: "It is GIVE WAY: slow and yield; stop only if traffic requires. Unlike STOP you may keep rolling when clear." },
  { t: "Priority", q: "At a red octagonal STOP sign you must:", o: ["Slow and roll through if clear", "Stop fully behind the line, then give way", "Stop only if a car is coming"], a: 1, w: "STOP means a complete stop every time, behind the line, then give way before proceeding." },
  { t: "Priority", q: "You are on a priority road (yellow diamond). A car waits at a side road to your right. Who goes first?", o: ["You", "The car on the right", "You must yield right"], a: 0, w: "The priority-road sign overrides the right-hand rule; side-road traffic gives way to you." },
  { t: "Priority", q: "Turning left across oncoming traffic, you must:", o: ["Force your way through", "Give way to oncoming vehicles going straight", "Expect them to stop"], a: 1, w: "A left turn yields to oncoming traffic proceeding straight and to pedestrians crossing the road you enter." },
  { t: "Priority", q: "At a junction controlled only by an 'intersection with minor road' (priority) sign, you should:", o: ["Slow right down and yield", "Continue, you have priority", "Stop completely"], a: 1, w: "That sign tells you the crossing road is minor; you keep priority but stay alert for those who should yield." },

  // Roundabouts
  { t: "Roundabouts", q: "Entering a roundabout with a car already circulating, you:", o: ["Enter ahead of it", "Give way to traffic inside", "Race the gap"], a: 1, w: "Traffic already in the roundabout has priority; you give way on entry." },
  { t: "Roundabouts", q: "When should you signal in a roundabout?", o: ["Left on entry", "Right just before your exit", "Never"], a: 1, w: "No entry signal needed. Signal right just before leaving so others can read your move." },
  { t: "Roundabouts", q: "Taking the third exit of a multi-lane roundabout, approach in:", o: ["Outer/right lane", "Inner/left lane, then move out before the exit", "Any lane"], a: 1, w: "Later exits: use the inner lane on approach, then move out and signal right before leaving. Early exits use the outer lane." },
  { t: "Roundabouts", q: "A cyclist is circulating in the roundabout as you wait to enter. You:", o: ["Enter first", "Give way to the cyclist", "Sound the horn"], a: 1, w: "Cyclists in the roundabout have the same priority as other traffic; give way." },

  // Traffic lights
  { t: "Traffic lights", q: "A signal flashes yellow continuously. It means:", o: ["Faulty — treat as all-way stop", "Caution; normal priority rules apply", "Stop and wait for green"], a: 1, w: "Flashing yellow = uncontrolled but operating. Slow, watch, apply right-hand rule. Common at quiet times." },
  { t: "Traffic lights", q: "Red and yellow show together. You should:", o: ["Go now", "Stay stopped, green is coming", "Stop only if safe"], a: 1, w: "Red+yellow is the 'get ready' phase. Remain stopped until green." },
  { t: "Traffic lights", q: "Solid yellow appears as you approach. You should:", o: ["Accelerate to beat red", "Stop if you safely can", "Keep speed regardless"], a: 1, w: "Yellow means stop if safe; continue only if stopping would be unsafe." },
  { t: "Traffic lights", q: "A green arrow shows right while the main light is red. You may:", o: ["Go any direction", "Turn right only, giving way", "Not move"], a: 1, w: "A green arrow permits only that direction and you still give way to pedestrians and crossing traffic." },
  { t: "Traffic lights", q: "A police officer directs traffic where lights also operate. You follow:", o: ["The lights", "The officer's signals", "Whichever is easier"], a: 1, w: "A traffic controller's signals override traffic lights and signs." },

  // Speed
  { t: "Speed limits", q: "No sign is posted inside a built-up area (taajama). Default limit:", o: ["30", "50", "80"], a: 1, w: "The built-up-area sign sets 50 km/h by default." },
  { t: "Speed limits", q: "Outside built-up areas with no posted limit, the default is:", o: ["60", "80", "100"], a: 1, w: "Rural default is 80 km/h; reduce for conditions." },
  { t: "Speed limits", q: "A motorway shows 120 in summer. In winter it is typically:", o: ["120", "100", "130"], a: 1, w: "Motorway limits commonly drop to 100 km/h in winter." },
  { t: "Speed limits", q: "Near children at a school with no number posted, drive about:", o: ["50", "30", "10"], a: 1, w: "Adapt to conditions; children present means roughly 30 km/h." },
  { t: "Speed limits", q: "Serious speeding fines in Finland are large because they are:", o: ["Flat", "Day-fines scaled to income", "Always €115"], a: 1, w: "Serious cases use income-scaled day-fines; minor cases get a fixed fine." },
  { t: "Speed limits", q: "A speed-limit sign applies until:", o: ["The next junction only", "A new limit, an end sign, or area sign changes it", "You leave the road"], a: 1, w: "A posted limit holds until changed by another limit, an end sign, or an area sign." },
  { t: "Speed limits", q: "In a residential 'living street' (pihakatu), the limit is essentially:", o: ["50", "Walking pace, max 20", "30"], a: 1, w: "On a living street you drive at walking pace (max ~20 km/h) and give way to pedestrians and play." },

  // Winter
  { t: "Winter driving", q: "On black ice at 80 km/h, stopping distance vs dry road is about:", o: ["The same", "Twice", "Three to four times"], a: 2, w: "Ice gives little grip; stopping grows 3–4×, and ABS cannot beat physics." },
  { t: "Winter driving", q: "Studded tyres are permitted roughly during:", o: ["All year", "1 Nov – 31 Mar (and when conditions need)", "December only"], a: 1, w: "Studded tyres allowed ~1 Nov–31 Mar and outside it when weather requires." },
  { t: "Winter driving", q: "Skidding while braking on ice, you should:", o: ["Brake harder", "Ease off, keep wheels rolling, steer to target", "Pull handbrake"], a: 1, w: "Release pressure, keep wheels turning, steer smoothly where you want to go." },
  { t: "Winter driving", q: "Black ice forms first on:", o: ["Long straights", "Bridges and shaded sections", "Car parks"], a: 1, w: "Bridges and shade lose heat fastest and ice first, often looking merely wet." },
  { t: "Winter driving", q: "In heavy snow with poor visibility you should:", o: ["Hold the limit", "Lower speed and increase the gap ahead", "Use full beam"], a: 1, w: "Slow below the limit, leave a big gap; full beam dazzles you off snow." },
  { t: "Winter driving", q: "Winter tyres on a car under 3.5 t must have a tread depth of at least:", o: ["1.6 mm", "3.0 mm", "5.0 mm"], a: 1, w: "Winter tyres require at least 3.0 mm tread (summer tyres 1.6 mm) for grip in snow." },

  // Markings / overtaking
  { t: "Road markings", q: "A solid centre line behind a slow tractor. Overtake?", o: ["Yes, tractors exempt", "Yes if you see ahead", "No — a solid line must not be crossed"], a: 2, w: "A solid centre line forbids crossing/overtaking; wait for a dashed section." },
  { t: "Road markings", q: "A dashed centre line indicates:", o: ["Overtaking allowed when safe", "No overtaking", "Parking lane"], a: 0, w: "Dashed permits overtaking when safe." },
  { t: "Road markings", q: "A solid line beside a dashed line means:", o: ["Nobody overtakes", "You may overtake if the dashed line is on your side", "Trucks only"], a: 1, w: "Cross by the nearest line: dashed on your side = may overtake." },
  { t: "Road markings", q: "A yellow line along the kerb usually means:", o: ["Wide parking", "Stopping/parking restriction", "Cycle lane"], a: 1, w: "Yellow kerb markings mark stopping or parking restrictions." },
  { t: "Overtaking", q: "Overtaking is normally done on the:", o: ["Right", "Left", "Either on motorways"], a: 1, w: "Overtake on the left; right-side passing only in specific cases (vehicle turning left, queued lanes)." },
  { t: "Overtaking", q: "A car behind is already overtaking you as you plan to pull out. You:", o: ["Overtake first", "Let it pass before you move", "Block it"], a: 1, w: "Check mirrors/blind spot; if someone is overtaking you, let them finish first." },
  { t: "Overtaking", q: "You may not overtake:", o: ["Only where signed", "At crossings, hill crests, bends, junctions, or where view is limited", "Never rurally"], a: 1, w: "Beyond signs, never overtake where sight is restricted." },
  { t: "Overtaking", q: "You may pass on the right when:", o: ["Never", "The vehicle ahead is turning left and there is room", "Always in town"], a: 1, w: "Passing on the right is allowed when the vehicle ahead signals and moves to turn left, or in slow parallel-lane traffic." },

  // Pedestrians / cyclists / trams
  { t: "Pedestrians", q: "A pedestrian is approaching a zebra crossing ahead. You:", o: ["Continue", "Stop and let them cross", "Honk"], a: 1, w: "Give way to anyone at or approaching a crossing; stop first." },
  { t: "Pedestrians", q: "A tram stops with no boarding island; passengers step onto the road. You:", o: ["Pass slowly on the left", "Stop until all are clear", "Honk and pass"], a: 1, w: "With no island, passengers cross your lane — stop fully until clear." },
  { t: "Pedestrians", q: "A blind person with a white cane steps toward the crossing. You:", o: ["Expect them to wait", "Always stop and give way", "Sound the horn"], a: 1, w: "Always give way to a pedestrian with a white cane or guide dog; they may not see you." },
  { t: "Cyclists", q: "Turning right with a cycle lane on your right, before turning you:", o: ["Turn immediately", "Check for and give way to cyclists going straight", "Speed up"], a: 1, w: "A cyclist going straight in the cycle lane has priority; check your right and mirror before turning across it." },
  { t: "Cyclists", q: "Overtaking a cyclist, you should leave:", o: ["Any gap", "Ample side clearance, more at speed", "Less than a metre"], a: 1, w: "Pass wide and slow; cyclists wobble and react to wind, surface, and gusts from your vehicle." },
  { t: "Cyclists", q: "At a cycle crossing as you turn, the cyclist already crossing has:", o: ["No priority", "Priority — give way", "Equal, so push on"], a: 1, w: "Treat a cycle crossing like a pedestrian crossing when turning: give way." },

  // Emergencies
  { t: "Emergencies", q: "An emergency vehicle (blue lights, siren) is behind you; red light ahead. You:", o: ["Move right and stop, even on red", "Run the red to clear it", "Hold your lane"], a: 0, w: "Move right and stop; stopping on red here is lawful and required. Running it risks a blocking crash." },
  { t: "Emergencies", q: "Which flashing colour means give way?", o: ["Amber", "Blue", "Green"], a: 1, w: "Blue = emergency services; give way. Amber marks slow/maintenance vehicles." },
  { t: "Emergencies", q: "After a breakdown where your car endangers traffic, you must:", o: ["Hazard lights only", "Place a warning triangle and use hazards", "Wait inside"], a: 1, w: "A warning triangle is compulsory; hazards alone aren't enough. Set it at a safe distance." },
  { t: "Emergencies", q: "At the scene of an accident with injuries, your first duty is to:", o: ["Photograph it", "Stop, secure the scene, help and call 112", "Drive on if not involved"], a: 1, w: "Stop, make the scene safe, give first aid as able, and call the emergency number 112." },

  // Motorway
  { t: "Motorway", q: "A car merges from a ramp on your right while you're in the right lane. Who yields?", o: ["You", "The merging car", "Neither"], a: 1, w: "Joining traffic gives way to traffic already on the motorway; moving left when safe is courteous." },
  { t: "Motorway", q: "On a motorway you should normally drive in:", o: ["Any lane", "The right lane, left only to overtake", "The left lane"], a: 1, w: "Keep right; use the left lane only to overtake, then return." },
  { t: "Motorway", q: "Stopping or reversing on the motorway carriageway is:", o: ["Allowed briefly", "Prohibited except a genuine emergency (use the shoulder)", "Fine in light traffic"], a: 1, w: "Never stop or reverse on the carriageway; pull onto the hard shoulder in trouble." },
  { t: "Motorway", q: "The minimum speed principle on a motorway means:", o: ["No minimum", "Vehicles unable to keep a reasonable speed may not use it", "Everyone must do 120"], a: 1, w: "Slow vehicles (e.g. mopeds, tractors) are banned; you must be able to maintain motorway speeds safely." },

  // Driver conduct
  { t: "Driver conduct", q: "Finland's general blood-alcohol limit is:", o: ["0.2‰", "0.5‰", "0.8‰"], a: 1, w: "Limit 0.5‰; above 1.2‰ is aggravated. Random breath tests are routine." },
  { t: "Driver conduct", q: "Two hours after two beers you feel fine. Certainly under the limit?", o: ["Yes", "Not necessarily — clearance varies", "Yes, feeling proves it"], a: 1, w: "Clearance varies with weight, food and metabolism; 'feeling fine' is unreliable." },
  { t: "Driver conduct", q: "Handheld mobile phone use while driving is:", o: ["OK at lights", "Prohibited; hands-free only", "OK for short calls"], a: 1, w: "Handheld use is banned; set up navigation and audio before moving." },
  { t: "Driver conduct", q: "Seatbelts must be worn:", o: ["Front only", "Every seat, front and back", "Driver only"], a: 1, w: "Everyone belts up in every seat; the driver ensures children are restrained." },
  { t: "Driver conduct", q: "Dipped headlights must be on:", o: ["Night only", "Bad weather only", "Always when driving, day and night"], a: 2, w: "Daytime/dipped lights are mandatory whenever you drive." },
  { t: "Driver conduct", q: "Sounding the horn in towns is:", o: ["Encouraged", "Only to prevent immediate danger", "OK below 50"], a: 1, w: "In built-up areas the horn is only for immediate danger." },
  { t: "Driver conduct", q: "Hazard warning lights are mainly for:", o: ["Convenience", "When stationary and causing danger, or warning of a sudden hazard", "Driving in rain"], a: 1, w: "They signal your vehicle is a hazard, chiefly when stopped where it endangers others." },
  { t: "Driver conduct", q: "Feeling drowsy on a long winter drive, you should:", o: ["Open a window and push on", "Take a break, rest or swap", "Drive faster"], a: 1, w: "Fatigue impairs like alcohol; stop and rest — fresh air alone doesn't fix it." },
  { t: "Driver conduct", q: "A child under 135 cm generally must use:", o: ["An adult belt", "A suitable child restraint/booster", "Nothing in the back"], a: 1, w: "Children shorter than ~135 cm need an appropriate child seat or booster suited to their size." },
  { t: "Driver conduct", q: "Full-beam headlights must be dipped when:", o: ["Never", "Meeting oncoming traffic or following closely", "Only in towns"], a: 1, w: "Dip for oncoming vehicles and when close behind another car to avoid dazzling drivers." },
  { t: "Driver conduct", q: "Medication that causes drowsiness and driving:", o: ["Is always fine", "May impair you like alcohol — check warnings", "Only matters at night"], a: 1, w: "Some medicines impair reactions; heed warnings and don't drive if affected." },

  // Signs (text)
  { t: "Road signs", q: "A blue circle with a white arrow means you:", o: ["May go that way", "Must go in the arrow's direction", "Enter a one-way street"], a: 1, w: "Blue circles are mandatory; the arrow is the only permitted direction." },
  { t: "Road signs", q: "In Finland, speed-limit and most prohibitory signs have which background?", o: ["White, red border", "Yellow, red border", "Blue, white border"], a: 1, w: "Finnish quirk: prohibitory/speed signs use a YELLOW background with red border; no-parking/stopping are blue." },
  { t: "Road signs", q: "A triangular sign with a red border warns of:", o: ["A prohibition", "A hazard ahead", "A mandatory action"], a: 1, w: "Triangles warn; prepare for the hazard shown." },
  { t: "Road signs", q: "A blue circle, red border, one diagonal slash means:", o: ["No stopping", "No parking (brief stop OK)", "No entry"], a: 1, w: "One slash = no parking; two crossed slashes = no stopping at all." },
  { t: "Road signs", q: "A round sign with two cars side by side (one red) means:", o: ["Two-way traffic", "No overtaking", "Car park"], a: 1, w: "It prohibits overtaking; the crossed-out version ends the restriction." },
  { t: "Road signs", q: "A red circle with a single white horizontal bar means:", o: ["No entry for all vehicles", "One-way", "No waiting"], a: 0, w: "That sign forbids entry to all vehicles in that direction." },
  { t: "Road signs", q: "A square blue sign with a white 'P' indicates:", o: ["Prohibition", "Parking permitted (subject to conditions)", "Police"], a: 1, w: "Blue square = information; the P shows parking is allowed, subject to any panels." },

  // Parking
  { t: "Parking", q: "'P 2h' with a disc symbol means you:", o: ["Pay a meter", "Set the parking disc to arrival; max 2 h", "Park free, no limit"], a: 1, w: "Set the disc to the next half-hour after arrival, display it, stay max 2 h." },
  { t: "Parking", q: "'No parking' vs 'no stopping':", o: ["Same", "No-parking allows a brief load/drop-off; no-stopping forbids any pause", "No-stopping allows loading"], a: 1, w: "No-parking permits a brief halt to load/drop off; no-stopping means no pause at all." },
  { t: "Parking", q: "A winter alternating/odd-even parking sign controls:", o: ["Car colour", "Which side to park by date, for snow ploughing", "Price"], a: 1, w: "It switches the legal side by date so ploughs can clear each side; wrong side risks towing." },
  { t: "Parking", q: "You should not park:", o: ["Anywhere in town", "On or just before a pedestrian crossing", "On any hill"], a: 1, w: "Parking on/just before a crossing hides pedestrians; keep the approach clear." },
  { t: "Parking", q: "Parking on the left side of a two-way street is:", o: ["Always fine", "Generally not allowed (park on the right)", "Only at night"], a: 1, w: "On two-way streets park on the right; left-side parking is generally prohibited." },

  // Hazards / wildlife
  { t: "Hazards", q: "A moose warning sign: risk is greatest:", o: ["Midday", "Dawn and dusk", "Summer only"], a: 1, w: "Moose move most at dawn and dusk; a 500 kg collision is often fatal — slow and scan." },
  { t: "Hazards", q: "A moose suddenly crosses and you can't avoid it. Advice:", o: ["Swerve hard at speed", "Brake firmly straight, aim behind it", "Accelerate"], a: 1, w: "Brake hard straight; violent swerving risks rollover/oncoming. Animals move forward, so aim behind." },
  { t: "Hazards", q: "Reindeer on a Lapland road should be treated as:", o: ["Fast-moving", "Unpredictable, often in groups — slow right down", "No hazard"], a: 1, w: "Reindeer wander and cluster; where there's one, more follow." },
  { t: "Hazards", q: "Approaching an unguarded level crossing, you must:", o: ["Speed across", "Slow, look both ways, cross only when clear", "Rely on lights only"], a: 1, w: "At an unguarded crossing, reduce speed and check for trains both ways before crossing." },
  { t: "Hazards", q: "Aquaplaning (hydroplaning) in heavy rain is best avoided by:", o: ["Speeding up", "Slowing down and keeping tyres in good tread", "Braking hard"], a: 1, w: "Lower speed and good tread keep tyres in contact; if it happens, ease off gently and steer straight." },

  // General / eco / vehicle
  { t: "General", q: "Low-emission, efficient driving is best achieved by:", o: ["Hard accel and late braking", "Smooth accel, anticipation, steady speeds", "High revs"], a: 1, w: "Read ahead, accelerate gently, hold steady speeds, ease off early — smoothness saves fuel and improves safety." },
  { t: "General", q: "A passed Finnish theory test is valid for:", o: ["One month", "One year", "Five years"], a: 1, w: "Valid one year, within which you take the driving test." },
  { t: "General", q: "Tailgating is dangerous mainly because it:", o: ["Saves no time", "Removes reaction and stopping space", "Uses fuel"], a: 1, w: "Close following leaves no room to react or brake, especially on ice." },
  { t: "General", q: "The '3-second rule' for following distance should be:", o: ["Halved in winter", "At least doubled on slippery roads", "Ignored on motorways"], a: 1, w: "Leave 3 seconds in good conditions and much more on ice or in poor visibility." },
  { t: "General", q: "Before a long drive you should check:", o: ["Only fuel", "Tyres, lights, fluids, washer and screen", "Nothing"], a: 1, w: "Check tyres (incl. pressure/tread), lights, oil/coolant, washer fluid and a clean screen." },
  { t: "General", q: "Worn tyres in the wet mainly increase the risk of:", o: ["Better grip", "Longer braking and aquaplaning", "Lower fuel use"], a: 1, w: "Shallow tread can't clear water, lengthening braking and inviting aquaplaning." },
  { t: "General", q: "Carrying a load on the roof affects the car by:", o: ["Nothing", "Raising the centre of gravity and changing handling", "Improving braking"], a: 1, w: "A roof load raises the centre of gravity, affecting cornering and braking; secure it and slow down." },
  { t: "General", q: "If your vehicle starts to skid in a bend, you should:", o: ["Brake hard", "Ease off, look and steer where you want to go", "Accelerate"], a: 1, w: "Smoothly ease off and steer toward your intended path; harsh inputs worsen the slide." },
  { t: "General", q: "Eco-driving also means using engine braking by:", o: ["Coasting in neutral", "Lifting off early in gear to slow", "Revving high"], a: 1, w: "Lifting off in gear lets the engine slow you, saving fuel and brake wear; avoid neutral coasting." },
  { t: "General", q: "Your responsibility for passengers' seatbelts covers:", o: ["No one else", "Children — ensure they are properly restrained", "Only the front passenger"], a: 1, w: "The driver is responsible for ensuring minors are correctly restrained." },
  { t: "General", q: "When fuel is low and a warning shows, you should:", o: ["Drive faster", "Refuel at the next opportunity", "Ignore it"], a: 1, w: "Refuel soon; running dry can strand you dangerously and may damage the fuel system." },
  { t: "General", q: "A flashing green or 'walking' figure for pedestrians starting to flash means:", o: ["Speed up to cross", "Finish crossing; don't start", "Stop in the road"], a: 1, w: "A flashing pedestrian phase means finish if already crossing but do not start a new crossing." },

  // Additional coverage
  { t: "Priority", q: "Two cars meet at an equal crossroads, each with a car to their right. To break the deadlock you should:", o: ["Force through first", "Make eye contact and proceed carefully one at a time", "Reverse away"], a: 1, w: "In a four-way right-hand deadlock, communicate and let one move at a time — courtesy and care resolve it safely." },
  { t: "Traffic lights", q: "A bus lane signal shows a white horizontal bar on black. For general traffic it means:", o: ["Go", "It is a signal for buses/trams, not for you", "Stop"], a: 1, w: "Special bar signals control trams and buses; follow your own normal lights, not these." },
  { t: "Overtaking", q: "Before pulling out to overtake, your sequence should be:", o: ["Pull out, then check", "Mirrors, blind spot, signal, then move when clear", "Signal only"], a: 1, w: "Check mirrors and the blind spot, signal your intention, and move out only when the road ahead and behind is clear." },
  { t: "Winter driving", q: "Engine braking on a long icy descent is useful because it:", o: ["Saves fuel only", "Slows you with less risk of wheel lock than heavy braking", "Warms the brakes"], a: 1, w: "Letting the engine slow you in a lower gear reduces reliance on the brakes, lowering the chance of locking up on ice." },
  { t: "Driver conduct", q: "Your view is blocked by snow on the windscreen and lights. Before driving you must:", o: ["Clear a small peephole", "Clear all glass, lights and the roof", "Just start driving"], a: 1, w: "Clear all windows, mirrors, lights and loose roof snow; a peephole and snow flying off endanger you and others." },
  { t: "Pedestrians", q: "At a zebra crossing with a central island, a pedestrian has crossed to the island and waits. You on the far side:", o: ["Must always stop", "Treat each half separately; give way when they move toward your side", "Ignore them"], a: 1, w: "With a refuge island the two halves act separately; give way once the pedestrian steps off toward your carriageway." },
  { t: "Motorway", q: "If you miss your motorway exit you should:", o: ["Reverse to it", "Stop and back up on the shoulder", "Continue to the next exit"], a: 2, w: "Never reverse or stop on a motorway; carry on to the next exit and rejoin — a missed exit is only a short detour." },

/* ===================== ENGINE: palette, signs, scene ===================== */
const C = {
  nightDeep: "#06101F", night: "#0A1A2F", panel: "#10243F", panelHi: "#163052",
  line: "#21406a", snow: "#F2F7FC", mist: "#9DB4CE",
  amber: "#FF6A1A", amberSoft: "#FFB073", blue: "#3D8BFF",
  green: "#36C98A", greenDeep: "#0d3a2a", red: "#FF5B6E", redDeep: "#3a1320", gold: "#FFC857",
};
const YEL = "#F4C20D", RED = "#D81E2C", BLU = "#0A4DA2", BLK = "#101418", WHT = "#FFFFFF", GRY = "#9AA6B4";

function Styles() {
  return (<style>{`
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    .rt{font-family:'Inter',system-ui,sans-serif;color:${C.snow};min-height:100%;
      background:radial-gradient(1100px 560px at 82% -10%,rgba(61,139,255,.16),transparent 60%),
      radial-gradient(820px 460px at -10% 112%,rgba(255,106,26,.12),transparent 55%),
      linear-gradient(180deg,${C.nightDeep},${C.night})}
    .dsp{font-family:'Sora',system-ui,sans-serif;letter-spacing:-.02em}
    .wrap{max-width:760px;margin:0 auto;padding:20px 16px 64px}
    .eye{font-family:'Sora';font-size:11px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:${C.amberSoft}}
    .card{background:linear-gradient(180deg,${C.panel},${C.nightDeep});border:1px solid ${C.line};border-radius:18px}
    .btn{font-family:'Sora';font-weight:600;cursor:pointer;border:none;border-radius:14px;transition:transform .12s,filter .12s,background .2s}
    .btn:active{transform:translateY(1px) scale(.995)}
    .btn:focus-visible,.opt:focus-visible,.chip:focus-visible{outline:3px solid ${C.gold};outline-offset:2px}
    .opt{width:100%;text-align:left;cursor:pointer;font-family:'Inter';background:${C.panelHi};border:1px solid ${C.line};
      color:${C.snow};border-radius:14px;padding:15px;font-size:15.5px;line-height:1.35;display:flex;gap:12px;align-items:flex-start;
      transition:border-color .15s,background .15s,transform .1s}
    .opt:hover:not(:disabled){border-color:${C.blue};background:#193859}
    .opt:disabled{cursor:default}
    .key{flex:0 0 26px;height:26px;border-radius:8px;display:grid;place-items:center;font-family:'Sora';font-weight:700;font-size:13px;
      background:${C.night};border:1px solid ${C.line};color:${C.mist}}
    .track{height:8px;border-radius:99px;background:${C.line};overflow:hidden}
    .fill{height:100%;border-radius:99px;background:linear-gradient(90deg,${C.amber},${C.gold});transition:width .4s}
    .chip{font-family:'Sora';font-weight:600;font-size:12.5px;border-radius:99px;padding:7px 13px;border:1px solid ${C.line};
      background:${C.panelHi};color:${C.snow};cursor:pointer;transition:all .15s}
    .chip:hover{border-color:${C.blue}} .chip.on{background:${C.blue};border-color:${C.blue};color:#04111f}
    .rev{animation:up .34s ease both}
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
    .num{font-variant-numeric:tabular-nums}
    .signtile{background:${C.snow};border-radius:14px;padding:12px;display:grid;place-items:center;cursor:pointer;border:1px solid ${C.line};transition:transform .12s}
    .signtile:hover{transform:translateY(-2px)}
    .yn{font-family:'Sora';font-weight:800;font-size:20px;border:none;border-radius:14px;cursor:pointer;padding:16px;transition:transform .1s,filter .15s}
    .yn:active{transform:scale(.97)}
    @media (prefers-reduced-motion:reduce){.rev,.btn,.opt,.fill,.signtile,.yn{animation:none!important;transition:none!important}}
  `}</style>);
}

/* ---------- SIGN RENDERER (50+) ---------- */
function Tri({ children }) { // warning: yellow triangle, red border
  return (<g><polygon points="50,9 93,86 7,86" fill={YEL} stroke={RED} strokeWidth="8" strokeLinejoin="round" />{children}</g>);
}
function Circ({ fill, border, children, bw = 8 }) {
  return (<g><circle cx="50" cy="50" r="44" fill={fill} stroke={border} strokeWidth={bw} />{children}</g>);

  if (s.center === "solid") {
    const t = persp(0, Math.max(0.1, clEnd), vpx);
    el.push(<polygon key="cl" points={`${persp(-0.03, 0, vpx).x},${BY} ${persp(0.03, 0, vpx).x},${BY} ${t.x + 2 * t.scale},${t.y} ${t.x - 2 * t.scale},${t.y}`} fill={ln} />);
  } else if (s.center === "dashed") {
    for (let d = 0.04; d < clEnd; d += 0.16) {
      const p = persp(0, d, vpx), p2 = persp(0, Math.min(clEnd, d + 0.07), vpx);
      el.push(<polygon key={"d" + d} points={`${p.x - 3 * p.scale},${p.y} ${p.x + 3 * p.scale},${p.y} ${p2.x + 2 * p2.scale},${p2.y} ${p2.x - 2 * p2.scale},${p2.y}`} fill={ln} />);
    }
  }
  // stop line across the approach (my carriageway: centre line to right edge)
  if (s.stopLine != null) {
    const a = persp(0.02, s.stopLine, vpx), b = persp(1, s.stopLine, vpx);
    el.push(<line key="stopln" x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={ln} strokeWidth={Math.max(3, 9 * a.scale)} />);
  }
  // lane divider for 2 lanes
  if (s.lanes === 2) for (let d = 0.04; d < 0.9; d += 0.16) {
    const p = persp(0.5, d, vpx), p2 = persp(0.5, d + 0.07, vpx);
    el.push(<polygon key={"ld" + d} points={`${p.x - 2 * p.scale},${p.y} ${p.x + 2 * p.scale},${p.y} ${p2.x + 1.5 * p2.scale},${p2.y} ${p2.x - 1.5 * p2.scale},${p2.y}`} fill={ln} opacity=".8" />);
  }
  // painted arrows
  (s.arrows || []).forEach((ar, i) => {
    const p = persp(ar.lane, 0.34, vpx); const sc = p.scale * 1.9;
    let path;
    if (ar.dir === "left") path = `M${p.x + 8 * sc} ${p.y} h-12 v-5 l-9 8 l9 8 v-5 h12 z`;
    else if (ar.dir === "right") path = `M${p.x - 8 * sc} ${p.y} h12 v-5 l9 8 l-9 8 v-5 h-12 z`;
    else path = `M${p.x - 4 * sc} ${p.y + 12 * sc} v-16 h-5 l9 -11 l9 11 h-5 v16 z`;
    el.push(<path key={"ar" + i} d={path} fill={ln} opacity=".95" />);
  });
  // crossing: full-width zebra band across the road
  if (s.crossing != null) {
    const d = s.crossing; const cL = persp(-0.95, d, vpx), cR = persp(0.95, d, vpx); const sc = cL.scale;
    const span = cR.x - cL.x; const stripes = 8;
    for (let k = 0; k < stripes; k++) { const x = cL.x + (span / stripes) * k; el.push(<rect key={"cz" + k} x={x} y={cL.y - 4 * sc} width={(span / stripes) * 0.55} height={9 * sc} fill={ln} />); }
  }
  if (s.parked) {
    [[-0.78, 0.1], [-0.78, 0.24], [-0.78, 0.42], [0.82, 0.16], [0.82, 0.34]].forEach((q, i) => { const p = persp(q[0], q[1], vpx); el.push(drawCar(p, "#8893a2", "ahead", "pk" + i)); });
  }

  /* ----- drawing primitives ----- */
  function drawCar(p, col, facing, key, opt = {}) {
    const sc = p.scale, W = 48 * sc, H = 27 * sc, x = p.x, y = p.y, dark = w === "night";
    const roofW = W * 0.72;
    const shell = (
      <g>
        <ellipse cx={x} cy={y + 2 * sc} rx={W * .54} ry={3 * sc} fill="#000" opacity=".25" />
        {/* roof/cabin */}
        <rect x={x - roofW / 2} y={y - H - 9 * sc} width={roofW} height={11 * sc} rx={4 * sc} fill={col} stroke="#262b33" strokeWidth={sc} />
        {/* body */}
        <rect x={x - W / 2} y={y - H} width={W} height={H} rx={5 * sc} fill={col} stroke="#262b33" strokeWidth={sc} />
        {/* wheels peeking */}
        <rect x={x - W / 2 + 2 * sc} y={y - 5 * sc} width={5 * sc} height={6 * sc} rx={1.5 * sc} fill="#15181d" />
        <rect x={x + W / 2 - 7 * sc} y={y - 5 * sc} width={5 * sc} height={6 * sc} rx={1.5 * sc} fill="#15181d" />
      </g>);
    if (facing === "ahead") return <g key={key}>{shell}
      {/* rear window */}
      <rect x={x - roofW / 2 + 3 * sc} y={y - H - 6 * sc} width={roofW - 6 * sc} height={6 * sc} rx={2 * sc} fill={dark ? "#10151c" : "#33414f"} />
      {/* tail lights (red) */}
      <rect x={x - W / 2 + 3 * sc} y={y - H + 4 * sc} width={8 * sc} height={6 * sc} rx={1.5 * sc} fill={opt.brake ? "#ff3b3b" : "#b32626"} />
      <rect x={x + W / 2 - 11 * sc} y={y - H + 4 * sc} width={8 * sc} height={6 * sc} rx={1.5 * sc} fill={opt.brake ? "#ff3b3b" : "#b32626"} />
      {/* number plate */}
      <rect x={x - 8 * sc} y={y - 9 * sc} width={16 * sc} height={5 * sc} rx={1 * sc} fill="#e7e9ec" />
      {opt.signalLeft && <rect x={x - W / 2 + 1 * sc} y={y - H + 4 * sc} width={5 * sc} height={6 * sc} fill="#ffae00" />}
      {opt.emergency && <><rect x={x - 10 * sc} y={y - H - 13 * sc} width={20 * sc} height={5 * sc} rx={2 * sc} fill="#0a3" /><rect x={x - 10 * sc} y={y - H - 13 * sc} width={10 * sc} height={5 * sc} rx={2 * sc} fill="#2b8bff" /></>}
    </g>;
    // oncoming / front
    return <g key={key}>{shell}
      {/* windscreen */}
      <rect x={x - roofW / 2 + 3 * sc} y={y - H - 6 * sc} width={roofW - 6 * sc} height={6 * sc} rx={2 * sc} fill={dark ? "#0e1f33" : "#9fc3e8"} />
      {/* headlights (pale yellow) */}
      <circle cx={x - W / 2 + 7 * sc} cy={y - H + 7 * sc} r={3.4 * sc} fill="#fff6c0" stroke="#b9a24e" strokeWidth={.6 * sc} />
      <circle cx={x + W / 2 - 7 * sc} cy={y - H + 7 * sc} r={3.4 * sc} fill="#fff6c0" stroke="#b9a24e" strokeWidth={.6 * sc} />
      {/* grille + bumper */}
      <rect x={x - 9 * sc} y={y - H + 6 * sc} width={18 * sc} height={4 * sc} rx={1 * sc} fill="#2c333c" />
      <rect x={x - W / 2 + 4 * sc} y={y - 6 * sc} width={W - 8 * sc} height={4 * sc} rx={1.5 * sc} fill="#3a4049" />
    </g>;
  }
  function drawTruck(p, key) {
    const sc = p.scale, W = 52 * sc, x = p.x, y = p.y, dark = w === "night";
    return <g key={key}>
      <ellipse cx={x} cy={y + 2 * sc} rx={W * .56} ry={3 * sc} fill="#000" opacity=".25" />
      {/* tall box body */}
      <rect x={x - W / 2} y={y - 52 * sc} width={W} height={36 * sc} rx={3 * sc} fill="#cf3636" stroke="#7a1717" strokeWidth={sc} />
      {/* cab facing viewer */}
      <rect x={x - W / 2 + 2 * sc} y={y - 18 * sc} width={W - 4 * sc} height={18 * sc} rx={3 * sc} fill="#b82d2d" stroke="#7a1717" strokeWidth={sc} />
      {/* windscreen */}
      <rect x={x - W / 2 + 7 * sc} y={y - 15 * sc} width={W - 14 * sc} height={7 * sc} rx={1.5 * sc} fill={dark ? "#0e1f33" : "#bcd3ea"} />
      {/* headlights + grille + bumper */}
      <circle cx={x - W / 3} cy={y - 5 * sc} r={2.8 * sc} fill="#fff6c0" /><circle cx={x + W / 3} cy={y - 5 * sc} r={2.8 * sc} fill="#fff6c0" />
      <rect x={x - 8 * sc} y={y - 6 * sc} width={16 * sc} height={3 * sc} fill="#2c333c" />
      <rect x={x - W / 2 + 3 * sc} y={y - 3 * sc} width={W - 6 * sc} height={3 * sc} rx={1 * sc} fill="#3a4049" />
    </g>;
  }
  function drawPed(p, key, opt = {}) {
    const sc = p.scale, x = p.x, y = p.y, h = 30 * sc, col = opt.col || (w === "night" ? "#eaeef2" : "#1d2733");
    return <g key={key}>
      <ellipse cx={x} cy={y + 1.5 * sc} rx={5 * sc} ry={2 * sc} fill="#000" opacity=".2" />
      <circle cx={x} cy={y - h} r={4 * sc} fill={opt.head || col} />
      <path d={`M${x} ${y - h + 4 * sc} L${x} ${y - h * .42}`} stroke={col} strokeWidth={3.2 * sc} strokeLinecap="round" />
      <path d={`M${x} ${y - h + 8 * sc} L${x - 6 * sc} ${y - h + 16 * sc} M${x} ${y - h + 8 * sc} L${x + 6 * sc} ${y - h + 14 * sc}`} stroke={col} strokeWidth={2.6 * sc} strokeLinecap="round" fill="none" />
      <path d={`M${x} ${y - h * .42} L${x - 5 * sc} ${y} M${x} ${y - h * .42} L${x + 5 * sc} ${y - 2 * sc}`} stroke={col} strokeWidth={2.8 * sc} strokeLinecap="round" fill="none" />
      {opt.cane && <><line x1={x + 5 * sc} y1={y - h + 14 * sc} x2={x + 13 * sc} y2={y} stroke="#fff" strokeWidth={1.8 * sc} /><circle cx={x + 13 * sc} cy={y} r={1.8 * sc} fill="#fff" /><rect x={x - 4 * sc} y={y - h - 1 * sc} width={8 * sc} height={2.4 * sc} rx={1 * sc} fill="#111" /></>}
    </g>;
  }
  function drawSideCar(p, key, dir) { // side profile on a crossing road; dir 'R' faces right
    const sc = p.scale, x = p.x, y = p.y, L = 60 * sc, H = 15 * sc, dark = w === "night";
    const f = dir === "R" ? 1 : -1; // front direction
    return <g key={key}>
      <ellipse cx={x} cy={y + 2 * sc} rx={L * .52} ry={2.5 * sc} fill="#000" opacity=".25" />
      <rect x={x - L / 2} y={y - H} width={L} height={H} rx={4 * sc} fill="#cdd3da" stroke="#262b33" strokeWidth={sc} />
      <path d={`M${x - L * .26} ${y - H} q${L * .12} ${-11 * sc} ${L * .34} ${-11 * sc} l${L * .16} 0 q${L * .1} 0 ${L * .14} ${11 * sc} z`} fill="#cdd3da" stroke="#262b33" strokeWidth={sc} />
      <rect x={x - L * .18} y={y - H - 8 * sc} width={L * .42} height={8 * sc} rx={2 * sc} fill={dark ? "#26415e" : "#9fb8d6"} />
      <circle cx={x - L * .3} cy={y} r={4.5 * sc} fill="#15181d" /><circle cx={x + L * .3} cy={y} r={4.5 * sc} fill="#15181d" />
      <rect x={f === 1 ? x + L / 2 - 4 * sc : x - L / 2 + 1 * sc} y={y - H + 3 * sc} width={3 * sc} height={4 * sc} fill="#fff6c0" />
      <rect x={f === 1 ? x - L / 2 + 1 * sc : x + L / 2 - 4 * sc} y={y - H + 3 * sc} width={3 * sc} height={4 * sc} fill="#c0392b" />
    </g>;
  }
  (s.objects || []).forEach((o, i) => {
    const p = persp(o.lane, o.depth, vpx); const key = "o" + i;
    switch (o.type) {
      case "carAhead": el.push(drawCar(p, "#c2cad4", "ahead", key, { brake: o.slow, signalLeft: o.signalLeft })); break;
      case "carMergeRight": el.push(drawCar(p, "#c2cad4", "ahead", key)); break;
      case "carOncoming": el.push(drawCar(p, "#dfe4ea", "front", key)); break;
      case "truckOncoming": el.push(drawTruck(p, key)); break;
      case "carRight": el.push(<g key={key} transform={`rotate(22 ${p.x} ${p.y})`}>{drawCar(p, "#dfe4ea", "front", key + "i")}</g>); break;
      case "carLeft": el.push(<g key={key} transform={`rotate(-22 ${p.x} ${p.y})`}>{drawCar(p, "#dfe4ea", "front", key + "i")}</g>); break;
      case "crossR": el.push(drawSideCar(p, key, "R")); break;
      case "crossL": el.push(drawSideCar(p, key, "L")); break;
      case "pedestrian": el.push(drawPed(p, key)); break;
      case "blind": el.push(drawPed(p, key, { cane: true })); break;
      case "child": el.push(drawPed({ x: p.x, y: p.y, scale: p.scale * .7 }, key, { col: "#c0392b" })); break;
      case "ballChild": el.push(<g key={key}><circle cx={p.x} cy={p.y - 4 * p.scale} r={5 * p.scale} fill="#f5a623" stroke="#b5651d" strokeWidth={1.2 * p.scale} /><path d={`M${p.x - 5 * p.scale} ${p.y - 4 * p.scale} h${10 * p.scale} M${p.x} ${p.y - 9 * p.scale} v${10 * p.scale}`} stroke="#b5651d" strokeWidth={.8 * p.scale} /></g>); break;
      case "cyclist": { const sc = p.scale; el.push(<g key={key} stroke={w === "night" ? "#eaeef2" : "#222"} strokeWidth={2 * sc} fill="none"><circle cx={p.x - 7 * sc} cy={p.y} r={5 * sc} /><circle cx={p.x + 7 * sc} cy={p.y} r={5 * sc} /><path d={`M${p.x - 7 * sc} ${p.y} L${p.x} ${p.y - 2 * sc} L${p.x + 7 * sc} ${p.y} M${p.x} ${p.y - 2 * sc} L${p.x + 2 * sc} ${p.y - 12 * sc}`} /><circle cx={p.x + 3 * sc} cy={p.y - 16 * sc} r={3.4 * sc} fill={w === "night" ? "#eaeef2" : "#222"} /><path d={`M${p.x + 2 * sc} ${p.y - 12 * sc} L${p.x - 4 * sc} ${p.y - 4 * sc}`} /></g>); break; }
      case "tram": { const sc = p.scale, x = p.x, y = p.y; el.push(<g key={key}><rect x={x - 22 * sc} y={y - 40 * sc} width={44 * sc} height={40 * sc} rx={4 * sc} fill="#1f8a5b" stroke="#0c5a39" strokeWidth={sc} /><rect x={x - 17 * sc} y={y - 34 * sc} width={34 * sc} height={12 * sc} rx={2 * sc} fill="#d4f3e6" /><rect x={x - 6 * sc} y={y - 18 * sc} width={12 * sc} height={18 * sc} fill="#0c5a39" /><circle cx={x} cy={y - 36 * sc} r={2 * sc} fill="#ffd83b" /></g>); break; }
      case "busStop": { el.push(drawCar({ x: p.x, y: p.y, scale: p.scale * 1.15 }, "#f2c200", "ahead", key, { signalLeft: o.indicating })); break; }
      case "emergency": el.push(drawCar(p, "#eef1f5", "ahead", key, { emergency: true })); break;
      default: break;
    }
  });
  // waiting passengers beside a tram (no island) — they step into the lane
  (s.objects || []).forEach((o, i) => { if (o.type === "tram") { const a = persp(o.lane + 0.35, o.depth - 0.04, vpx), b = persp(o.lane + 0.5, o.depth - 0.07, vpx); el.push(drawPed(a, "tp1" + i)); el.push(drawPed(b, "tp2" + i)); } });
  // sign on a pole (x clamped so the sign is never clipped by the frame)
  if (s.sign) { const p = persp(s.sign.lane, s.sign.depth, vpx); const sz = Math.max(40, 58 * p.scale); const sx = Math.min(360 - sz / 2 - 6, Math.max(sz / 2 + 6, p.x)); el.push(<g key="sign"><line x1={sx} y1={p.y} x2={sx} y2={p.y - 30 * p.scale - sz * 0.2} stroke="#8a8f96" strokeWidth={3 * p.scale} /><g transform={`translate(${sx - sz / 2} ${p.y - 30 * p.scale - sz})`}><SignSVG code={s.sign.code} size={sz} /></g></g>); }
  // traffic light (post on the verge, clear housing, active lamp glows)
  if (s.light) {
    const p = persp(s.light.lane, s.light.depth, vpx); const sc = Math.max(0.5, p.scale); const on = s.light.state;
    const u = 5 * sc, postH = 52 * sc, hx = p.x, baseY = p.y;
    const housX = hx - 7 * sc, housY = baseY - postH - 26 * sc;
    const lamp = (cy, lit, col, glow) => (<g><circle cx={hx} cy={cy} r={u} fill={lit ? col : "#1c1f24"} />{lit && <circle cx={hx} cy={cy} r={u * 1.9} fill={glow} opacity=".45" />}</g>);
    el.push(<g key="lt">
      <line x1={hx} y1={baseY} x2={hx} y2={baseY - postH} stroke="#697079" strokeWidth={2.6 * sc} />
      <rect x={housX} y={housY} width={14 * sc} height={26 * sc} rx={3 * sc} fill="#0d0f12" stroke="#000" strokeWidth={sc} />
      {lamp(housY + 6 * sc, on === "red" || on === "redYellow", "#ff3b3b", "#ff3b3b")}
      {lamp(housY + 13 * sc, on === "yellow" || on === "yellowFlash" || on === "redYellow", "#ffce29", "#ffce29")}
      {lamp(housY + 20 * sc, on === "green", "#2fe07a", "#2fe07a")}
    </g>);
  }

  // weather overlays
  if (w === "fog") el.push(<rect key="fog" x="0" y="0" width="360" height={BY + 16} fill="#cfd6db" opacity=".42" />);
  if (w === "night") el.push(<rect key="ngt" x="0" y="0" width="360" height={BY + 16} fill="#0a1020" opacity=".34" />);
  if (w === "snow") for (let i = 0; i < 40; i++) el.push(<circle key={"sn" + i} cx={(i * 53) % 360} cy={(i * 37) % BY} r="1.6" fill="#fff" opacity=".85" />);
  if (w === "rain") for (let i = 0; i < 26; i++) el.push(<line key={"rn" + i} x1={(i * 71) % 360} y1={(i * 29) % BY} x2={(i * 71) % 360 - 4} y2={(i * 29) % BY + 9} stroke="#cfe" strokeWidth="1" opacity=".5" />);

  // ego car: first-person hood + dashboard + wing mirrors (you sit in the right-hand lane)
  const hoodCol = w === "night" ? "#243042" : "#2f4763";
  const hl = persp(0.05, 0, vpx).x;   // hood left edge ~ just right of the centre line
  const hr = 348;                      // hood right edge near the right of frame
  const hcx = (hl + hr) / 2;
  el.push(
    <g key="ego">
      {/* hood: narrows from the near dashboard (bottom) to its far edge (up), sitting in the right lane */}
      <path d={`M${hl - 6} ${BY + 16} L${hl + 26} ${BY - 16} Q${hcx} ${BY - 26} ${hr - 24} ${BY - 15} L${hr + 8} ${BY + 16} Z`} fill={hoodCol} stroke="#0c1622" strokeWidth="1.5" />
      <path d={`M${hcx} ${BY - 25} L${hcx - 4} ${BY + 16}`} stroke="#5e7da0" strokeWidth="1.4" opacity=".5" />
      <path d={`M${hl + 27} ${BY - 15} Q${hcx} ${BY - 24} ${hr - 25} ${BY - 14}`} stroke="#6f90b5" strokeWidth="1.6" opacity=".55" fill="none" />
      {/* dashboard lip across the very bottom */}
      <rect x="0" y={BY + 6} width="360" height="18" fill={w === "night" ? "#0b121c" : "#161d27"} />
      {/* wing mirrors at the front corners of the hood */}
      <path d={`M${hl + 22} ${BY - 12} l-16 -3 q-7 -1 -6 5 l1 6 q1 5 7 4 l15 -3 z`} fill={hoodCol} stroke="#0c1622" strokeWidth="1.2" />
      <path d={`M${hr - 20} ${BY - 11} l16 -3 q7 -1 6 5 l-1 6 q-1 5 -7 4 l-15 -3 z`} fill={hoodCol} stroke="#0c1622" strokeWidth="1.2" />
    </g>
  );

  // highlights on reveal
  if (reveal) (spec.hi || []).forEach((h, i) => {
    const p = persp(h.x, h.d, vpx); let cy = p.y - 6;
    if (s.sign && Math.abs(h.x - s.sign.lane) < 0.08 && Math.abs(h.d - s.sign.depth) < 0.08) { const sp = persp(s.sign.lane, s.sign.depth, vpx); const sz = Math.max(40, 58 * sp.scale); cy = sp.y - 30 * sp.scale - sz / 2; p.x = Math.min(360 - sz / 2 - 6, Math.max(sz / 2 + 6, sp.x)); }
    else if (s.light && Math.abs(h.x - s.light.lane) < 0.1 && Math.abs(h.d - s.light.depth) < 0.1) { const lp = persp(s.light.lane, s.light.depth, vpx); const sc = Math.max(0.5, lp.scale); cy = lp.y - 52 * sc - 13 * sc; }
    el.push(<circle key={"hi" + i} cx={p.x} cy={cy} r={h.r} fill="none" stroke="#ff4d4d" strokeWidth="3" style={{ animation: "pop .3s ease both" }} />);
  });

  return (<svg viewBox="0 0 360 240" style={{ width: "100%", display: "block", borderRadius: 12 }}>{el}</svg>);
}

      <span style={{ fontSize: 19, marginRight: 8 }}>{icon}</span>{title}<br /><span style={{ fontWeight: 500, fontSize: 12, color: C.mist }}>{sub}</span>
    </button>);
  return (
    <div className="rev">
      <div style={{ textAlign: "center", marginBottom: 22 }}>
        <div className="eye">Teoriakoe · Suomi 🇫🇮</div>
        <h1 className="dsp" style={{ fontSize: 42, fontWeight: 800, margin: "8px 0 6px" }}>Ajokoe<span style={{ color: C.amber }}>.</span></h1>
        <p style={{ color: C.mist, margin: 0, fontSize: 14.5, maxWidth: 470, marginInline: "auto" }}>
          Built around the real Traficom format: 15 multiple-choice, 5 risk, and 50 traffic-situation images, in 30 minutes.

/* ---------- MCQ PICK + RUN ---------- */
function McqPick({ start, back }) {

    <Head left="‹ Home" right="Multiple choice" onLeft={back} />

    <button className="btn" onClick={() => start(null)} style={{ width: "100%", background: `linear-gradient(180deg,${C.blue},#2a6ddb)`, color: "#fff", padding: 15, fontSize: 15, marginBottom: 14 }}>🎲 Mixed — all {MCQ.length}</button>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
      {MCQ_TOPICS.map((t) => { const n = MCQ.filter((x) => x.t === t).length; return (<button key={t} className="btn" onClick={() => start(t)} style={{ background: C.panel, border: `1px solid ${C.line}`, color: C.snow, padding: "14px", fontSize: 14, textAlign: "left" }}>{TOPIC_ICON[t]} {t}<br /><span style={{ fontWeight: 500, fontSize: 12, color: C.mist }}>{n} q</span></button>); })}
    </div>
  </div>);
}
function McqRun({ deck, label, back, recordMiss }) {
  const [i, setI] = useState(0), [picked, setPicked] = useState(null), [score, setScore] = useState(0), [done, setDone] = useState(false);
  const q = deck[i], answered = picked !== null, ok = answered && picked === q.a;
  function choose(idx) { if (answered) return; setPicked(idx); if (idx === q.a) setScore((s) => s + 1); else recordMiss(q); }
  function next() { if (i + 1 >= deck.length) return setDone(true); setI(i + 1); setPicked(null); }
  if (done) return <Score pct={Math.round(score / deck.length * 100)} sub={`${score} of ${deck.length}`} back={back} />;
  return (<div>
    <Head left="‹ Exit" right={`${TOPIC_ICON[q.t]} ${label}`} onLeft={back} />
    <div className="card" style={{ padding: "12px 16px", marginBottom: 14 }}><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}><span className="eye">Q {i + 1}/{deck.length}</span><span className="dsp num" style={{ fontWeight: 700, color: C.gold, fontSize: 14 }}>{score} ✓</span></div><Bar pct={(i + 1) / deck.length * 100} /></div>
    <div className="card" style={{ padding: "20px 18px", marginBottom: 14 }}><div className="eye" style={{ color: C.blue, marginBottom: 8 }}>{q.t}</div><h2 className="dsp" style={{ fontSize: 20, fontWeight: 700, lineHeight: 1.3, margin: 0 }}>{q.q}</h2></div>
    <div style={{ display: "grid", gap: 10 }}>{q.o.map((opt, idx) => { let bg, bd; if (answered) { if (idx === q.a) { bg = C.greenDeep; bd = C.green; } else if (idx === picked) { bg = C.redDeep; bd = C.red; } } return (<button key={idx} className="opt" disabled={answered} onClick={() => choose(idx)} style={bg ? { background: bg, borderColor: bd } : undefined}><span className="key" style={answered && idx === q.a ? { background: C.green, color: "#04130c", borderColor: C.green } : answered && idx === picked ? { background: C.red, color: "#1a040a", borderColor: C.red } : undefined}>{answered && idx === q.a ? "✓" : answered && idx === picked ? "✕" : ["A", "B", "C", "D"][idx]}</span><span>{opt}</span></button>); })}</div>
    {answered && <div className="card rev" style={{ marginTop: 14, padding: 18, borderColor: ok ? C.green : C.red }}><div className="dsp" style={{ fontWeight: 700, fontSize: 16, marginBottom: 8, color: ok ? C.green : C.red }}>{ok ? "✓ Correct" : "✕ Not quite"}</div><p style={{ margin: 0, fontSize: 15, lineHeight: 1.5 }}>{q.w}</p><button className="btn" onClick={next} style={{ width: "100%", marginTop: 14, background: `linear-gradient(180deg,${C.blue},#2a6ddb)`, color: "#fff", padding: 14, fontSize: 15 }}>{i + 1 >= deck.length ? "See score →" : "Next →"}</button></div>}
  </div>);
}

/* ---------- SITUATIONS (Yes/No image) ---------- */
function SituationRun({ deck, back, recordMiss, retry }) {
  const [i, setI] = useState(0), [picked, setPicked] = useState(null), [score, setScore] = useState(0), [done, setDone] = useState(false);
  const sp = deck[i], answered = picked !== null, ok = answered && picked === sp.a;
  function choose(val) { if (answered) return; setPicked(val); if (val === sp.a) setScore((s) => s + 1); else recordMiss({ q: sp.prop, w: sp.w, t: "Situation", o: ["Yes", "No"], a: sp.a ? 0 : 1 }); }
  function next() { if (i + 1 >= deck.length) return setDone(true); setI(i + 1); setPicked(null); }
  if (done) { const pass = score >= Math.ceil(deck.length * 0.86); return <Score pct={Math.round(score / deck.length * 100)} sub={`${score} of ${deck.length} correct`} pass={pass} passText={pass ? `Pass — at or above ${Math.ceil(deck.length * 0.86)}/${deck.length}` : `Below pass mark (${Math.ceil(deck.length * 0.86)}/${deck.length} needed)`} back={back} retry={retry} />; }
  return (<div>
    <Head left="‹ Exit" right={`🖼️ Situation ${i + 1}/${deck.length}`} onLeft={back} />
    <div className="card" style={{ padding: 12, marginBottom: 12 }}><Bar pct={(i + 1) / deck.length * 100} /></div>
    <div style={{ border: `1px solid ${C.line}`, borderRadius: 12, overflow: "hidden", marginBottom: 14 }}><Scene spec={sp} reveal={answered} /></div>
    <div className="card" style={{ padding: "16px 18px", marginBottom: 14 }}><span className="eye" style={{ color: C.amberSoft }}>True or false?</span><p className="dsp" style={{ margin: "8px 0 0", fontSize: 18, fontWeight: 700, lineHeight: 1.35 }}>{sp.prop}</p></div>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
      <button className="yn" disabled={answered} onClick={() => choose(true)} style={{ background: answered ? (sp.a === true ? C.green : (picked === true ? "#5a2230" : "#1e3a33")) : C.green, color: answered && !(sp.a === true) && picked !== true ? C.mist : "#04130c" }}>YES</button>
      <button className="yn" disabled={answered} onClick={() => choose(false)} style={{ background: answered ? (sp.a === false ? C.green : (picked === false ? "#5a2230" : "#3a1e24")) : C.red, color: answered ? (sp.a === false ? "#04130c" : "#fff") : "#1a040a" }}>NO</button>
    </div>
    {answered && <div className="card rev" style={{ marginTop: 14, padding: 18, borderColor: ok ? C.green : C.red }}><div className="dsp" style={{ fontWeight: 700, fontSize: 16, marginBottom: 8, color: ok ? C.green : C.red }}>{ok ? "✓ Correct" : "✕ Incorrect answer"}</div><p style={{ margin: 0, fontSize: 15, lineHeight: 1.5 }}>{sp.w}</p><button className="btn" onClick={next} style={{ width: "100%", marginTop: 14, background: `linear-gradient(180deg,${C.amber},#e6560f)`, color: "#1a0a02", padding: 14, fontSize: 15 }}>{i + 1 >= deck.length ? "See score →" : "Next situation →"}</button></div>}
  </div>);
}

/* ---------- SCORE CARD ---------- */

function Mock({ onDone, onQuit }) {
  const exam = useMemo(() => {
    const mc = shuffle(MCQ).slice(0, 15).map((q) => ({ kind: "mcq", q }));
    const rk = shuffle(RISK).slice(0, 5).map((q) => ({ kind: "mcq", q }));
    const st = shuffle(SIT).slice(0, Math.min(50, SIT.length)).map((q) => ({ kind: "sit", q }));
    return [...mc, ...rk, ...st];
  }, []);
  const counts = { mcq: 15, risk: 5, sit: Math.min(50, SIT.length) };
  const [i, setI] = useState(0), [ans, setAns] = useState({}), [flag, setFlag] = useState({}), [left, setLeft] = useState(30 * 60), [grid, setGrid] = useState(false);
  const doneRef = useRef(false);
  useEffect(() => { const id = setInterval(() => setLeft((l) => { if (l <= 1) { clearInterval(id); if (!doneRef.current) { doneRef.current = true; submit(); } return 0; } return l - 1; }), 1000); return () => clearInterval(id); }, []); // eslint-disable-line
  const item = exam[i];
  function pick(v) { setAns((a) => ({ ...a, [i]: v })); }

      let correct, chosen = ans[k];

      else { correct = chosen === it.q.a; }
      const bucket = it.kind === "sit" ? "sit" : (it.q.t === "Risk" ? "risk" : "mcq");
      sec[bucket].n++; if (correct) sec[bucket].ok++;
      return { it, chosen, correct, bucket };
    });
    onDone({ sec, results, total: exam.length });
  }
  const low = left <= 60;
  const isMcq = item.kind === "mcq";
  const sectionLabel = item.kind === "sit" ? "Traffic situation" : (item.q.t === "Risk" ? "Risk identification" : "Multiple choice");

    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
      <button className="btn" onClick={onQuit} style={{ background: "transparent", color: C.mist, padding: "8px 4px", fontSize: 14 }}>‹ Quit</button>
      <div className="dsp num" style={{ fontWeight: 800, fontSize: 20, color: low ? C.red : C.gold, animation: low ? "pulse 1s infinite" : "none" }}>⏱ {fmt(left)}</div>
      <button className="btn" onClick={() => setGrid((g) => !g)} style={{ background: C.panel, border: `1px solid ${C.line}`, color: C.snow, padding: "8px 12px", fontSize: 13 }}>{grid ? "Close" : "Grid"}</button>

      <div className="card rev" style={{ padding: 18, marginTop: 14 }}>
        <div className="eye" style={{ marginBottom: 12, color: C.mist }}>{Object.keys(ans).length}/{exam.length} answered</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(8,1fr)", gap: 7 }}>{exam.map((_, k) => { const d = ans[k] != null, fl = flag[k]; return <button key={k} className="btn" onClick={() => { setI(k); setGrid(false); }} style={{ aspectRatio: "1", background: k === i ? C.blue : d ? C.greenDeep : C.panelHi, border: `1px solid ${fl ? C.gold : C.line}`, color: C.snow, fontSize: 12, padding: 0 }}>{k + 1}</button>; })}</div>
        <button className="btn" onClick={submit} style={{ width: "100%", marginTop: 16, background: `linear-gradient(180deg,${C.amber},#e6560f)`, color: "#1a0a02", padding: 15, fontSize: 16 }}>Submit exam</button>
      </div>
    ) : (<div style={{ marginTop: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}><span className="eye" style={{ color: C.blue }}>{sectionLabel}</span><span className="eye" style={{ color: C.mist }}>Q{i + 1}/{exam.length}</span></div>
      {item.kind === "sit" && <div style={{ border: `1px solid ${C.line}`, borderRadius: 12, overflow: "hidden", marginBottom: 12 }}><Scene spec={item.q} reveal={false} /></div>}
      <div className="card" style={{ padding: "18px", marginBottom: 14 }}><h2 className="dsp" style={{ fontSize: 19, fontWeight: 700, lineHeight: 1.3, margin: 0 }}>{isMcq ? item.q.q : item.q.prop}</h2></div>
      {item.kind === "sit" ? (

      </div>
    </div>)}
  </div>);
}

function MockResult({ data, onHome, onRetry, onReview }) {
  const limits = { mcq: 4, risk: 1, sit: 7 };
  const names = { mcq: "Multiple choice", risk: "Risk identification", sit: "Traffic situations" };
  const sections = ["mcq", "risk", "sit"].filter((k) => data.sec[k].n > 0);
  const sectionPass = (k) => (data.sec[k].n - data.sec[k].ok) <= limits[k];
  const passed = sections.every(sectionPass);
  const totalOk = sections.reduce((s, k) => s + data.sec[k].ok, 0);
  const wrong = data.results.filter((r) => !r.correct).length;
  return (<div className="rev">
    <div className="eye" style={{ marginBottom: 14, textAlign: "center" }}>Exam complete</div>
    <div className="card" style={{ padding: "26px 22px", marginBottom: 16, textAlign: "center", borderColor: passed ? C.green : C.red }}>
      <div className="dsp" style={{ fontSize: 30, fontWeight: 800, color: passed ? C.green : C.red }}>{passed ? "🎉 PASS" : "✕ NOT YET"}</div>
      <div style={{ color: C.mist, marginTop: 6, fontSize: 14 }}>{totalOk} of {data.total} correct overall</div>
    </div>
    <div className="card" style={{ padding: 18, marginBottom: 16 }}>
      <div className="eye" style={{ marginBottom: 12, color: C.mist }}>Each section must pass on its own</div>
      <div style={{ display: "grid", gap: 12 }}>{sections.map((k) => { const v = data.sec[k], wr = v.n - v.ok, p = sectionPass(k); return (<div key={k}><div style={{ display: "flex", justifyContent: "space-between", fontSize: 13.5, marginBottom: 5 }}><span>{names[k]}</span><span style={{ color: p ? C.green : C.red, fontWeight: 700 }}>{p ? "PASS" : "FAIL"} · {wr} wrong / max {limits[k]}</span></div><div className="track"><div className="fill" style={{ width: `${v.ok / v.n * 100}%`, background: p ? C.green : C.red }} /></div></div>); })}</div>

    <div style={{ display: "flex", gap: 10 }}>

      <button className="btn" onClick={onRetry} style={{ flex: 1, background: `linear-gradient(180deg,${C.amber},#e6560f)`, color: "#1a0a02", padding: 15, fontSize: 14 }}>↻ New</button>
      <button className="btn" onClick={onHome} style={{ flex: 1, background: C.panel, border: `1px solid ${C.line}`, color: C.snow, padding: 15, fontSize: 14 }}>⌂ Home</button>
    </div>
  </div>);
}

  return (<div className="rev">

    <p style={{ color: C.mist, fontSize: 14, marginTop: 0, marginBottom: 16 }}>{SIGNS.length} Finnish signs. Local quirk: warning and speed/prohibitory signs sit on a <b style={{ color: YEL }}>yellow</b> background.</p>
    <div style={{ display: "grid", gap: 12 }}>
      <button className="btn" onClick={() => go("signBrowse")} style={{ background: `linear-gradient(180deg,${C.blue},#2a6ddb)`, color: "#fff", padding: 18, fontSize: 16, textAlign: "left" }}>🗂️ Browse & flip<br /><span style={{ fontWeight: 500, fontSize: 12.5, opacity: .85 }}>Tap a sign to reveal its meaning</span></button>
      <button className="btn" onClick={() => go("signQuiz")} style={{ background: `linear-gradient(180deg,${C.amber},#e6560f)`, color: "#1a0a02", padding: 18, fontSize: 16, textAlign: "left" }}>🎯 Test me on signs<br /><span style={{ fontWeight: 500, fontSize: 12.5, opacity: .8 }}>See a sign, pick the meaning</span></button>
    </div>
  </div>);
}
function SignBrowse({ back }) {
  const [cat, setCat] = useState("All"), [flip, setFlip] = useState(null);
  const list = cat === "All" ? SIGNS : SIGNS.filter((s) => s.cat === cat);
  return (<div className="rev">
    <Head left="‹ Signs" right={`${list.length} signs`} onLeft={back} />
    <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>{["All", ...SIGN_CATS].map((k) => <button key={k} className={"chip" + (cat === k ? " on" : "")} onClick={() => { setCat(k); setFlip(null); }}>{k}</button>)}</div>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(132px,1fr))", gap: 12 }}>{list.map((s) => (
      <div key={s.c} onClick={() => setFlip(flip === s.c ? null : s.c)}>{flip === s.c ? (
        <div className="card rev" style={{ padding: 13, minHeight: 148, cursor: "pointer", borderColor: C.blue }}><div className="dsp" style={{ fontSize: 13, fontWeight: 700, color: C.gold, marginBottom: 6 }}>{s.n}</div><div style={{ fontSize: 12, color: C.mist, lineHeight: 1.4 }}>{s.m}</div></div>
      ) : (
        <div className="signtile" style={{ minHeight: 148, gap: 8, flexDirection: "column" }}><SignSVG code={s.c} size={78} /><div style={{ fontSize: 11, color: BLK, fontWeight: 600, textAlign: "center", lineHeight: 1.2 }}>{s.n}</div></div>
      )}</div>))}</div>
    <p style={{ color: C.mist, fontSize: 12.5, marginTop: 16, textAlign: "center" }}>Tap a sign to flip · tap again to flip back</p>
  </div>);
}
function SignQuiz({ back }) {
  const [deck] = useState(() => shuffle(SIGNS));
  const [i, setI] = useState(0), [picked, setPicked] = useState(null), [score, setScore] = useState(0), [done, setDone] = useState(false);
  const s = deck[i];
  const opts = useMemo(() => shuffle([s.n, ...shuffle(SIGNS.filter((x) => x.c !== s.c)).slice(0, 3).map((x) => x.n)]), [i]); // eslint-disable-line
  const answered = picked !== null, ok = answered && picked === s.n;
  function choose(n) { if (answered) return; setPicked(n); if (n === s.n) setScore((x) => x + 1); }
  function next() { if (i + 1 >= deck.length) return setDone(true); setI(i + 1); setPicked(null); }
  if (done) return <Score pct={Math.round(score / deck.length * 100)} sub={`${score} of ${deck.length} signs`} back={back} />;
  return (<div>
    <Head left="‹ Exit" right={`${score} · ${i + 1}/${deck.length}`} onLeft={back} />
    <Bar pct={(i + 1) / deck.length * 100} />
    <div className="dsp" style={{ textAlign: "center", fontWeight: 700, fontSize: 16, margin: "16px 0 12px" }}>What does this sign mean?</div>
    <div className="signtile" style={{ width: 144, height: 144, margin: "0 auto 18px", cursor: "default" }}><SignSVG code={s.c} size={112} /></div>
    <div style={{ display: "grid", gap: 10 }}>{opts.map((n) => { let bg, bd; if (answered) { if (n === s.n) { bg = C.greenDeep; bd = C.green; } else if (n === picked) { bg = C.redDeep; bd = C.red; } } return <button key={n} className="opt" disabled={answered} onClick={() => choose(n)} style={bg ? { background: bg, borderColor: bd } : undefined}><span>{n}</span></button>; })}</div>
    {answered && <div className="card rev" style={{ marginTop: 14, padding: 16, borderColor: ok ? C.green : C.red }}><div className="dsp" style={{ fontWeight: 700, fontSize: 15, marginBottom: 6, color: ok ? C.green : C.red }}>{ok ? "✓ Correct" : `✕ It's: ${s.n}`}</div><p style={{ margin: 0, fontSize: 14, color: C.mist, lineHeight: 1.5 }}>{s.m}</p><button className="btn" onClick={next} style={{ width: "100%", marginTop: 12, background: `linear-gradient(180deg,${C.blue},#2a6ddb)`, color: "#fff", padding: 13, fontSize: 15 }}>{i + 1 >= deck.length ? "See score →" : "Next sign →"}</button></div>}
  </div>);
}

/* ---------- TAXI ENTREPRENEUR SECTION ---------- */
function TaxiHome({ go, startTopic, best }) {
  const dist = [["Commercial mgmt", 8], ["Financial mgmt", 9], ["Vehicle & traffic law", 4], ["Taxation", 5], ["Accounting", 4], ["Employment law", 4], ["Wages", 4], ["Social security", 4], ["Pensions", 4], ["Insurance", 4]];
  return (<div className="rev">
    <Head left="‹ Home" right="🚕 Yrittäjäkoe" onLeft={() => go("home")} />
    <div className="card" style={{ padding: 22, marginBottom: 14, borderColor: "#1f8a5b" }}>
      <div className="eye" style={{ color: "#5fe0a8" }}>Taksiliikennelupa</div>
      <h2 className="dsp" style={{ fontSize: 24, fontWeight: 800, margin: "8px 0 6px" }}>Taxi entrepreneur exam</h2>
      <p style={{ color: C.mist, fontSize: 13.5, lineHeight: 1.5, margin: 0 }}>The business licence exam: <b style={{ color: C.snow }}>50 multiple-choice questions, ≥35 to pass</b>, 2 hours. Covers running a taxi company, not driving.</p>
    </div>
    <button className="btn" onClick={() => go("taxiMock")} style={{ width: "100%", background: "linear-gradient(180deg,#1f8a5b,#0c5a39)", color: "#eafff5", padding: "18px", fontSize: 16, marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><span>⏱️ Full mock exam</span><span style={{ fontWeight: 500, fontSize: 12.5, opacity: .85 }}>50 Q · 2:00:00 · 35 to pass</span></div>
    </button>
    {best != null && <div style={{ textAlign: "center", marginBottom: 14, color: C.mist, fontSize: 13 }}>Best: <b style={{ color: C.gold }}>{best}/50</b></div>}
    <div className="eye" style={{ color: C.mist, margin: "4px 0 10px" }}>Practice by topic <span style={{ textTransform: "none", letterSpacing: 0, fontWeight: 400 }}>(official weighting in the exam)</span></div>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 18 }}>
      {dist.map(([t, n]) => (<button key={t} className="btn" onClick={() => startTopic(t)} style={{ background: C.panel, border: `1px solid ${C.line}`, color: C.snow, padding: "13px 12px", fontSize: 13.5, textAlign: "left" }}>{TOPIC_ICON[t]} {t}<br /><span style={{ fontWeight: 500, fontSize: 11.5, color: C.mist }}>{TAXI.filter((x) => x.t === t).length} q · {n} in exam</span></button>))}
    </div>
    <div className="card" style={{ padding: "14px 16px", display: "flex", gap: 12, alignItems: "flex-start" }}>
      <span style={{ fontSize: 20 }}>ℹ️</span>
      <p style={{ margin: 0, fontSize: 12.5, color: C.mist, lineHeight: 1.5 }}>
        The official yrittäjäkoe is taken <b style={{ color: C.snow }}>only in Finnish or Swedish</b> after completing the ~21-hour entrepreneur training, at a Traficom-approved organisation. Questions aren't public, so this drills the same ten topic areas in English for study. Verify figures (tax rates, thresholds) before your exam, as they change.
      </p>
    </div>
  </div>);
}

function TaxiMock({ onDone, onQuit }) {
  const deck = useMemo(() => shuffle(TAXI).slice(0, 50), []);
  const [i, setI] = useState(0), [ans, setAns] = useState({}), [flag, setFlag] = useState({}), [left, setLeft] = useState(120 * 60), [grid, setGrid] = useState(false);
  const doneRef = useRef(false);
  useEffect(() => { const id = setInterval(() => setLeft((l) => { if (l <= 1) { clearInterval(id); if (!doneRef.current) { doneRef.current = true; submit(); } return 0; } return l - 1; }), 1000); return () => clearInterval(id); }, []); // eslint-disable-line
  function submit() { const byTopic = {}; let score = 0; const results = deck.map((q, k) => { const correct = ans[k] === q.a; if (correct) score++; (byTopic[q.t] ??= { ok: 0, n: 0 }); byTopic[q.t].n++; if (correct) byTopic[q.t].ok++; return { q, chosen: ans[k] ?? null, correct }; }); onDone({ score, total: deck.length, byTopic, results }); }
  const q = deck[i]; const low = left <= 120;
  const hh = Math.floor(left / 3600), mm = Math.floor((left % 3600) / 60), ss = left % 60;
  const clock = `${hh}:${String(mm).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
  return (<div>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
      <button className="btn" onClick={onQuit} style={{ background: "transparent", color: C.mist, padding: "8px 4px", fontSize: 14 }}>‹ Quit</button>
      <div className="dsp num" style={{ fontWeight: 800, fontSize: 18, color: low ? C.red : C.gold, animation: low ? "pulse 1s infinite" : "none" }}>⏱ {clock}</div>
      <button className="btn" onClick={() => setGrid((g) => !g)} style={{ background: C.panel, border: `1px solid ${C.line}`, color: C.snow, padding: "8px 12px", fontSize: 13 }}>{grid ? "Close" : "Grid"}</button>
    </div>
    <Bar pct={(i + 1) / deck.length * 100} />
    {grid ? (
      <div className="card rev" style={{ padding: 18, marginTop: 14 }}>
        <div className="eye" style={{ marginBottom: 12, color: C.mist }}>{Object.keys(ans).length}/{deck.length} answered</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(8,1fr)", gap: 7 }}>{deck.map((_, k) => { const d = ans[k] != null, fl = flag[k]; return <button key={k} className="btn" onClick={() => { setI(k); setGrid(false); }} style={{ aspectRatio: "1", background: k === i ? "#1f8a5b" : d ? C.greenDeep : C.panelHi, border: `1px solid ${fl ? C.gold : C.line}`, color: C.snow, fontSize: 12, padding: 0 }}>{k + 1}</button>; })}</div>
        <button className="btn" onClick={submit} style={{ width: "100%", marginTop: 16, background: "linear-gradient(180deg,#1f8a5b,#0c5a39)", color: "#eafff5", padding: 15, fontSize: 16 }}>Submit exam</button>
      </div>
    ) : (<div style={{ marginTop: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}><span className="eye" style={{ color: "#5fe0a8" }}>{TOPIC_ICON[q.t]} {q.t}</span><span className="eye" style={{ color: C.mist }}>Q{i + 1}/{deck.length}</span></div>
      <div className="card" style={{ padding: "18px", marginBottom: 14 }}><h2 className="dsp" style={{ fontSize: 18, fontWeight: 700, lineHeight: 1.3, margin: 0 }}>{q.q}</h2></div>
      <div style={{ display: "grid", gap: 10 }}>{q.o.map((opt, idx) => { const on = ans[i] === idx; return <button key={idx} className="opt" onClick={() => setAns((a) => ({ ...a, [i]: idx }))} style={on ? { borderColor: "#1f8a5b", background: "#143b2c" } : undefined}><span className="key" style={on ? { background: "#1f8a5b", color: "#eafff5", borderColor: "#1f8a5b" } : undefined}>{["A", "B", "C", "D"][idx]}</span><span>{opt}</span></button>; })}</div>
      <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
        <button className="btn" disabled={i === 0} onClick={() => setI(i - 1)} style={{ background: C.panel, border: `1px solid ${C.line}`, color: i === 0 ? C.mist : C.snow, padding: "13px 16px", fontSize: 14, opacity: i === 0 ? .5 : 1 }}>‹</button>
        <button className="btn" onClick={() => setFlag((f) => ({ ...f, [i]: !f[i] }))} style={{ background: flag[i] ? C.gold : C.panel, border: `1px solid ${flag[i] ? C.gold : C.line}`, color: flag[i] ? "#1a1402" : C.snow, padding: "13px 16px", fontSize: 14 }}>⚑</button>
        {i < deck.length - 1 ? <button className="btn" onClick={() => setI(i + 1)} style={{ flex: 1, background: "linear-gradient(180deg,#1f8a5b,#0c5a39)", color: "#eafff5", padding: 13, fontSize: 15 }}>Next ›</button>
          : <button className="btn" onClick={submit} style={{ flex: 1, background: `linear-gradient(180deg,${C.amber},#e6560f)`, color: "#1a0a02", padding: 13, fontSize: 15 }}>Submit exam</button>}
      </div>
    </div>)}
  </div>);
}

function TaxiResult({ data, onHome, onRetry, onReview }) {
  const passed = data.score >= 35;
  const wrong = data.results.filter((r) => !r.correct).length;
  return (<div className="rev">
    <div className="eye" style={{ marginBottom: 14, textAlign: "center" }}>Yrittäjäkoe complete</div>
    <div className="card" style={{ padding: "26px 22px", marginBottom: 16, textAlign: "center", borderColor: passed ? C.green : C.red }}>
      <div className="dsp" style={{ fontSize: 52, fontWeight: 800, color: passed ? C.green : C.red }}>{data.score}<span style={{ fontSize: 26, color: C.mist }}>/50</span></div>
      <div className="dsp" style={{ marginTop: 8, fontSize: 20, fontWeight: 700, color: passed ? C.green : C.red }}>{passed ? "🎉 PASS" : "✕ Below 35"}</div>
      <div style={{ color: C.mist, marginTop: 4, fontSize: 13 }}>Pass mark: 35 of 50 correct</div>
    </div>
    <div className="card" style={{ padding: 18, marginBottom: 16 }}>
      <div className="eye" style={{ marginBottom: 12, color: C.mist }}>By topic</div>
      <div style={{ display: "grid", gap: 10 }}>{Object.entries(data.byTopic).sort((a, b) => (a[1].ok / a[1].n) - (b[1].ok / b[1].n)).map(([t, v]) => { const p = Math.round(v.ok / v.n * 100); return (<div key={t}><div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 5 }}><span>{TOPIC_ICON[t]} {t}</span><span style={{ color: p >= 70 ? C.green : p >= 50 ? C.gold : C.red }}>{v.ok}/{v.n}</span></div><div className="track"><div className="fill" style={{ width: `${p}%`, background: p >= 70 ? C.green : p >= 50 ? C.gold : C.red }} /></div></div>); })}</div>
    </div>
    <div style={{ display: "flex", gap: 10 }}>
      {wrong > 0 && <button className="btn" onClick={onReview} style={{ flex: 1, background: C.panel, border: `1px solid ${C.line}`, color: C.snow, padding: 15, fontSize: 14 }}>Review {wrong}</button>}
      <button className="btn" onClick={onRetry} style={{ flex: 1, background: "linear-gradient(180deg,#1f8a5b,#0c5a39)", color: "#eafff5", padding: 15, fontSize: 14 }}>↻ New</button>
      <button className="btn" onClick={onHome} style={{ flex: 1, background: C.panel, border: `1px solid ${C.line}`, color: C.snow, padding: 15, fontSize: 14 }}>⌂ Home</button>
    </div>
  </div>);
}

function TaxiReview({ results, back }) {
  const wrong = results.filter((r) => !r.correct);
  return (<div className="rev">
    <Head left="‹ Results" right="What to revise" onLeft={back} />
    <div style={{ display: "grid", gap: 12 }}>{wrong.map((r, k) => (
      <div key={k} className="card" style={{ padding: 16, borderColor: C.red }}>
        <div className="eye" style={{ color: "#5fe0a8", marginBottom: 6 }}>{TOPIC_ICON[r.q.t]} {r.q.t}</div>
        <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 10 }}>{r.q.q}</div>
        <div style={{ fontSize: 13.5, color: C.red, marginBottom: 4 }}>Your answer: {r.chosen == null ? "— (blank)" : r.q.o[r.chosen]}</div>
        <div style={{ fontSize: 13.5, color: C.green, marginBottom: 10 }}>Correct: {r.q.o[r.q.a]}</div>
        <div style={{ background: C.night, border: `1px solid ${C.line}`, borderRadius: 10, padding: "10px 12px", fontSize: 13.5, color: C.mist, lineHeight: 1.5 }}>{r.q.w}</div>
      </div>))}</div>
  </div>);
}

/* ---------- APP ---------- */
function App() {
  const [view, setView] = useState("home");
  const [deck, setDeck] = useState([]), [label, setLabel] = useState("");
  const [mock, setMock] = useState(null), [best, setBest] = useState(null), [missed, setMissed] = useState([]);
  const [taxiMock, setTaxiMock] = useState(null), [taxiBest, setTaxiBest] = useState(null);
  const [sitKey, setSitKey] = useState(0);
  const go = (v) => { if (v === "review") return startReview(); if (v === "sitRun") { setDeck(shuffle(SIT).slice(0, 30)); setSitKey((k) => k + 1); return setView("sitRun"); } if (v === "riskRun") { setDeck(shuffle(RISK)); return setView("riskRun"); } setView(v); };
  function recordMiss(q) { setMissed((m) => (m.some((x) => x.q === q.q) ? m : [...m, q])); }
  function startMcq(t) { setDeck(shuffle(t ? MCQ.filter((x) => x.t === t) : MCQ)); setLabel(t || "Mixed"); setView("mcqRun"); }
  function startReview() { if (!missed.length) return; setDeck(shuffle(missed)); setLabel("Your mistakes"); setView("mcqRun"); }
  function startTaxiTopic(t) { setDeck(shuffle(TAXI.filter((x) => x.t === t))); setLabel(t); setView("taxiPractice"); }
  function finishMock(d) {
    setMock(d); setView("mockResult");
    const tot = Object.values(d.sec).reduce((s, x) => s + x.n, 0), ok = Object.values(d.sec).reduce((s, x) => s + x.ok, 0);
    const pct = Math.round(ok / tot * 100); setBest((b) => b == null ? pct : Math.max(b, pct));
    setMissed((m) => { const add = d.results.filter((r) => !r.correct).map((r) => r.it.kind === "sit" ? { q: r.it.q.prop, w: r.it.q.w, t: "Situation", o: ["Yes", "No"], a: r.it.q.a ? 0 : 1 } : r.it.q); const ids = new Set(m.map((x) => x.q)); return [...m, ...add.filter((x) => !ids.has(x.q))]; });
  }
  function finishTaxiMock(d) { setTaxiMock(d); setView("taxiResult"); setTaxiBest((b) => b == null ? d.score : Math.max(b, d.score)); }
  return (<div className="rt"><Styles /><div className="wrap">
    {view === "home" && <Home go={go} best={best} missed={missed.length} />}
    {view === "mockIntro" && <MockIntro start={() => setView("mock")} back={() => go("home")} />}
    {view === "mock" && <Mock onDone={finishMock} onQuit={() => go("home")} />}
    {view === "mockResult" && mock && <MockResult data={mock} onHome={() => go("home")} onRetry={() => setView("mockIntro")} onReview={() => setView("mockReview")} />}
    {view === "mockReview" && mock && <MockReview results={mock.results} back={() => setView("mockResult")} />}
    {view === "mcqPick" && <McqPick start={startMcq} back={() => go("home")} />}
    {view === "mcqRun" && <McqRun deck={deck} label={label} back={() => go(label === "Your mistakes" ? "home" : "mcqPick")} recordMiss={recordMiss} />}
    {view === "sitRun" && <SituationRun key={sitKey} deck={deck} back={() => go("home")} recordMiss={recordMiss} retry={() => go("sitRun")} />}
    {view === "riskRun" && <McqRun deck={deck} label="Risk identification" back={() => go("home")} recordMiss={recordMiss} />}
    {view === "signHome" && <SignHome go={go} back={() => go("home")} />}
    {view === "signBrowse" && <SignBrowse back={() => go("signHome")} />}
    {view === "signQuiz" && <SignQuiz back={() => go("signHome")} />}
    {view === "taxiHome" && <TaxiHome go={go} startTopic={startTaxiTopic} best={taxiBest} />}
    {view === "taxiPractice" && <McqRun deck={deck} label={label} back={() => go("taxiHome")} recordMiss={() => { }} />}
    {view === "taxiMock" && <TaxiMock onDone={finishTaxiMock} onQuit={() => go("taxiHome")} />}
    {view === "taxiResult" && taxiMock && <TaxiResult data={taxiMock} onHome={() => go("home")} onRetry={() => setView("taxiMock")} onReview={() => setView("taxiReview")} />}
    {view === "taxiReview" && taxiMock && <TaxiReview results={taxiMock.results} back={() => setView("taxiResult")} />}
  </div></div>);
}

_root.render(React.createElement(App));

if (_boot) { _boot.style.opacity = "0"; setTimeout(() => _boot.remove(), 450); }
</script>
